<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Cast-iron drum body -->
    <linearGradient id="iron" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#23282e"/>
      <stop offset="0.18" stop-color="#4a525b"/>
      <stop offset="0.45" stop-color="#6b747d"/>
      <stop offset="0.62" stop-color="#3f474f"/>
      <stop offset="1" stop-color="#191d22"/>
    </linearGradient>
    <linearGradient id="ironTop" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a636c"/>
      <stop offset="0.5" stop-color="#828c95"/>
      <stop offset="1" stop-color="#3a4148"/>
    </linearGradient>
    <!-- Manila rope -->
    <linearGradient id="rope" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e7c987"/>
      <stop offset="0.5" stop-color="#c39a52"/>
      <stop offset="1" stop-color="#8a6a30"/>
    </linearGradient>
    <linearGradient id="ropeDk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#cdac6c"/>
      <stop offset="0.5" stop-color="#a67f3d"/>
      <stop offset="1" stop-color="#6f521f"/>
    </linearGradient>
    <!-- Sea / sky behind, dim harbor light -->
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101720"/>
      <stop offset="0.55" stop-color="#141d27"/>
      <stop offset="1" stop-color="#0a0d12"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.32" r="0.62">
      <stop offset="0" stop-color="#2c3848" stop-opacity="0.85"/>
      <stop offset="0.6" stop-color="#141c26" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0a0d12" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Ground -->
  <rect width="800" height="400" fill="url(#sea)"/>
  <rect width="800" height="400" fill="url(#lamp)"/>

  <!-- Deck planking -->
  <g stroke="#0d1116" stroke-width="2" opacity="0.55">
    <rect x="0" y="330" width="800" height="70" fill="#2a221a"/>
    <line x1="0" y1="348" x2="800" y2="348"/>
    <line x1="0" y1="368" x2="800" y2="368"/>
    <line x1="0" y1="388" x2="800" y2="388"/>
    <line x1="150" y1="330" x2="150" y2="400"/>
    <line x1="430" y1="330" x2="430" y2="400"/>
    <line x1="650" y1="330" x2="650" y2="400"/>
  </g>

  <!-- ===== THE CAPSTAN ===== centered, waisted iron drum ===== -->
  <g transform="translate(400,0)">
    <!-- base flange on deck -->
    <ellipse cx="0" cy="338" rx="118" ry="22" fill="#15191e"/>
    <ellipse cx="0" cy="332" rx="104" ry="18" fill="url(#ironTop)"/>

    <!-- drum body: concave (waisted) sides, wide at top and base -->
    <path d="M-92,150
             C-118,205 -118,275 -92,322
             L92,322
             C118,275 118,205 92,150 Z"
          fill="url(#iron)" stroke="#0e1216" stroke-width="2"/>

    <!-- top drumhead with pawl-head ridges -->
    <ellipse cx="0" cy="150" rx="92" ry="26" fill="url(#ironTop)" stroke="#0e1216" stroke-width="2"/>
    <ellipse cx="0" cy="146" rx="92" ry="26" fill="none" stroke="#9aa4ad" stroke-width="1.2" opacity="0.7"/>
    <!-- whelps: vertical ribs on the barrel -->
    <g stroke="#10141a" stroke-width="2" opacity="0.6">
      <path d="M-60,158 C-78,210 -78,270 -60,316" fill="none"/>
      <path d="M-20,160 C-26,212 -26,272 -20,320" fill="none"/>
      <path d="M20,160 C26,212 26,272 20,320" fill="none"/>
      <path d="M60,158 C78,210 78,270 60,316" fill="none"/>
    </g>

    <!-- ===== THE TURNS: rope wrapped around the waist ===== -->
    <!-- back arcs (behind drum) shown faint at the top of each wrap -->
    <g fill="none" stroke="url(#ropeDk)" stroke-width="13" stroke-linecap="round" opacity="0.55">
      <path d="M-104,214 C-60,196 60,196 104,214"/>
      <path d="M-108,238 C-62,220 62,220 108,238"/>
      <path d="M-110,262 C-64,244 64,244 110,262"/>
      <path d="M-110,286 C-64,268 64,268 110,286"/>
    </g>
    <!-- front arcs (the visible wraps crossing the face of the drum) -->
    <g fill="none" stroke="url(#rope)" stroke-width="15" stroke-linecap="round">
      <path d="M-104,214 C-60,238 60,238 104,214"/>
      <path d="M-108,238 C-62,262 62,262 108,238"/>
      <path d="M-110,262 C-64,286 64,286 110,262"/>
      <path d="M-110,286 C-64,310 64,310 110,286"/>
    </g>
    <!-- rope twist hatching on the front arcs -->
    <g stroke="#7a5a24" stroke-width="1.4" opacity="0.5">
      <line x1="-70" y1="222" x2="-62" y2="234"/>
      <line x1="-30" y1="231" x2="-22" y2="243"/>
      <line x1="14" y1="233" x2="22" y2="245"/>
      <line x1="58" y1="226" x2="66" y2="238"/>
      <line x1="-72" y1="246" x2="-64" y2="258"/>
      <line x1="-28" y1="256" x2="-20" y2="268"/>
      <line x1="18" y1="257" x2="26" y2="269"/>
      <line x1="60" y1="250" x2="68" y2="262"/>
      <line x1="-74" y1="270" x2="-66" y2="282"/>
      <line x1="-26" y1="281" x2="-18" y2="293"/>
      <line x1="20" y1="281" x2="28" y2="293"/>
      <line x1="62" y1="274" x2="70" y2="286"/>
    </g>
  </g>

  <!-- ===== THE LOAD LINE: thick, taut, leaving stage-left to the ship ===== -->
  <path d="M296,206 C220,206 120,210 -10,206" transform="translate(0,8)"
        fill="none" stroke="url(#ropeDk)" stroke-width="16" stroke-linecap="round"/>
  <path d="M296,214 C220,214 120,218 -10,214"
        fill="none" stroke="url(#rope)" stroke-width="15" stroke-linecap="round" opacity="0"/>
  <path d="M296,214 C210,214 110,218 -10,214"
        fill="none" stroke="url(#rope)" stroke-width="14" stroke-linecap="round"/>
  <text x="20" y="196" font-family="Georgia, serif" font-size="14" fill="#7d8893" letter-spacing="1">the load</text>

  <!-- ===== THE TAIL: thin, slack, trailing off stage-right to the hand ===== -->
  <path d="M504,300 C600,300 690,288 760,322"
        fill="none" stroke="url(#ropeDk)" stroke-width="7" stroke-linecap="round" opacity="0.8"/>
  <path d="M504,298 C600,298 690,286 762,320"
        fill="none" stroke="url(#rope)" stroke-width="5.5" stroke-linecap="round"/>
  <text x="690" y="300" font-family="Georgia, serif" font-size="14" fill="#7d8893" letter-spacing="1" text-anchor="middle">the tail</text>

  <!-- Title -->
  <text x="400" y="60" font-family="Georgia, 'Times New Roman', serif" font-size="40" fill="#e8d8b0" text-anchor="middle" letter-spacing="3">The Capstan</text>
</svg>
