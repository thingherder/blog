<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="leftFabric" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#2d2d5e"/>
    </linearGradient>
    <linearGradient id="rightFabric" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5e2d2d"/>
      <stop offset="100%" stop-color="#2e1a1a"/>
    </linearGradient>
    <linearGradient id="goldThread" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4d03f"/>
      <stop offset="50%" stop-color="#c9a826"/>
      <stop offset="100%" stop-color="#f4d03f"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0d0d1a"/>

  <!-- Left fabric panel with texture lines -->
  <rect x="0" y="0" width="385" height="400" fill="url(#leftFabric)"/>
  <g opacity="0.15" stroke="#4a4a8a" stroke-width="0.5">
    <line x1="30" y1="0" x2="30" y2="400"/>
    <line x1="60" y1="0" x2="60" y2="400"/>
    <line x1="90" y1="0" x2="90" y2="400"/>
    <line x1="120" y1="0" x2="120" y2="400"/>
    <line x1="150" y1="0" x2="150" y2="400"/>
    <line x1="180" y1="0" x2="180" y2="400"/>
    <line x1="210" y1="0" x2="210" y2="400"/>
    <line x1="240" y1="0" x2="240" y2="400"/>
    <line x1="270" y1="0" x2="270" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="330" y1="0" x2="330" y2="400"/>
    <line x1="360" y1="0" x2="360" y2="400"/>
  </g>

  <!-- Right fabric panel with texture lines -->
  <rect x="415" y="0" width="385" height="400" fill="url(#rightFabric)"/>
  <g opacity="0.15" stroke="#8a4a4a" stroke-width="0.5">
    <line x1="440" y1="0" x2="440" y2="400"/>
    <line x1="470" y1="0" x2="470" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="530" y1="0" x2="530" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="590" y1="0" x2="590" y2="400"/>
    <line x1="620" y1="0" x2="620" y2="400"/>
    <line x1="650" y1="0" x2="650" y2="400"/>
    <line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="710" y1="0" x2="710" y2="400"/>
    <line x1="740" y1="0" x2="740" y2="400"/>
    <line x1="770" y1="0" x2="770" y2="400"/>
  </g>

  <!-- The seam - golden stitching down the center -->
  <g filter="url(#glow)">
    <!-- Glow line -->
    <line x1="400" y1="0" x2="400" y2="400" stroke="#f4d03f" stroke-width="2" opacity="0.4"/>

    <!-- Stitch marks - crossing diagonals like real stitching -->
    <g stroke="url(#goldThread)" stroke-width="1.5" stroke-linecap="round">
      <line x1="388" y1="10" x2="412" y2="25"/>
      <line x1="412" y1="25" x2="388" y2="40"/>
      <line x1="388" y1="40" x2="412" y2="55"/>
      <line x1="412" y1="55" x2="388" y2="70"/>
      <line x1="388" y1="70" x2="412" y2="85"/>
      <line x1="412" y1="85" x2="388" y2="100"/>
      <line x1="388" y1="100" x2="412" y2="115"/>
      <line x1="412" y1="115" x2="388" y2="130"/>
      <line x1="388" y1="130" x2="412" y2="145"/>
      <line x1="412" y1="145" x2="388" y2="160"/>
      <line x1="388" y1="160" x2="412" y2="175"/>
      <line x1="412" y1="175" x2="388" y2="190"/>
      <line x1="388" y1="190" x2="412" y2="205"/>
      <line x1="412" y1="205" x2="388" y2="220"/>
      <line x1="388" y1="220" x2="412" y2="235"/>
      <line x1="412" y1="235" x2="388" y2="250"/>
      <line x1="388" y1="250" x2="412" y2="265"/>
      <line x1="412" y1="265" x2="388" y2="280"/>
      <line x1="388" y1="280" x2="412" y2="295"/>
      <line x1="412" y1="295" x2="388" y2="310"/>
      <line x1="388" y1="310" x2="412" y2="325"/>
      <line x1="412" y1="325" x2="388" y2="340"/>
      <line x1="388" y1="340" x2="412" y2="355"/>
      <line x1="412" y1="355" x2="388" y2="370"/>
      <line x1="388" y1="370" x2="412" y2="385"/>
      <line x1="412" y1="385" x2="388" y2="400"/>
    </g>

    <!-- Stitch dots at each crossing point -->
    <g fill="#f4d03f" opacity="0.8">
      <circle cx="388" cy="10" r="1.5"/>
      <circle cx="412" cy="25" r="1.5"/>
      <circle cx="388" cy="40" r="1.5"/>
      <circle cx="412" cy="55" r="1.5"/>
      <circle cx="388" cy="70" r="1.5"/>
      <circle cx="412" cy="85" r="1.5"/>
      <circle cx="388" cy="100" r="1.5"/>
      <circle cx="412" cy="115" r="1.5"/>
      <circle cx="388" cy="130" r="1.5"/>
      <circle cx="412" cy="145" r="1.5"/>
      <circle cx="388" cy="160" r="1.5"/>
      <circle cx="412" cy="175" r="1.5"/>
      <circle cx="388" cy="190" r="1.5"/>
      <circle cx="412" cy="205" r="1.5"/>
      <circle cx="388" cy="220" r="1.5"/>
      <circle cx="412" cy="235" r="1.5"/>
      <circle cx="388" cy="250" r="1.5"/>
      <circle cx="412" cy="265" r="1.5"/>
      <circle cx="388" cy="280" r="1.5"/>
      <circle cx="412" cy="295" r="1.5"/>
      <circle cx="388" cy="310" r="1.5"/>
      <circle cx="412" cy="325" r="1.5"/>
      <circle cx="388" cy="340" r="1.5"/>
      <circle cx="412" cy="355" r="1.5"/>
      <circle cx="388" cy="370" r="1.5"/>
      <circle cx="412" cy="385" r="1.5"/>
    </g>
  </g>

  <!-- Subtle light emanating from the seam -->
  <rect x="390" y="0" width="20" height="400" fill="#f4d03f" opacity="0.03"/>
  <rect x="395" y="0" width="10" height="400" fill="#f4d03f" opacity="0.05"/>

  <!-- Small particles of light near the seam suggesting life/energy -->
  <g fill="#f4d03f" opacity="0.6">
    <circle cx="380" cy="60" r="1"/>
    <circle cx="420" cy="120" r="0.8"/>
    <circle cx="375" cy="190" r="1.2"/>
    <circle cx="425" cy="250" r="0.7"/>
    <circle cx="378" cy="310" r="1"/>
    <circle cx="422" cy="370" r="0.9"/>
  </g>
</svg>
