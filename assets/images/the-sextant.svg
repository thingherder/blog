<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="twilight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0e2a"/>
      <stop offset="45%" stop-color="#1a2855"/>
      <stop offset="75%" stop-color="#2a3a6a"/>
      <stop offset="100%" stop-color="#3a4a5a"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2a3a"/>
      <stop offset="100%" stop-color="#0a1420"/>
    </linearGradient>
    <radialGradient id="starglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffee" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffffcc" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="horizon-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cc8844" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#cc8844" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c4a24e"/>
      <stop offset="50%" stop-color="#d4b45e"/>
      <stop offset="100%" stop-color="#a4822e"/>
    </linearGradient>
  </defs>

  <!-- Twilight sky -->
  <rect width="800" height="400" fill="url(#twilight)"/>

  <!-- Horizon glow -->
  <rect x="0" y="260" width="800" height="40" fill="url(#horizon-glow)"/>

  <!-- Sea -->
  <rect x="0" y="280" width="800" height="120" fill="url(#sea)"/>

  <!-- Gentle waves -->
  <g stroke="#2a3a4a" stroke-width="0.5" fill="none" opacity="0.5">
    <path d="M0,300 Q50,296 100,300 Q150,304 200,300 Q250,296 300,300 Q350,304 400,300 Q450,296 500,300 Q550,304 600,300 Q650,296 700,300 Q750,304 800,300"/>
    <path d="M0,320 Q60,317 120,320 Q180,323 240,320 Q300,317 360,320 Q420,323 480,320 Q540,317 600,320 Q660,323 720,320 Q780,317 800,320"/>
    <path d="M0,340 Q70,337 140,340 Q210,343 280,340 Q350,337 420,340 Q490,343 560,340 Q630,337 700,340 Q770,343 800,340"/>
  </g>

  <!-- Stars -->
  <g fill="#ffffee">
    <!-- Navigation star 1 (bright) -->
    <circle cx="200" cy="60" r="2.5"/>
    <circle cx="200" cy="60" r="6" fill="#ffffcc" opacity="0.15"/>

    <!-- Navigation star 2 (bright) -->
    <circle cx="580" cy="90" r="2.5"/>
    <circle cx="580" cy="90" r="6" fill="#ffffcc" opacity="0.15"/>

    <!-- Navigation star 3 (bright) -->
    <circle cx="400" cy="45" r="3"/>
    <circle cx="400" cy="45" r="8" fill="#ffffcc" opacity="0.12"/>

    <!-- Background stars -->
    <circle cx="80" cy="30" r="1"/>
    <circle cx="150" cy="100" r="0.8"/>
    <circle cx="320" cy="25" r="1"/>
    <circle cx="480" cy="55" r="0.8"/>
    <circle cx="650" cy="40" r="1"/>
    <circle cx="720" cy="110" r="0.8"/>
    <circle cx="50" cy="75" r="0.6"/>
    <circle cx="260" cy="80" r="0.6"/>
    <circle cx="540" cy="35" r="0.7"/>
    <circle cx="700" cy="70" r="0.6"/>
    <circle cx="350" cy="110" r="0.7"/>
    <circle cx="130" cy="140" r="0.5"/>
    <circle cx="440" cy="130" r="0.5"/>
    <circle cx="620" cy="140" r="0.6"/>
    <circle cx="760" cy="25" r="0.8"/>
  </g>

  <!-- Angle lines from sextant to stars (measurement visualization) -->
  <g stroke="#c4a24e" stroke-width="0.8" opacity="0.25" stroke-dasharray="4,6">
    <!-- Line to star 1 -->
    <line x1="400" y1="270" x2="200" y2="60"/>
    <!-- Line to star 2 -->
    <line x1="400" y1="270" x2="580" y2="90"/>
    <!-- Line to star 3 -->
    <line x1="400" y1="270" x2="400" y2="45"/>
  </g>

  <!-- Sextant (simplified, geometric) -->
  <g transform="translate(370, 210)">
    <!-- Arc -->
    <path d="M0,60 A60,60 0 0 1 60,60" fill="none" stroke="url(#brass)" stroke-width="3"/>
    <!-- Frame triangle -->
    <line x1="30" y1="0" x2="0" y2="60" stroke="url(#brass)" stroke-width="2"/>
    <line x1="30" y1="0" x2="60" y2="60" stroke="url(#brass)" stroke-width="2"/>
    <!-- Index arm -->
    <line x1="30" y1="0" x2="30" y2="65" stroke="#d4b45e" stroke-width="1.5"/>
    <!-- Pivot point -->
    <circle cx="30" cy="0" r="3" fill="#d4b45e"/>
    <!-- Telescope -->
    <line x1="30" y1="0" x2="5" y2="-15" stroke="#a4822e" stroke-width="2"/>
    <rect x="0" y="-20" width="10" height="8" rx="1" fill="#a4822e"/>
    <!-- Degree marks on arc -->
    <g stroke="#c4a24e" stroke-width="0.8">
      <line x1="3" y1="57" x2="6" y2="53"/>
      <line x1="12" y1="63" x2="14" y2="58"/>
      <line x1="24" y1="66" x2="25" y2="61"/>
      <line x1="36" y1="66" x2="35" y2="61"/>
      <line x1="48" y1="63" x2="46" y2="58"/>
      <line x1="57" y1="57" x2="54" y2="53"/>
    </g>
  </g>

  <!-- Horizon line (crisp) -->
  <line x1="0" y1="280" x2="800" y2="280" stroke="#5a6a7a" stroke-width="0.5" opacity="0.6"/>

  <!-- Position mark where lines cross -->
  <circle cx="400" cy="270" r="4" fill="none" stroke="#c4a24e" stroke-width="1" opacity="0.5"/>
  <circle cx="400" cy="270" r="1.5" fill="#c4a24e" opacity="0.6"/>
</svg>
