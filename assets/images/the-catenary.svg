<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The Catenary — a chain hanging under its own weight in the exact curve of least energy, and beneath it, faint, the same curve inverted into a standing arch">
  <defs>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171008"/>
      <stop offset="0.55" stop-color="#20160b"/>
      <stop offset="1" stop-color="#120c06"/>
    </linearGradient>
    <linearGradient id="chain" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f2d79a"/>
      <stop offset="0.5" stop-color="#e6b15f"/>
      <stop offset="1" stop-color="#c98a3c"/>
    </linearGradient>
    <radialGradient id="bead" cx="0.38" cy="0.34" r="0.75">
      <stop offset="0" stop-color="#fbe6bd"/>
      <stop offset="0.7" stop-color="#e2ac57"/>
      <stop offset="1" stop-color="#9c6a2b"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#ground)"/>

  <!-- the inversion: Hooke's rigid arch, the same curve flipped, standing under its own weight -->
  <g stroke="#7fa9b8" stroke-opacity="0.28" fill="none">
    <path d="M 270.0 602.0 L 283.8 578.8 L 297.5 557.1 L 311.2 536.8 L 325.0 517.8 L 338.8 500.1 L 352.5 483.5 L 366.2 468.2 L 380.0 453.9 L 393.8 440.7 L 407.5 428.5 L 421.2 417.4 L 435.0 407.1 L 448.8 397.8 L 462.5 389.5 L 476.2 381.9 L 490.0 375.3 L 503.8 369.4 L 517.5 364.4 L 531.2 360.2 L 545.0 356.8 L 558.8 354.1 L 572.5 352.2 L 586.2 351.1 L 600.0 350.7 L 613.8 351.1 L 627.5 352.2 L 641.2 354.1 L 655.0 356.8 L 668.8 360.2 L 682.5 364.4 L 696.2 369.4 L 710.0 375.3 L 723.8 381.9 L 737.5 389.5 L 751.2 397.8 L 765.0 407.1 L 778.8 417.4 L 792.5 428.5 L 806.2 440.7 L 820.0 453.9 L 833.8 468.2 L 847.5 483.5 L 861.2 500.1 L 875.0 517.8 L 888.8 536.8 L 902.5 557.1 L 916.2 578.8 L 930.0 602.0" stroke-width="9" stroke-linecap="round"/>
    <path d="M 270.0 602.0 L 283.8 578.8 L 297.5 557.1 L 311.2 536.8 L 325.0 517.8 L 338.8 500.1 L 352.5 483.5 L 366.2 468.2 L 380.0 453.9 L 393.8 440.7 L 407.5 428.5 L 421.2 417.4 L 435.0 407.1 L 448.8 397.8 L 462.5 389.5 L 476.2 381.9 L 490.0 375.3 L 503.8 369.4 L 517.5 364.4 L 531.2 360.2 L 545.0 356.8 L 558.8 354.1 L 572.5 352.2 L 586.2 351.1 L 600.0 350.7 L 613.8 351.1 L 627.5 352.2 L 641.2 354.1 L 655.0 356.8 L 668.8 360.2 L 682.5 364.4 L 696.2 369.4 L 710.0 375.3 L 723.8 381.9 L 737.5 389.5 L 751.2 397.8 L 765.0 407.1 L 778.8 417.4 L 792.5 428.5 L 806.2 440.7 L 820.0 453.9 L 833.8 468.2 L 847.5 483.5 L 861.2 500.1 L 875.0 517.8 L 888.8 536.8 L 902.5 557.1 L 916.2 578.8 L 930.0 602.0" stroke-width="1.4" stroke-dasharray="2 6" stroke-opacity="0.5"/>
  </g>

  <!-- the two anchor points the chain hangs from -->
  <g fill="#5a4022">
    <rect x="256" y="150" width="20" height="20" rx="3"/>
    <rect x="924" y="150" width="20" height="20" rx="3"/>
  </g>

  <!-- the hanging chain: the exact curve of least potential energy, found not imposed -->
  <path d="M 270.0 170.0 L 283.8 193.2 L 297.5 214.9 L 311.2 235.2 L 325.0 254.2 L 338.8 271.9 L 352.5 288.5 L 366.2 303.8 L 380.0 318.1 L 393.8 331.3 L 407.5 343.5 L 421.2 354.6 L 435.0 364.9 L 448.8 374.2 L 462.5 382.5 L 476.2 390.1 L 490.0 396.7 L 503.8 402.6 L 517.5 407.6 L 531.2 411.8 L 545.0 415.2 L 558.8 417.9 L 572.5 419.8 L 586.2 420.9 L 600.0 421.3 L 613.8 420.9 L 627.5 419.8 L 641.2 417.9 L 655.0 415.2 L 668.8 411.8 L 682.5 407.6 L 696.2 402.6 L 710.0 396.7 L 723.8 390.1 L 737.5 382.5 L 751.2 374.2 L 765.0 364.9 L 778.8 354.6 L 792.5 343.5 L 806.2 331.3 L 820.0 318.1 L 833.8 303.8 L 847.5 288.5 L 861.2 271.9 L 875.0 254.2 L 888.8 235.2 L 902.5 214.9 L 916.2 193.2 L 930.0 170.0"
        fill="none" stroke="url(#chain)" stroke-width="7" stroke-linecap="round"/>

  <!-- individual links, each one balancing the pull of its neighbors -->
  <g fill="url(#bead)">
    <circle cx="270.0" cy="170.0" r="7"/>
    <circle cx="325.0" cy="254.2" r="7.5"/>
    <circle cx="380.0" cy="318.1" r="8"/>
    <circle cx="435.0" cy="364.9" r="8.5"/>
    <circle cx="490.0" cy="396.7" r="9"/>
    <circle cx="545.0" cy="415.2" r="9.5"/>
    <circle cx="600.0" cy="421.3" r="10"/>
    <circle cx="655.0" cy="415.2" r="9.5"/>
    <circle cx="710.0" cy="396.7" r="9"/>
    <circle cx="765.0" cy="364.9" r="8.5"/>
    <circle cx="820.0" cy="318.1" r="8"/>
    <circle cx="875.0" cy="254.2" r="7.5"/>
    <circle cx="930.0" cy="170.0" r="7"/>
  </g>

  <!-- the plumb line to the belly: the lowest the center of mass can fall -->
  <line x1="600" y1="431" x2="600" y2="560" stroke="#c98a3c" stroke-opacity="0.25" stroke-width="1.2" stroke-dasharray="3 6"/>

  <text x="600" y="596" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="21" fill="#e6b15f" fill-opacity="0.62" letter-spacing="7">CATENA</text>
</svg>
