<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#141828;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="wheelGlow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#3a5f8a;stop-opacity:0.15" />
      <stop offset="70%" style="stop-color:#3a5f8a;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#3a5f8a;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="spoke" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a6a8a;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#6a8aaa;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#4a6a8a;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle radial glow behind wheel -->
  <circle cx="400" cy="200" r="180" fill="url(#wheelGlow)"/>

  <!-- Motion trail arcs — showing accumulated rotation -->
  <g opacity="0.08">
    <circle cx="400" cy="200" r="155" fill="none" stroke="#7ab0d4" stroke-width="25"/>
  </g>
  <g opacity="0.05">
    <circle cx="400" cy="200" r="155" fill="none" stroke="#9ac0e4" stroke-width="40"/>
  </g>

  <!-- Motion blur streaks — trailing arcs suggesting spin -->
  <g opacity="0.12">
    <path d="M 400 45 A 155 155 0 0 1 548 118" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <path d="M 548 118 A 155 155 0 0 1 555 200" fill="none" stroke="#7ab8d8" stroke-width="1.5" opacity="0.8"/>
  </g>
  <g opacity="0.1">
    <path d="M 252 282 A 155 155 0 0 1 245 200" fill="none" stroke="#7ab8d8" stroke-width="2"/>
    <path d="M 400 355 A 155 155 0 0 1 252 282" fill="none" stroke="#7ab8d8" stroke-width="1.5" opacity="0.8"/>
  </g>
  <g opacity="0.07">
    <path d="M 310 65 A 155 155 0 0 0 255 130" fill="none" stroke="#8ac8e8" stroke-width="1.5"/>
    <path d="M 540 270 A 155 155 0 0 0 490 335" fill="none" stroke="#8ac8e8" stroke-width="1.5"/>
  </g>

  <!-- Outer rim of flywheel -->
  <circle cx="400" cy="200" r="140" fill="none" stroke="#4a6a8a" stroke-width="3" opacity="0.7"/>
  <circle cx="400" cy="200" r="135" fill="none" stroke="#3a5a7a" stroke-width="1" opacity="0.3"/>
  <circle cx="400" cy="200" r="145" fill="none" stroke="#3a5a7a" stroke-width="1" opacity="0.3"/>

  <!-- Heavy rim — the mass at the edge -->
  <circle cx="400" cy="200" r="140" fill="none" stroke="#5a7a9a" stroke-width="8" opacity="0.25"/>

  <!-- Spokes — 8 radiating from center -->
  <g stroke="url(#spoke)" stroke-width="1.5">
    <line x1="400" y1="200" x2="400" y2="60" opacity="0.5"/>
    <line x1="400" y1="200" x2="400" y2="340" opacity="0.5"/>
    <line x1="400" y1="200" x2="260" y2="200" opacity="0.5"/>
    <line x1="400" y1="200" x2="540" y2="200" opacity="0.5"/>
    <line x1="400" y1="200" x2="499" y2="101" opacity="0.4"/>
    <line x1="400" y1="200" x2="301" y2="299" opacity="0.4"/>
    <line x1="400" y1="200" x2="301" y2="101" opacity="0.4"/>
    <line x1="400" y1="200" x2="499" y2="299" opacity="0.4"/>
  </g>

  <!-- Hub -->
  <circle cx="400" cy="200" r="18" fill="none" stroke="#6a8aaa" stroke-width="2" opacity="0.6"/>
  <circle cx="400" cy="200" r="5" fill="#6a8aaa" opacity="0.5"/>
  <circle cx="400" cy="200" r="2" fill="#aaccdd" opacity="0.8"/>

  <!-- Tick marks on rim — like accumulated pushes -->
  <g stroke="#7a9aba" stroke-width="1" opacity="0.3">
    <line x1="400" y1="58" x2="400" y2="68"/>
    <line x1="435" y1="59" x2="433" y2="69"/>
    <line x1="469" y1="64" x2="465" y2="74"/>
    <line x1="500" y1="75" x2="494" y2="84"/>
    <line x1="526" y1="91" x2="519" y2="99"/>
    <line x1="546" y1="112" x2="538" y2="118"/>
    <line x1="400" y1="342" x2="400" y2="332"/>
    <line x1="365" y1="341" x2="367" y2="331"/>
    <line x1="331" y1="336" x2="335" y2="326"/>
    <line x1="300" y1="325" x2="306" y2="316"/>
    <line x1="274" y1="309" x2="281" y2="301"/>
    <line x1="254" y1="288" x2="262" y2="282"/>
  </g>

  <!-- Small dots along the rim suggesting embedded energy -->
  <g fill="#8aaaca" opacity="0.35">
    <circle cx="400" cy="60" r="2"/>
    <circle cx="469" cy="66" r="1.5"/>
    <circle cx="530" cy="99" r="1.5"/>
    <circle cx="540" cy="200" r="2"/>
    <circle cx="530" cy="301" r="1.5"/>
    <circle cx="469" cy="334" r="1.5"/>
    <circle cx="400" cy="340" r="2"/>
    <circle cx="331" cy="334" r="1.5"/>
    <circle cx="270" cy="301" r="1.5"/>
    <circle cx="260" cy="200" r="2"/>
    <circle cx="270" cy="99" r="1.5"/>
    <circle cx="331" cy="66" r="1.5"/>
  </g>

  <!-- Subtle curved arrow suggesting rotation direction -->
  <path d="M 430 55 A 150 150 0 0 1 550 155" fill="none" stroke="#7ab8d8" stroke-width="1.5" opacity="0.25"
        stroke-dasharray="4,6"/>
  <polygon points="550,155 545,145 555,148" fill="#7ab8d8" opacity="0.25"/>

  <!-- Small particles trailing — energy being stored -->
  <g fill="#9ad0e8" opacity="0.15">
    <circle cx="570" cy="140" r="1"/>
    <circle cx="580" cy="130" r="0.8"/>
    <circle cx="562" cy="148" r="1.2"/>
    <circle cx="575" cy="120" r="0.6"/>
  </g>

  <!-- Faint concentric rings suggesting stored energy layers -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="#4a6a8a" stroke-width="0.5" opacity="0.15"/>
  <circle cx="400" cy="200" r="110" fill="none" stroke="#4a6a8a" stroke-width="0.5" opacity="0.12"/>
  <circle cx="400" cy="200" r="50" fill="none" stroke="#4a6a8a" stroke-width="0.5" opacity="0.1"/>
</svg>
