<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="stone" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a5568;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3748;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="blade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a0aec0;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#e2e8f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#cbd5e0;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1a202c"/>

  <!-- Whetstone - elongated oval -->
  <ellipse cx="400" cy="260" rx="220" ry="45" fill="url(#stone)" opacity="0.9"/>
  <!-- Groove worn into stone -->
  <ellipse cx="400" cy="255" rx="180" ry="25" fill="none" stroke="#718096" stroke-width="0.8" opacity="0.6"/>
  <ellipse cx="400" cy="250" rx="150" ry="18" fill="none" stroke="#718096" stroke-width="0.5" opacity="0.4"/>

  <!-- Blade at angle across stone -->
  <polygon points="250,140 560,200 555,210 245,150" fill="url(#blade)"/>
  <!-- Blade edge highlight -->
  <line x1="250" y1="145" x2="558" y2="205" stroke="#f7fafc" stroke-width="0.5" opacity="0.8"/>

  <!-- Sparks/particles of friction -->
  <circle cx="380" cy="220" r="1.5" fill="#fbd38d" opacity="0.9"/>
  <circle cx="395" cy="215" r="1" fill="#fbd38d" opacity="0.7"/>
  <circle cx="410" cy="222" r="1.2" fill="#f6e05e" opacity="0.8"/>
  <circle cx="370" cy="218" r="0.8" fill="#fefcbf" opacity="0.6"/>
  <circle cx="420" cy="219" r="1.3" fill="#fbd38d" opacity="0.75"/>
  <circle cx="385" cy="212" r="0.9" fill="#f6e05e" opacity="0.65"/>
  <circle cx="405" cy="225" r="1.1" fill="#fefcbf" opacity="0.7"/>
  <circle cx="365" cy="225" r="0.7" fill="#fbd38d" opacity="0.5"/>
  <circle cx="430" cy="217" r="1" fill="#f6e05e" opacity="0.6"/>

  <!-- Subtle texture lines on stone surface -->
  <line x1="220" y1="260" x2="580" y2="260" stroke="#718096" stroke-width="0.3" opacity="0.3"/>
  <line x1="240" y1="270" x2="560" y2="270" stroke="#718096" stroke-width="0.3" opacity="0.2"/>
  <line x1="260" y1="250" x2="540" y2="250" stroke="#718096" stroke-width="0.3" opacity="0.25"/>

  <!-- Abstract: material shed from blade - tiny scattered particles below -->
  <circle cx="350" cy="310" r="0.6" fill="#a0aec0" opacity="0.3"/>
  <circle cx="420" cy="315" r="0.5" fill="#a0aec0" opacity="0.25"/>
  <circle cx="380" cy="320" r="0.7" fill="#a0aec0" opacity="0.2"/>
  <circle cx="440" cy="308" r="0.4" fill="#a0aec0" opacity="0.3"/>
  <circle cx="360" cy="318" r="0.5" fill="#a0aec0" opacity="0.2"/>
</svg>
