<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0c14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#10121c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="board-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5a3d28;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#4a3020;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3a2418;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="sound-glow" cx="50%" cy="50%" r="45%">
      <stop offset="0%" style="stop-color:#6688bb;stop-opacity:0.12" />
      <stop offset="60%" style="stop-color:#4466aa;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#4466aa;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>
  <rect width="800" height="400" fill="url(#sound-glow)"/>

  <!-- Sounding board — curved wooden panel, side profile -->
  <path d="M200,320 Q200,100 400,80 Q600,100 600,320" fill="url(#board-fill)" stroke="#6a4a30" stroke-width="1.5" fill-opacity="0.9"/>

  <!-- Wood grain lines -->
  <g opacity="0.08">
    <path d="M250,300 Q250,140 400,120 Q550,140 550,300" fill="none" stroke="#aa8866" stroke-width="0.8"/>
    <path d="M280,310 Q280,155 400,135 Q520,155 520,310" fill="none" stroke="#aa8866" stroke-width="0.6"/>
    <path d="M310,315 Q310,170 400,150 Q490,170 490,315" fill="none" stroke="#aa8866" stroke-width="0.5"/>
    <path d="M340,318 Q340,185 400,168 Q460,185 460,318" fill="none" stroke="#aa8866" stroke-width="0.4"/>
    <path d="M370,319 Q370,200 400,188 Q430,200 430,319" fill="none" stroke="#aa8866" stroke-width="0.3"/>
  </g>

  <!-- Sound hole — rosette -->
  <circle cx="400" cy="220" r="28" fill="#0a0c14" stroke="#5a3d28" stroke-width="1.5"/>
  <circle cx="400" cy="220" r="32" fill="none" stroke="#6a4a30" stroke-width="0.5" opacity="0.5"/>
  <circle cx="400" cy="220" r="36" fill="none" stroke="#6a4a30" stroke-width="0.3" opacity="0.3"/>

  <!-- Rosette decoration — simple geometric pattern -->
  <g opacity="0.15">
    <circle cx="400" cy="220" r="25" fill="none" stroke="#ccaa77" stroke-width="0.5" stroke-dasharray="2,3"/>
    <circle cx="400" cy="220" r="40" fill="none" stroke="#ccaa77" stroke-width="0.3" stroke-dasharray="1,4"/>
  </g>

  <!-- Sound waves emanating forward from the board -->
  <g opacity="0.06">
    <path d="M180,200 Q100,200 80,200" fill="none" stroke="#88aadd" stroke-width="1.2"/>
    <path d="M620,200 Q700,200 720,200" fill="none" stroke="#88aadd" stroke-width="1.2"/>
  </g>

  <!-- Concentric sound arcs — radiating outward from center -->
  <g opacity="0.07">
    <ellipse cx="400" cy="200" rx="240" ry="180" fill="none" stroke="#7799cc" stroke-width="0.8"/>
  </g>
  <g opacity="0.055">
    <ellipse cx="400" cy="200" rx="280" ry="210" fill="none" stroke="#7799cc" stroke-width="0.6"/>
  </g>
  <g opacity="0.04">
    <ellipse cx="400" cy="200" rx="320" ry="240" fill="none" stroke="#7799cc" stroke-width="0.5"/>
  </g>
  <g opacity="0.025">
    <ellipse cx="400" cy="200" rx="360" ry="270" fill="none" stroke="#7799cc" stroke-width="0.4"/>
  </g>

  <!-- String vibration lines — taut strings across the board -->
  <g opacity="0.12">
    <line x1="360" y1="110" x2="360" y2="310" stroke="#ccbb88" stroke-width="0.4"/>
    <line x1="380" y1="95" x2="380" y2="315" stroke="#ccbb88" stroke-width="0.5"/>
    <line x1="400" y1="88" x2="400" y2="318" stroke="#ccbb88" stroke-width="0.6"/>
    <line x1="420" y1="95" x2="420" y2="315" stroke="#ccbb88" stroke-width="0.5"/>
    <line x1="440" y1="110" x2="440" y2="310" stroke="#ccbb88" stroke-width="0.4"/>
  </g>

  <!-- Vibration on strings — small sine wave hints -->
  <g opacity="0.08">
    <path d="M398,160 Q402,155 398,150 Q394,145 398,140" fill="none" stroke="#eedd99" stroke-width="0.6"/>
    <path d="M402,250 Q406,245 402,240 Q398,235 402,230" fill="none" stroke="#eedd99" stroke-width="0.5"/>
    <path d="M378,180 Q382,176 378,172" fill="none" stroke="#eedd99" stroke-width="0.4"/>
    <path d="M422,270 Q426,266 422,262" fill="none" stroke="#eedd99" stroke-width="0.4"/>
  </g>

  <!-- Subtle particles — sound made visible -->
  <circle cx="150" cy="180" r="1" fill="#7799bb" opacity="0.15"/>
  <circle cx="130" cy="220" r="0.8" fill="#7799bb" opacity="0.12"/>
  <circle cx="650" cy="175" r="1" fill="#7799bb" opacity="0.15"/>
  <circle cx="670" cy="230" r="0.8" fill="#7799bb" opacity="0.12"/>
  <circle cx="110" cy="200" r="0.6" fill="#7799bb" opacity="0.08"/>
  <circle cx="690" cy="205" r="0.6" fill="#7799bb" opacity="0.08"/>

  <!-- Bridge — small bar across strings -->
  <rect x="355" y="275" width="90" height="3" rx="1" fill="#3a2418" stroke="#5a3d28" stroke-width="0.5"/>

</svg>
