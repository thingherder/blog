<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="deep" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0d14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1820;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="inner-glow" cx="50%" cy="55%" r="45%">
      <stop offset="0%" style="stop-color:#4a8090;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#4a8090;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="shell-old" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3028;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#4a3d30;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d251e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shell-new" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5a8a9a;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#7ab0c0;stop-opacity:0.5" />
      <stop offset="100%" style="stop-color:#4a7a8a;stop-opacity:0.6" />
    </linearGradient>
    <radialGradient id="vulnerability-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#90d0e0;stop-opacity:0.25" />
      <stop offset="60%" style="stop-color:#5090a0;stop-opacity:0.08" />
      <stop offset="100%" style="stop-color:#5090a0;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#deep)" />
  <rect width="800" height="400" fill="url(#inner-glow)" />

  <!-- Floor / ground plane -->
  <ellipse cx="400" cy="340" rx="350" ry="12" fill="#0d1218" opacity="0.6" />

  <!-- The shed exoskeleton (left side, hollow, cracked open) -->
  <!-- Back shell curve -->
  <path d="M180,260 Q160,200 190,160 Q220,130 260,135 Q290,130 310,150 Q330,170 325,210 Q320,250 300,270"
        stroke="#4a3d30" stroke-width="2.5" fill="url(#shell-old)" opacity="0.7" />
  <!-- Crack lines on old shell -->
  <path d="M240,140 L250,180 L235,210" stroke="#2d251e" stroke-width="1" fill="none" opacity="0.5" />
  <path d="M270,138 L265,170 L280,200" stroke="#2d251e" stroke-width="0.8" fill="none" opacity="0.4" />
  <path d="M200,175 L220,190 L210,220" stroke="#2d251e" stroke-width="0.8" fill="none" opacity="0.4" />
  <!-- Split along the back -->
  <path d="M245,132 Q250,125 260,132" stroke="#1a1510" stroke-width="2" fill="none" opacity="0.8" />
  <!-- Old shell is hollow — dark interior -->
  <ellipse cx="250" cy="210" rx="45" ry="35" fill="#0a0d10" opacity="0.5" />
  <!-- Old leg segments scattered -->
  <path d="M185,270 Q170,285 160,300" stroke="#3a3028" stroke-width="2" fill="none" opacity="0.5" />
  <path d="M200,275 Q195,295 185,310" stroke="#3a3028" stroke-width="1.5" fill="none" opacity="0.4" />
  <path d="M310,265 Q325,280 335,295" stroke="#3a3028" stroke-width="1.5" fill="none" opacity="0.4" />

  <!-- The newly molted creature (right side, soft, luminous) -->
  <!-- Vulnerability glow around the new form -->
  <ellipse cx="520" cy="230" rx="120" ry="80" fill="url(#vulnerability-glow)" />
  <!-- New body — translucent, larger -->
  <path d="M450,270 Q430,210 460,170 Q490,140 530,145 Q570,140 590,165 Q610,190 605,230 Q600,265 580,280"
        stroke="#5a9aaa" stroke-width="1.5" fill="url(#shell-new)" opacity="0.8" />
  <!-- Soft translucent surface details -->
  <path d="M500,150 L505,190 L495,220" stroke="#7ab0c0" stroke-width="0.6" fill="none" opacity="0.3" />
  <path d="M540,148 L535,185 L545,215" stroke="#7ab0c0" stroke-width="0.6" fill="none" opacity="0.3" />
  <path d="M470,180 L485,200 L478,230" stroke="#7ab0c0" stroke-width="0.6" fill="none" opacity="0.25" />
  <!-- New legs — delicate, longer -->
  <path d="M460,275 Q445,295 435,315" stroke="#5a9aaa" stroke-width="1.5" fill="none" opacity="0.6" />
  <path d="M475,280 Q465,300 458,320" stroke="#5a9aaa" stroke-width="1.2" fill="none" opacity="0.5" />
  <path d="M570,275 Q585,295 595,315" stroke="#5a9aaa" stroke-width="1.5" fill="none" opacity="0.6" />
  <path d="M560,280 Q570,300 578,320" stroke="#5a9aaa" stroke-width="1.2" fill="none" opacity="0.5" />
  <!-- Antennae — new, delicate, longer than old form -->
  <path d="M510,150 Q500,110 480,85" stroke="#7ab0c0" stroke-width="1" fill="none" opacity="0.5" />
  <path d="M530,148 Q540,108 555,80" stroke="#7ab0c0" stroke-width="1" fill="none" opacity="0.5" />
  <circle cx="480" cy="85" r="2" fill="#90d0e0" opacity="0.5" />
  <circle cx="555" cy="80" r="2" fill="#90d0e0" opacity="0.5" />

  <!-- Connection between old and new — faint trail -->
  <path d="M310,265 Q370,270 380,268 Q410,262 450,270"
        stroke="#4a6a70" stroke-width="0.8" fill="none" opacity="0.25"
        stroke-dasharray="4,6" />

  <!-- Scattered particles — the in-between -->
  <circle cx="360" cy="240" r="1.5" fill="#7ab0c0" opacity="0.2" />
  <circle cx="380" cy="255" r="1" fill="#7ab0c0" opacity="0.15" />
  <circle cx="395" cy="235" r="1.2" fill="#7ab0c0" opacity="0.18" />
  <circle cx="370" cy="265" r="0.8" fill="#7ab0c0" opacity="0.12" />
  <circle cx="410" cy="250" r="1.3" fill="#7ab0c0" opacity="0.15" />

  <!-- Ambient light dots — like bioluminescence -->
  <circle cx="480" cy="200" r="1.5" fill="#90d0e0" opacity="0.2" />
  <circle cx="550" cy="190" r="1.2" fill="#90d0e0" opacity="0.18" />
  <circle cx="510" cy="245" r="1" fill="#90d0e0" opacity="0.15" />
  <circle cx="565" cy="235" r="1.3" fill="#90d0e0" opacity="0.2" />
  <circle cx="490" cy="170" r="0.8" fill="#90d0e0" opacity="0.12" />
</svg>
