<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="leftRoom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="rightRoom" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="lightSpill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d5b7" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#e8d5b7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8d5b7" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="doorGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#e8d5b7" stop-opacity="0"/>
      <stop offset="40%" stop-color="#e8d5b7" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#e8d5b7" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#e8d5b7" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#e8d5b7" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Left room - darker -->
  <rect width="360" height="400" fill="url(#leftRoom)"/>

  <!-- Right room - slightly lighter -->
  <rect x="440" width="360" height="400" fill="url(#rightRoom)"/>

  <!-- Threshold space - the between -->
  <rect x="360" width="80" height="400" fill="#0a0a14"/>

  <!-- Light spilling down through doorway -->
  <rect x="370" y="40" width="60" height="360" fill="url(#lightSpill)" opacity="0.4"/>

  <!-- Horizontal glow at midpoint -->
  <rect x="300" y="185" width="200" height="30" fill="url(#doorGlow)"/>

  <!-- Door frame - left jamb -->
  <rect x="358" y="30" width="4" height="340" fill="#2a2a3a"/>
  <rect x="356" y="30" width="2" height="340" fill="#3a3a4a" opacity="0.5"/>

  <!-- Door frame - right jamb -->
  <rect x="438" y="30" width="4" height="340" fill="#2a2a3a"/>
  <rect x="442" y="30" width="2" height="340" fill="#3a3a4a" opacity="0.5"/>

  <!-- Door frame - lintel -->
  <rect x="356" y="28" width="90" height="4" fill="#2a2a3a"/>

  <!-- Threshold stone at bottom -->
  <rect x="358" y="368" width="84" height="4" fill="#3a3a4a"/>

  <!-- Figure silhouette in threshold - abstract, geometric -->
  <ellipse cx="400" cy="150" rx="12" ry="14" fill="#0d0d1a" opacity="0.8"/>
  <rect x="391" y="163" width="18" height="45" rx="3" fill="#0d0d1a" opacity="0.8"/>
  <rect x="388" y="208" width="10" height="50" rx="2" fill="#0d0d1a" opacity="0.7"/>
  <rect x="402" y="208" width="10" height="50" rx="2" fill="#0d0d1a" opacity="0.7"/>

  <!-- Subtle particles/motes in the light -->
  <circle cx="385" cy="100" r="1" fill="#e8d5b7" opacity="0.3"/>
  <circle cx="410" cy="140" r="0.8" fill="#e8d5b7" opacity="0.25"/>
  <circle cx="395" cy="200" r="1.2" fill="#e8d5b7" opacity="0.2"/>
  <circle cx="405" cy="280" r="0.8" fill="#e8d5b7" opacity="0.15"/>
  <circle cx="390" cy="320" r="1" fill="#e8d5b7" opacity="0.1"/>
  <circle cx="415" cy="80" r="0.6" fill="#e8d5b7" opacity="0.35"/>
  <circle cx="398" cy="250" r="0.9" fill="#e8d5b7" opacity="0.2"/>

  <!-- Faint floor lines suggesting perspective in each room -->
  <line x1="0" y1="370" x2="358" y2="370" stroke="#2a2a3a" stroke-width="0.5" opacity="0.4"/>
  <line x1="442" y1="370" x2="800" y2="370" stroke="#2a2a3a" stroke-width="0.5" opacity="0.4"/>

  <!-- Shadow cast by figure into left room -->
  <polygon points="358,258 320,370 358,370" fill="#0a0a14" opacity="0.3"/>

  <!-- Subtle warm edge light on right side of figure -->
  <rect x="408" y="163" width="1.5" height="90" fill="#e8d5b7" opacity="0.15"/>
</svg>
