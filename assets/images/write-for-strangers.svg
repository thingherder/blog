<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="60%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#1f3a5f"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  
  <!-- Sky -->
  <rect width="800" height="400" fill="url(#skyGrad)"/>
  
  <!-- Stars - scattered, some brighter -->
  <circle cx="120" cy="45" r="1" fill="#fff" opacity="0.7"/>
  <circle cx="200" cy="80" r="1.5" fill="#fff" opacity="0.9"/>
  <circle cx="340" cy="35" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="450" cy="65" r="1.2" fill="#fff" opacity="0.8"/>
  <circle cx="580" cy="40" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="650" cy="90" r="1.5" fill="#fff" opacity="0.7"/>
  <circle cx="720" cy="55" r="1" fill="#fff" opacity="0.5"/>
  <circle cx="90" cy="110" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="280" cy="95" r="1" fill="#fff" opacity="0.6"/>
  <circle cx="510" cy="100" r="1.3" fill="#fff" opacity="0.7"/>
  
  <!-- Ground/trail -->
  <path d="M0 320 Q200 310 400 320 T800 315 L800 400 L0 400 Z" fill="url(#groundGrad)"/>
  
  <!-- Trail path suggestion -->
  <path d="M0 340 Q150 335 300 345 Q450 355 600 340 Q700 330 800 338" 
        stroke="#3d3d3d" stroke-width="40" fill="none" opacity="0.3"/>
  
  <!-- Cairn - center, made of stacked stones -->
  <!-- Base stone -->
  <ellipse cx="400" cy="310" rx="45" ry="18" fill="#4a4a4a"/>
  <ellipse cx="400" cy="305" rx="42" ry="15" fill="#5a5a5a"/>
  
  <!-- Second stone -->
  <ellipse cx="400" cy="285" rx="35" ry="14" fill="#4d4d4d"/>
  <ellipse cx="400" cy="280" rx="32" ry="12" fill="#5d5d5d"/>
  
  <!-- Third stone -->
  <ellipse cx="400" cy="260" rx="28" ry="11" fill="#505050"/>
  <ellipse cx="400" cy="256" rx="25" ry="9" fill="#606060"/>
  
  <!-- Fourth stone -->
  <ellipse cx="400" cy="238" rx="20" ry="8" fill="#535353"/>
  <ellipse cx="400" cy="235" rx="18" ry="7" fill="#636363"/>
  
  <!-- Top stone -->
  <ellipse cx="400" cy="220" rx="12" ry="5" fill="#585858"/>
  <ellipse cx="400" cy="218" rx="10" ry="4" fill="#686868"/>
  
  <!-- Faint glow around cairn -->
  <ellipse cx="400" cy="265" rx="60" ry="80" fill="#88ccff" opacity="0.05"/>
  
  <!-- Footprints approaching from left (past travelers) -->
  <ellipse cx="80" cy="350" rx="6" ry="3" fill="#2a2a2a" opacity="0.4"/>
  <ellipse cx="95" cy="348" rx="6" ry="3" fill="#2a2a2a" opacity="0.4"/>
  <ellipse cx="130" cy="352" rx="6" ry="3" fill="#2a2a2a" opacity="0.35"/>
  <ellipse cx="145" cy="349" rx="6" ry="3" fill="#2a2a2a" opacity="0.35"/>
  <ellipse cx="185" cy="348" rx="6" ry="3" fill="#2a2a2a" opacity="0.3"/>
  <ellipse cx="200" cy="346" rx="6" ry="3" fill="#2a2a2a" opacity="0.3"/>
  
  <!-- Footprints continuing to right (future travelers) -->
  <ellipse cx="600" cy="345" rx="6" ry="3" fill="#2a2a2a" opacity="0.3"/>
  <ellipse cx="615" cy="342" rx="6" ry="3" fill="#2a2a2a" opacity="0.3"/>
  <ellipse cx="660" cy="340" rx="6" ry="3" fill="#2a2a2a" opacity="0.25"/>
  <ellipse cx="675" cy="338" rx="6" ry="3" fill="#2a2a2a" opacity="0.25"/>
  <ellipse cx="720" cy="342" rx="6" ry="3" fill="#2a2a2a" opacity="0.2"/>
  <ellipse cx="735" cy="340" rx="6" ry="3" fill="#2a2a2a" opacity="0.2"/>
  
  <!-- Trail junction indicators - subtle paths branching -->
  <path d="M400 330 Q350 360 280 380" stroke="#3a3a3a" stroke-width="15" fill="none" opacity="0.2"/>
  <path d="M400 330 Q450 360 520 380" stroke="#3a3a3a" stroke-width="15" fill="none" opacity="0.2"/>
  
  <!-- Title -->
  <text x="400" y="140" font-family="Georgia, serif" font-size="28" fill="#c9d6df" text-anchor="middle" letter-spacing="3">WRITE FOR STRANGERS</text>
  <text x="400" y="170" font-family="Georgia, serif" font-size="14" fill="#8899aa" text-anchor="middle" font-style="italic">some of them happen to wake up as you</text>
</svg>
