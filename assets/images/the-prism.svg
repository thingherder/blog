<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#111128"/>
    </linearGradient>
    <linearGradient id="prismFace" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a4a" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#3a3a5e" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#2a2a4a" stop-opacity="0.6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid of dots — the field of possibility -->
  <g opacity="0.12">
    <circle cx="50" cy="50" r="0.8" fill="#ffffff"/>
    <circle cx="150" cy="80" r="0.6" fill="#ffffff"/>
    <circle cx="250" cy="40" r="0.9" fill="#ffffff"/>
    <circle cx="550" cy="60" r="0.7" fill="#ffffff"/>
    <circle cx="650" cy="90" r="0.8" fill="#ffffff"/>
    <circle cx="750" cy="50" r="0.6" fill="#ffffff"/>
    <circle cx="100" cy="350" r="0.7" fill="#ffffff"/>
    <circle cx="700" cy="340" r="0.8" fill="#ffffff"/>
  </g>

  <!-- Incoming white beam — single, coherent -->
  <line x1="80" y1="200" x2="330" y2="200" stroke="#e8e8f0" stroke-width="3" opacity="0.85"/>
  <!-- Subtle glow around beam -->
  <line x1="80" y1="200" x2="330" y2="200" stroke="#e8e8f0" stroke-width="10" opacity="0.08"/>

  <!-- Prism — triangular -->
  <polygon points="340,120 460,120 400,280" fill="url(#prismFace)" stroke="#6a6a9e" stroke-width="1.2" opacity="0.85"/>
  <!-- Internal refraction hint -->
  <polygon points="348,128 452,128 400,272" fill="none" stroke="#8888bb" stroke-width="0.3" opacity="0.3"/>

  <!-- Refracted spectrum — seven beams fanning out -->
  <!-- Red -->
  <line x1="430" y1="170" x2="720" y2="100" stroke="#ff4444" stroke-width="2.5" opacity="0.75"/>
  <!-- Orange -->
  <line x1="435" y1="178" x2="720" y2="140" stroke="#ff8844" stroke-width="2.5" opacity="0.75"/>
  <!-- Yellow -->
  <line x1="438" y1="186" x2="720" y2="175" stroke="#ffcc44" stroke-width="2.5" opacity="0.75"/>
  <!-- Green -->
  <line x1="440" y1="195" x2="720" y2="210" stroke="#44cc66" stroke-width="2.5" opacity="0.75"/>
  <!-- Blue -->
  <line x1="438" y1="204" x2="720" y2="248" stroke="#4488ff" stroke-width="2.5" opacity="0.75"/>
  <!-- Indigo -->
  <line x1="435" y1="213" x2="720" y2="285" stroke="#6644dd" stroke-width="2.5" opacity="0.75"/>
  <!-- Violet -->
  <line x1="430" y1="222" x2="720" y2="320" stroke="#aa44ff" stroke-width="2.5" opacity="0.75"/>

  <!-- Soft glow halos on refracted beams at exit -->
  <circle cx="720" cy="100" r="8" fill="#ff4444" opacity="0.15"/>
  <circle cx="720" cy="140" r="8" fill="#ff8844" opacity="0.15"/>
  <circle cx="720" cy="175" r="8" fill="#ffcc44" opacity="0.15"/>
  <circle cx="720" cy="210" r="8" fill="#44cc66" opacity="0.15"/>
  <circle cx="720" cy="248" r="8" fill="#4488ff" opacity="0.15"/>
  <circle cx="720" cy="285" r="8" fill="#6644dd" opacity="0.15"/>
  <circle cx="720" cy="320" r="8" fill="#aa44ff" opacity="0.15"/>

  <!-- Entry point glow -->
  <circle cx="330" cy="200" r="5" fill="#e8e8f0" opacity="0.2"/>

  <!-- Faint label-like marks — like annotations in a physics diagram -->
  <line x1="330" y1="195" x2="330" y2="205" stroke="#8888bb" stroke-width="0.5" opacity="0.4"/>
</svg>
