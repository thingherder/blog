<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="forge-bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0a10;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#12121a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="strike-glow" cx="50%" cy="45%" r="30%">
      <stop offset="0%" style="stop-color:#ffaa33;stop-opacity:0.35" />
      <stop offset="50%" style="stop-color:#e94520;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#e94520;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="anvil-body" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4a4a55;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#33333d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#22222a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="anvil-face" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6a6a78;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a4a55;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffeeaa;stop-opacity:1" />
      <stop offset="40%" style="stop-color:#ffaa33;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#ff6633;stop-opacity:0" />
    </radialGradient>
  </defs>

  <rect width="800" height="400" fill="url(#forge-bg)"/>

  <!-- Strike glow -->
  <rect width="800" height="400" fill="url(#strike-glow)"/>

  <!-- Anvil base — wide trapezoidal block -->
  <polygon points="280,320 520,320 500,280 300,280" fill="#1a1a22" stroke="#2a2a33" stroke-width="1"/>

  <!-- Anvil waist — narrower middle section -->
  <polygon points="310,280 490,280 480,250 320,250" fill="url(#anvil-body)" stroke="#3a3a44" stroke-width="1"/>

  <!-- Anvil body — main mass -->
  <polygon points="300,250 510,250 520,220 290,220" fill="url(#anvil-body)" stroke="#4a4a55" stroke-width="1.2"/>

  <!-- Anvil face — flat top surface -->
  <polygon points="280,220 530,220 540,210 270,210" fill="url(#anvil-face)" stroke="#5a5a66" stroke-width="1"/>

  <!-- Horn — tapering cone to the left -->
  <polygon points="270,210 270,220 160,218 160,213" fill="url(#anvil-body)" stroke="#4a4a55" stroke-width="1"/>
  <!-- Horn tip -->
  <ellipse cx="160" cy="215.5" rx="3" ry="3.5" fill="#3a3a44" stroke="#4a4a55" stroke-width="0.8"/>

  <!-- Heel — stepped extension to the right -->
  <polygon points="530,210 530,220 570,220 570,212" fill="url(#anvil-body)" stroke="#4a4a55" stroke-width="1"/>

  <!-- Hardy hole -->
  <rect x="520" y="211" width="8" height="8" fill="#0a0a10" stroke="#2a2a33" stroke-width="0.5"/>
  <!-- Pritchel hole -->
  <circle cx="545" cy="215" r="3" fill="#0a0a10" stroke="#2a2a33" stroke-width="0.5"/>

  <!-- Face marks — subtle texture of use -->
  <g opacity="0.08">
    <line x1="310" y1="213" x2="312" y2="214" stroke="#8888aa" stroke-width="0.5"/>
    <line x1="340" y1="212" x2="343" y2="213" stroke="#8888aa" stroke-width="0.4"/>
    <line x1="370" y1="214" x2="371" y2="212" stroke="#8888aa" stroke-width="0.5"/>
    <line x1="400" y1="213" x2="402" y2="214" stroke="#8888aa" stroke-width="0.6"/>
    <line x1="430" y1="212" x2="433" y2="213" stroke="#8888aa" stroke-width="0.4"/>
    <line x1="460" y1="214" x2="461" y2="212" stroke="#8888aa" stroke-width="0.5"/>
    <line x1="490" y1="213" x2="492" y2="214" stroke="#8888aa" stroke-width="0.4"/>
  </g>

  <!-- Impact point — where hammer meets metal on anvil face -->
  <ellipse cx="400" cy="208" rx="20" ry="4" fill="#ffaa33" opacity="0.15"/>

  <!-- Hot metal on the face — a small bar being worked -->
  <rect x="375" y="205" width="50" height="5" rx="1" fill="#cc4422" opacity="0.7"/>
  <rect x="380" y="206" width="40" height="3" rx="1" fill="#ff6633" opacity="0.4"/>

  <!-- Hammer above — caught mid-swing -->
  <!-- Handle -->
  <line x1="400" y1="160" x2="400" y2="95" stroke="#5a3a25" stroke-width="4" stroke-linecap="round"/>
  <!-- Head -->
  <rect x="383" y="153" width="34" height="14" rx="2" fill="#4a4a55" stroke="#5a5a66" stroke-width="1"/>
  <!-- Face of hammer head -->
  <rect x="383" y="155" width="34" height="3" rx="1" fill="#5a5a66"/>

  <!-- Sparks flying from impact -->
  <circle cx="365" cy="195" r="1.8" fill="url(#spark)"/>
  <circle cx="438" cy="192" r="1.5" fill="url(#spark)"/>
  <circle cx="350" cy="185" r="1.2" fill="url(#spark)"/>
  <circle cx="445" cy="188" r="1.0" fill="url(#spark)"/>
  <circle cx="370" cy="178" r="1.3" fill="url(#spark)"/>
  <circle cx="430" cy="175" r="0.9" fill="url(#spark)"/>
  <circle cx="355" cy="170" r="1.0" fill="url(#spark)"/>
  <circle cx="450" cy="180" r="0.7" fill="url(#spark)"/>
  <circle cx="380" cy="168" r="0.8" fill="url(#spark)"/>
  <circle cx="420" cy="172" r="1.1" fill="url(#spark)"/>

  <!-- Spark trails -->
  <g opacity="0.3">
    <line x1="365" y1="195" x2="345" y2="175" stroke="#ffaa33" stroke-width="0.5"/>
    <line x1="438" y1="192" x2="460" y2="170" stroke="#ffaa33" stroke-width="0.4"/>
    <line x1="350" y1="185" x2="330" y2="160" stroke="#ffcc66" stroke-width="0.4"/>
    <line x1="445" y1="188" x2="465" y2="165" stroke="#ffcc66" stroke-width="0.3"/>
    <line x1="370" y1="178" x2="355" y2="155" stroke="#ffaa33" stroke-width="0.3"/>
  </g>

  <!-- Ring lines — concentric arcs emanating from the anvil -->
  <g opacity="0.06">
    <path d="M250,230 Q400,270 550,230" fill="none" stroke="#aabbcc" stroke-width="1"/>
    <path d="M230,245 Q400,290 570,245" fill="none" stroke="#aabbcc" stroke-width="0.8"/>
    <path d="M210,260 Q400,310 590,260" fill="none" stroke="#aabbcc" stroke-width="0.6"/>
    <path d="M190,275 Q400,330 610,275" fill="none" stroke="#aabbcc" stroke-width="0.4"/>
  </g>

  <!-- Weight indicators — subtle mass lines at base -->
  <g opacity="0.1">
    <line x1="300" y1="325" x2="500" y2="325" stroke="#4a4a66" stroke-width="1"/>
    <line x1="310" y1="330" x2="490" y2="330" stroke="#4a4a66" stroke-width="0.8"/>
    <line x1="320" y1="335" x2="480" y2="335" stroke="#4a4a66" stroke-width="0.6"/>
  </g>

</svg>
