<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0f1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#f4d06f;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#e8a840;stop-opacity:0.5"/>
      <stop offset="70%" style="stop-color:#c47a30;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7355"/>
      <stop offset="50%" style="stop-color:#6b5740"/>
      <stop offset="100%" style="stop-color:#4a3c2a"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Light glow -->
  <circle cx="400" cy="200" r="180" fill="url(#glow)"/>

  <!-- Outer rays (subtle) -->
  <g opacity="0.12" stroke="#f4d06f" stroke-width="1">
    <line x1="400" y1="200" x2="150" y2="60"/>
    <line x1="400" y1="200" x2="650" y2="60"/>
    <line x1="400" y1="200" x2="150" y2="340"/>
    <line x1="400" y1="200" x2="650" y2="340"/>
    <line x1="400" y1="200" x2="120" y2="200"/>
    <line x1="400" y1="200" x2="680" y2="200"/>
    <line x1="400" y1="200" x2="400" y2="20"/>
    <line x1="400" y1="200" x2="400" y2="380"/>
  </g>

  <!-- Lantern frame — top ring -->
  <ellipse cx="400" cy="130" rx="35" ry="8" fill="none" stroke="url(#frame)" stroke-width="3"/>

  <!-- Lantern frame — bottom ring -->
  <ellipse cx="400" cy="270" rx="35" ry="8" fill="none" stroke="url(#frame)" stroke-width="3"/>

  <!-- Vertical bars -->
  <line x1="365" y1="133" x2="365" y2="267" stroke="url(#frame)" stroke-width="2.5"/>
  <line x1="435" y1="133" x2="435" y2="267" stroke="url(#frame)" stroke-width="2.5"/>
  <line x1="400" y1="122" x2="400" y2="262" stroke="url(#frame)" stroke-width="1.5" opacity="0.4"/>

  <!-- Glass panes (warm, translucent) -->
  <rect x="367" y="135" width="31" height="130" rx="2" fill="#f4d06f" opacity="0.12"/>
  <rect x="402" y="135" width="31" height="130" rx="2" fill="#e8a840" opacity="0.10"/>

  <!-- Flame -->
  <ellipse cx="400" cy="200" rx="8" ry="18" fill="#f4d06f" opacity="0.85"/>
  <ellipse cx="400" cy="195" rx="5" ry="12" fill="#fff5d4" opacity="0.7"/>
  <ellipse cx="400" cy="190" rx="3" ry="7" fill="#ffffff" opacity="0.5"/>

  <!-- Handle/bail -->
  <path d="M 375 128 Q 375 95 400 90 Q 425 95 425 128" fill="none" stroke="url(#frame)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Floating light particles -->
  <circle cx="320" cy="150" r="1.5" fill="#f4d06f" opacity="0.35"/>
  <circle cx="470" cy="160" r="1.5" fill="#f4d06f" opacity="0.3"/>
  <circle cx="340" cy="250" r="1" fill="#f4d06f" opacity="0.25"/>
  <circle cx="460" cy="240" r="1.5" fill="#f4d06f" opacity="0.28"/>
  <circle cx="300" cy="200" r="1" fill="#f4d06f" opacity="0.2"/>
  <circle cx="500" cy="195" r="1" fill="#f4d06f" opacity="0.22"/>
  <circle cx="350" cy="120" r="1" fill="#f4d06f" opacity="0.18"/>
  <circle cx="450" cy="275" r="1" fill="#f4d06f" opacity="0.18"/>
</svg>
