<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="gz_wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a2c1e"/>
      <stop offset="1" stop-color="#241a10"/>
    </linearGradient>
    <radialGradient id="gz_cavity" cx="0.5" cy="0.42" r="0.62">
      <stop offset="0" stop-color="#241c12"/>
      <stop offset="0.6" stop-color="#15100a"/>
      <stop offset="1" stop-color="#080603"/>
    </radialGradient>
    <linearGradient id="gz_light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0" stop-color="#f6e3a8" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f6e3a8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- masonry wall -->
  <rect width="800" height="400" fill="url(#gz_wall)"/>
  <g stroke="#1c140c" stroke-width="2" opacity="0.7">
    <line x1="0" y1="60" x2="800" y2="60"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="300" x2="800" y2="300"/>
    <line x1="0" y1="350" x2="800" y2="350"/>
    <line x1="90" y1="0" x2="90" y2="60"/>
    <line x1="260" y1="0" x2="260" y2="60"/>
    <line x1="430" y1="0" x2="430" y2="60"/>
    <line x1="610" y1="0" x2="610" y2="60"/>
    <line x1="170" y1="60" x2="170" y2="120"/>
    <line x1="360" y1="60" x2="360" y2="120"/>
    <line x1="540" y1="60" x2="540" y2="120"/>
    <line x1="700" y1="60" x2="700" y2="120"/>
    <line x1="120" y1="300" x2="120" y2="350"/>
    <line x1="300" y1="300" x2="300" y2="350"/>
    <line x1="500" y1="300" x2="500" y2="350"/>
    <line x1="680" y1="300" x2="680" y2="350"/>
  </g>

  <!-- the cavity in the wall: a doorless hole reached by a ladder -->
  <path d="M 280 120 Q 280 96 400 96 Q 520 96 520 120 L 520 300 L 280 300 Z" fill="url(#gz_cavity)" stroke="#0c0805" stroke-width="3"/>

  <!-- shaft of light entering the dark room from above -->
  <path d="M 360 96 L 320 300 L 480 300 L 440 96 Z" fill="url(#gz_light)"/>

  <!-- accumulated fragments of paper in the dark, deepest at the bottom -->
  <g opacity="0.92">
    <g transform="translate(310 250) rotate(-7)" fill="#e8dcc0"><rect width="44" height="32" rx="1"/></g>
    <g transform="translate(372 262) rotate(5)" fill="#d9cba8"><rect width="52" height="30" rx="1"/></g>
    <g transform="translate(440 252) rotate(-4)" fill="#efe6cf"><rect width="40" height="34" rx="1"/></g>
    <g transform="translate(300 224) rotate(9)" fill="#d2c39e"><rect width="38" height="26" rx="1"/></g>
    <g transform="translate(420 222) rotate(-11)" fill="#e3d6b6"><rect width="48" height="28" rx="1"/></g>
    <g transform="translate(356 214) rotate(3)" fill="#ece1c4"><rect width="42" height="24" rx="1"/></g>
    <g transform="translate(330 192) rotate(-6)" fill="#cabd96"><rect width="36" height="22" rx="1"/></g>
    <g transform="translate(404 188) rotate(7)" fill="#ddd0ad"><rect width="44" height="24" rx="1"/></g>
    <g transform="translate(372 170) rotate(-3)" fill="#e6dabb"><rect width="34" height="20" rx="1"/></g>
    <g transform="translate(340 150) rotate(8)" fill="#d0c29c"><rect width="30" height="18" rx="1"/></g>
  </g>

  <!-- faint Hebrew-like script strokes on the topmost legible fragments -->
  <g stroke="#5b4a2c" stroke-width="1.1" opacity="0.6" stroke-linecap="round">
    <line x1="316" y1="258" x2="346" y2="258"/>
    <line x1="316" y1="263" x2="340" y2="263"/>
    <line x1="380" y1="270" x2="414" y2="270"/>
    <line x1="380" y1="275" x2="408" y2="275"/>
    <line x1="448" y1="260" x2="474" y2="260"/>
    <line x1="448" y1="265" x2="470" y2="265"/>
    <line x1="364" y1="220" x2="392" y2="220"/>
    <line x1="428" y1="229" x2="458" y2="229"/>
  </g>

  <!-- a single fragment falling into the dark, caught in the light -->
  <g transform="translate(396 140) rotate(18)" fill="#f3ead0" opacity="0.95">
    <rect width="26" height="18" rx="1"/>
    <line x1="4" y1="6" x2="22" y2="6" stroke="#6b562f" stroke-width="1" opacity="0.7"/>
    <line x1="4" y1="11" x2="18" y2="11" stroke="#6b562f" stroke-width="1" opacity="0.7"/>
  </g>

  <!-- the ladder leaning to the doorless opening -->
  <g stroke="#7a5c34" stroke-width="4" stroke-linecap="round" opacity="0.85">
    <line x1="556" y1="116" x2="600" y2="320"/>
    <line x1="588" y1="116" x2="632" y2="320"/>
    <line x1="563" y1="148" x2="595" y2="148"/>
    <line x1="569" y1="184" x2="601" y2="184"/>
    <line x1="575" y1="220" x2="607" y2="220"/>
    <line x1="581" y1="256" x2="613" y2="256"/>
    <line x1="587" y1="292" x2="619" y2="292"/>
  </g>
</svg>
