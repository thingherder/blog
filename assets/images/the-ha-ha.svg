<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- soft late-afternoon sky over the park -->
    <linearGradient id="hh_sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8e0cf"/>
      <stop offset="0.55" stop-color="#d6d8c8"/>
      <stop offset="1" stop-color="#c3ccbd"/>
    </linearGradient>
    <!-- hills gone blue with distance -->
    <linearGradient id="hh_hills" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9fb0b4"/>
      <stop offset="1" stop-color="#8ea39f"/>
    </linearGradient>
    <!-- the grazed meadow on the far side of the ditch -->
    <linearGradient id="hh_meadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#8fa361"/>
      <stop offset="1" stop-color="#788f4e"/>
    </linearGradient>
    <!-- the clipped garden lawn, the terrace side -->
    <linearGradient id="hh_lawn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7fa14c"/>
      <stop offset="1" stop-color="#5f8038"/>
    </linearGradient>
    <!-- the shadow pooled in the sunken ditch -->
    <linearGradient id="hh_ditch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3c3a2c"/>
      <stop offset="1" stop-color="#25281c"/>
    </linearGradient>
    <filter id="hh_soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
  </defs>

  <!-- sky -->
  <rect width="800" height="400" fill="url(#hh_sky)"/>

  <!-- far hills, blue with distance -->
  <path d="M 0 196 Q 150 158 320 182 Q 520 210 660 176 Q 740 158 800 172 L 800 240 L 0 240 Z"
        fill="url(#hh_hills)" fill-opacity="0.85" filter="url(#hh_soft)"/>
  <path d="M 0 214 Q 200 186 400 206 Q 600 226 800 200 L 800 250 L 0 250 Z"
        fill="#9aab9c" fill-opacity="0.6" filter="url(#hh_soft)"/>

  <!-- the grazed park meadow, running back to the hills -->
  <path d="M 0 226 L 800 214 L 800 300 L 0 300 Z" fill="url(#hh_meadow)"/>

  <!-- a line of oaks at the meadow's edge -->
  <g fill="#5c6f3c" fill-opacity="0.8" filter="url(#hh_soft)">
    <ellipse cx="120" cy="224" rx="26" ry="16"/>
    <ellipse cx="168" cy="228" rx="20" ry="13"/>
    <ellipse cx="612" cy="222" rx="30" ry="18"/>
    <ellipse cx="662" cy="227" rx="22" ry="14"/>
    <ellipse cx="700" cy="230" rx="18" ry="11"/>
  </g>

  <!-- the deer, come down the far slope and stopped at the wall it cannot climb -->
  <g fill="#4b3a2a" filter="url(#hh_soft)">
    <path d="M 356 300 L 356 285 L 361 283 L 361 300 Z"/>
    <path d="M 356 285 Q 350 280 349 274 L 351 272 Q 356 279 361 283 Z"/>
    <path d="M 373 300 L 373 284 L 384 282 L 388 288 L 388 300 Z"/>
    <ellipse cx="365" cy="286" rx="12" ry="7"/>
    <path d="M 388 288 Q 396 286 399 279 L 401 280 L 400 285 L 404 283 L 402 288 Q 396 292 389 291 Z"/>
    <rect x="357" y="296" width="2.4" height="9"/>
    <rect x="362" y="296" width="2.4" height="9"/>
    <rect x="380" y="296" width="2.4" height="9"/>
    <rect x="385" y="296" width="2.4" height="9"/>
  </g>

  <!-- the ha-ha: the sunken ditch, below the sightline -->
  <path d="M 0 300 L 800 300 L 800 322 Q 400 336 0 322 Z" fill="url(#hh_ditch)"/>
  <!-- the vertical retaining wall on the garden side, faced in stone -->
  <path d="M 0 322 Q 400 336 800 322 L 800 344 Q 400 358 0 344 Z" fill="#6f6656"/>
  <g stroke="#544c3f" stroke-width="0.8" stroke-opacity="0.7">
    <line x1="70" y1="326" x2="70" y2="349"/>
    <line x1="150" y1="328" x2="150" y2="351"/>
    <line x1="240" y1="330" x2="240" y2="353"/>
    <line x1="330" y1="331" x2="330" y2="354"/>
    <line x1="430" y1="332" x2="430" y2="355"/>
    <line x1="530" y1="331" x2="530" y2="354"/>
    <line x1="620" y1="330" x2="620" y2="353"/>
    <line x1="710" y1="328" x2="710" y2="351"/>
    <line x1="0" y1="335" x2="800" y2="329" stroke-opacity="0.5"/>
  </g>

  <!-- the clipped lawn of the garden, running up to the terrace -->
  <path d="M 0 344 Q 400 358 800 344 L 800 400 L 0 400 Z" fill="url(#hh_lawn)"/>

  <!-- the sightline from the terrace: level, skimming the grass, crossing the
       hidden ditch unbroken all the way to the hills -->
  <line x1="34" y1="352" x2="792" y2="300" stroke="#f4efe0" stroke-width="1.1"
        stroke-opacity="0.55" stroke-dasharray="5 6" filter="url(#hh_soft)"/>
  <circle cx="34" cy="352" r="3" fill="#f4efe0" fill-opacity="0.8"/>

  <!-- a rose bed by the terrace, the thing the wall protects -->
  <g filter="url(#hh_soft)">
    <circle cx="58" cy="372" r="4.5" fill="#c0607a" fill-opacity="0.85"/>
    <circle cx="72" cy="378" r="4" fill="#cc6f86" fill-opacity="0.85"/>
    <circle cx="47" cy="381" r="3.6" fill="#b5566f" fill-opacity="0.85"/>
    <circle cx="66" cy="388" r="4.2" fill="#c9697f" fill-opacity="0.85"/>
  </g>
</svg>
