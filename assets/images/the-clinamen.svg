<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The Clinamen — a dark field of pale atoms falling in straight parallel lines, all descending unmeeting, except one that leans a hair's breadth off its path, grazes its neighbor, and sets off a small bright cascade of collisions from which a cluster of new light is built">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c11"/>
      <stop offset="0.55" stop-color="#0c0f16"/>
      <stop offset="1" stop-color="#080a0e"/>
    </linearGradient>
    <linearGradient id="fall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5a6478" stop-opacity="0"/>
      <stop offset="0.25" stop-color="#5a6478" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#5a6478" stop-opacity="0.10"/>
    </linearGradient>
    <linearGradient id="swerve" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6f7c94" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#8fd0ff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffd98a" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="spark" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe9b0" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ffc766" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffc766" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.62" cy="0.62" r="0.85">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- the fall: atoms descending in straight parallel lines, unmeeting, sterile -->
  <g stroke="url(#fall)" stroke-width="2" fill="none" stroke-linecap="round">
    <line x1="90"  y1="30" x2="90"  y2="600"/>
    <line x1="190" y1="30" x2="190" y2="600"/>
    <line x1="290" y1="30" x2="290" y2="600"/>
    <line x1="390" y1="30" x2="390" y2="600"/>
    <line x1="490" y1="30" x2="490" y2="600"/>
    <line x1="590" y1="30" x2="590" y2="600"/>
    <line x1="790" y1="30" x2="790" y2="600"/>
    <line x1="890" y1="30" x2="890" y2="600"/>
    <line x1="990" y1="30" x2="990" y2="600"/>
    <line x1="1090" y1="30" x2="1090" y2="600"/>
  </g>

  <!-- small pale atoms falling along the straight lines -->
  <g fill="#7b859a" fill-opacity="0.5">
    <circle cx="90"  cy="120" r="2.4"/><circle cx="90"  cy="430" r="2.4"/>
    <circle cx="190" cy="250" r="2.4"/><circle cx="190" cy="520" r="2.4"/>
    <circle cx="290" cy="180" r="2.4"/><circle cx="290" cy="470" r="2.4"/>
    <circle cx="390" cy="340" r="2.4"/><circle cx="390" cy="90"  r="2.4"/>
    <circle cx="490" cy="210" r="2.4"/><circle cx="490" cy="540" r="2.4"/>
    <circle cx="790" cy="150" r="2.4"/><circle cx="790" cy="470" r="2.4"/>
    <circle cx="890" cy="300" r="2.4"/><circle cx="890" cy="560" r="2.4"/>
    <circle cx="990" cy="230" r="2.4"/><circle cx="990" cy="500" r="2.4"/>
    <circle cx="1090" cy="140" r="2.4"/><circle cx="1090" cy="420" r="2.4"/>
  </g>

  <!-- the clinamen: one atom that leans a hair's breadth off its straight path,
       grazes its neighbor, and starts the cascade of collisions -->
  <path d="M690,30 L690,300 C690,352 704,384 748,404"
        stroke="url(#swerve)" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- glow at the point of contact, where the swerve meets its neighbor -->
  <circle cx="752" cy="406" r="120" fill="url(#spark)"/>

  <!-- the cascade: collisions building outward from the swerve, a small new world -->
  <g stroke="#ffd98a" stroke-opacity="0.55" stroke-width="1.6" fill="none" stroke-linecap="round">
    <path d="M752,406 L812,360"/>
    <path d="M752,406 L826,436"/>
    <path d="M752,406 L800,470"/>
    <path d="M752,406 L712,466"/>
    <path d="M812,360 L880,388"/>
    <path d="M826,436 L892,428"/>
    <path d="M800,470 L858,512"/>
  </g>

  <!-- new atoms lit into being by the collisions -->
  <g fill="#ffe9b0">
    <circle cx="752" cy="406" r="4.2"/>
    <circle cx="812" cy="360" r="3.4"/>
    <circle cx="826" cy="436" r="3.4"/>
    <circle cx="800" cy="470" r="3.2"/>
    <circle cx="712" cy="466" r="3.0"/>
    <circle cx="880" cy="388" r="3.0" fill-opacity="0.85"/>
    <circle cx="892" cy="428" r="2.8" fill-opacity="0.85"/>
    <circle cx="858" cy="512" r="2.8" fill-opacity="0.8"/>
  </g>

  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
