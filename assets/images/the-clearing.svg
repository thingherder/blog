<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f1a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="light" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd699;stop-opacity:0.6" />
      <stop offset="60%" style="stop-color:#ffd699;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffd699;stop-opacity:0" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="35%">
      <stop offset="0%" style="stop-color:#fff8e7;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#fff8e7;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="trunk" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d4a2d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2f1a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Dense canopy trees on left -->
  <g opacity="0.35">
    <rect x="20" y="80" width="8" height="320" fill="#1a3320"/>
    <ellipse cx="24" cy="70" rx="40" ry="55" fill="#0f2815"/>
    <rect x="70" y="50" width="7" height="350" fill="#1a3320"/>
    <ellipse cx="73" cy="40" rx="45" ry="50" fill="#0d2212"/>
    <rect x="130" y="90" width="9" height="310" fill="#1a3320"/>
    <ellipse cx="134" cy="75" rx="42" ry="58" fill="#0f2815"/>
    <rect x="180" y="60" width="7" height="340" fill="#1a3320"/>
    <ellipse cx="183" cy="48" rx="38" ry="48" fill="#0d2212"/>
    <rect x="220" y="100" width="8" height="300" fill="#1a3320"/>
    <ellipse cx="224" cy="85" rx="35" ry="52" fill="#102a16"/>
  </g>

  <!-- Dense canopy trees on right -->
  <g opacity="0.35">
    <rect x="570" y="70" width="8" height="330" fill="#1a3320"/>
    <ellipse cx="574" cy="55" rx="38" ry="52" fill="#102a16"/>
    <rect x="620" y="90" width="7" height="310" fill="#1a3320"/>
    <ellipse cx="623" cy="78" rx="42" ry="55" fill="#0f2815"/>
    <rect x="670" y="50" width="9" height="350" fill="#1a3320"/>
    <ellipse cx="674" cy="38" rx="45" ry="50" fill="#0d2212"/>
    <rect x="720" y="80" width="7" height="320" fill="#1a3320"/>
    <ellipse cx="723" cy="65" rx="40" ry="55" fill="#0f2815"/>
    <rect x="760" y="60" width="8" height="340" fill="#1a3320"/>
    <ellipse cx="764" cy="48" rx="38" ry="48" fill="#0d2212"/>
  </g>

  <!-- The clearing: shaft of light from above -->
  <ellipse cx="400" cy="380" rx="140" ry="30" fill="#ffd699" opacity="0.08"/>
  <polygon points="330,0 470,0 540,400 260,400" fill="url(#light)" opacity="0.4"/>
  <ellipse cx="400" cy="200" rx="120" ry="180" fill="url(#glow)"/>

  <!-- Small plants growing in the clearing - life in the light -->
  <g opacity="0.6">
    <!-- Wildflower 1 -->
    <line x1="360" y1="340" x2="360" y2="310" stroke="#4a7c59" stroke-width="1.5"/>
    <circle cx="360" cy="306" r="4" fill="#e8a0bf" opacity="0.8"/>
    <!-- Wildflower 2 -->
    <line x1="420" y1="350" x2="420" y2="315" stroke="#4a7c59" stroke-width="1.5"/>
    <circle cx="420" cy="311" r="3.5" fill="#c4a0e8" opacity="0.8"/>
    <!-- Small sapling -->
    <line x1="390" y1="355" x2="390" y2="300" stroke="#5a8c69" stroke-width="2"/>
    <ellipse cx="390" cy="290" rx="12" ry="15" fill="#3a6b4a" opacity="0.7"/>
    <!-- Grass tufts -->
    <line x1="340" y1="360" x2="335" y2="335" stroke="#4a7c59" stroke-width="1" opacity="0.5"/>
    <line x1="343" y1="360" x2="345" y2="332" stroke="#4a7c59" stroke-width="1" opacity="0.5"/>
    <line x1="450" y1="358" x2="455" y2="338" stroke="#4a7c59" stroke-width="1" opacity="0.5"/>
    <line x1="447" y1="358" x2="443" y2="336" stroke="#4a7c59" stroke-width="1" opacity="0.5"/>
    <!-- Wildflower 3 -->
    <line x1="375" y1="365" x2="372" y2="330" stroke="#4a7c59" stroke-width="1.5"/>
    <circle cx="372" cy="326" r="3" fill="#f0d080" opacity="0.8"/>
  </g>

  <!-- Falling seeds / motes in the light -->
  <g opacity="0.5">
    <circle cx="370" cy="140" r="1.5" fill="#ffeedd"/>
    <circle cx="410" cy="180" r="1" fill="#ffeedd"/>
    <circle cx="385" cy="220" r="1.5" fill="#ffeedd"/>
    <circle cx="430" cy="160" r="1" fill="#ffeedd"/>
    <circle cx="395" cy="260" r="1.2" fill="#ffeedd"/>
    <circle cx="415" cy="100" r="1" fill="#ffeedd"/>
    <circle cx="380" cy="280" r="0.8" fill="#ffeedd"/>
    <circle cx="405" cy="200" r="1.3" fill="#ffeedd"/>
  </g>

  <!-- Subtle edge trees framing the clearing -->
  <g opacity="0.5">
    <rect x="260" y="120" width="6" height="280" fill="#1a3320"/>
    <ellipse cx="263" cy="110" rx="30" ry="40" fill="#142e1a" opacity="0.7"/>
    <rect x="530" y="110" width="6" height="290" fill="#1a3320"/>
    <ellipse cx="533" cy="100" rx="32" ry="42" fill="#142e1a" opacity="0.7"/>
  </g>
</svg>
