<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="dark-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d0d0d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a0a;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="safelight" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#8b2500;stop-opacity:0.15" />
      <stop offset="60%" style="stop-color:#8b2500;stop-opacity:0.05" />
      <stop offset="100%" style="stop-color:#8b2500;stop-opacity:0" />
    </radialGradient>
    <linearGradient id="develop" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0" />
      <stop offset="40%" style="stop-color:#e94560;stop-opacity:0.7" />
      <stop offset="60%" style="stop-color:#e94560;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.15" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#dark-bg)"/>

  <!-- Safelight glow -->
  <rect width="800" height="400" fill="url(#safelight)"/>

  <!-- Film strip border — top -->
  <g opacity="0.15">
    <rect x="0" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
    <rect x="30" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
    <rect x="60" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
    <rect x="90" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
    <rect x="120" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
    <rect x="150" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
    <rect x="180" y="15" width="18" height="12" rx="2" fill="none" stroke="#e94560" stroke-width="0.8"/>
  </g>

  <!-- The developing image — rectangles emerging from darkness -->
  <!-- Contact sheet grid: faint frames -->
  <g transform="translate(80, 70)">
    <!-- Row of frames, progressively more visible left to right -->
    <!-- Frame 1: barely visible -->
    <rect x="0" y="0" width="90" height="65" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.08"/>
    <rect x="10" y="10" width="70" height="45" fill="#e94560" opacity="0.02"/>

    <!-- Frame 2: slightly more -->
    <rect x="110" y="0" width="90" height="65" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.15"/>
    <rect x="120" y="10" width="70" height="45" fill="#e94560" opacity="0.04"/>

    <!-- Frame 3: developing -->
    <rect x="220" y="0" width="90" height="65" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.3"/>
    <rect x="230" y="10" width="70" height="45" fill="#e94560" opacity="0.08"/>

    <!-- Frame 4: more visible -->
    <rect x="330" y="0" width="90" height="65" fill="none" stroke="#e94560" stroke-width="1" opacity="0.5"/>
    <rect x="340" y="10" width="70" height="45" fill="#e94560" opacity="0.15"/>

    <!-- Frame 5: nearly developed -->
    <rect x="440" y="0" width="90" height="65" fill="none" stroke="#e94560" stroke-width="1.2" opacity="0.7"/>
    <rect x="450" y="10" width="70" height="45" fill="#e94560" opacity="0.25"/>

    <!-- Frame 6: fully developed -->
    <rect x="550" y="0" width="90" height="65" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.9"/>
    <rect x="560" y="10" width="70" height="45" fill="#e94560" opacity="0.4"/>
  </g>

  <!-- Central image emerging — the latent image becoming visible -->
  <g transform="translate(400, 240)">
    <!-- Concentric rectangles suggesting an image resolving -->
    <rect x="-120" y="-60" width="240" height="120" fill="none" stroke="#e94560" stroke-width="0.3" opacity="0.1"/>
    <rect x="-100" y="-50" width="200" height="100" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>
    <rect x="-80" y="-40" width="160" height="80" fill="none" stroke="#e94560" stroke-width="0.8" opacity="0.35"/>
    <rect x="-60" y="-30" width="120" height="60" fill="none" stroke="#e94560" stroke-width="1" opacity="0.5"/>
    <rect x="-40" y="-20" width="80" height="40" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7"/>
    <rect x="-20" y="-10" width="40" height="20" fill="#e94560" opacity="0.35"/>
  </g>

  <!-- Silver halide crystals — scattered dots suggesting emulsion grain -->
  <g opacity="0.25">
    <circle cx="150" cy="320" r="1" fill="#e94560"/>
    <circle cx="180" cy="340" r="1.5" fill="#e94560"/>
    <circle cx="210" cy="310" r="1" fill="#e94560"/>
    <circle cx="250" cy="350" r="1.2" fill="#e94560"/>
    <circle cx="290" cy="325" r="1" fill="#e94560"/>
    <circle cx="330" cy="345" r="1.5" fill="#e94560"/>
    <circle cx="370" cy="315" r="1" fill="#e94560"/>
    <circle cx="420" cy="340" r="1.3" fill="#e94560"/>
    <circle cx="460" cy="330" r="1" fill="#e94560"/>
    <circle cx="510" cy="350" r="1.5" fill="#e94560"/>
    <circle cx="550" cy="320" r="1" fill="#e94560"/>
    <circle cx="590" cy="345" r="1.2" fill="#e94560"/>
    <circle cx="630" cy="335" r="1" fill="#e94560"/>
    <circle cx="670" cy="355" r="1.5" fill="#e94560"/>
  </g>

  <!-- Development tray line — horizontal -->
  <line x1="100" y1="370" x2="700" y2="370" stroke="#e94560" stroke-width="0.8" opacity="0.2"/>
  <line x1="100" y1="372" x2="700" y2="372" stroke="#e94560" stroke-width="0.3" opacity="0.1"/>

  <!-- Timer suggestion — minimal clock face -->
  <g transform="translate(720, 60)" opacity="0.2">
    <circle cx="0" cy="0" r="20" fill="none" stroke="#e94560" stroke-width="1"/>
    <line x1="0" y1="0" x2="0" y2="-14" stroke="#e94560" stroke-width="1"/>
    <line x1="0" y1="0" x2="8" y2="-4" stroke="#e94560" stroke-width="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#e94560"/>
  </g>
</svg>
