<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a0a2a"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow-blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>

  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Shadow cast by an invisible object -->
  <ellipse cx="400" cy="350" rx="120" ry="20" fill="#2a1a3a" filter="url(#shadow-blur)" opacity="0.7"/>
  <ellipse cx="400" cy="348" rx="80" ry="12" fill="#3a2a4a" filter="url(#shadow-blur)" opacity="0.5"/>

  <!-- Fading stones — a cairn dissolving upward -->
  <rect x="370" y="300" width="60" height="20" rx="4" fill="#667" opacity="0.8" transform="rotate(-2 400 310)"/>
  <rect x="375" y="278" width="50" height="18" rx="4" fill="#556" opacity="0.6" transform="rotate(1 400 287)"/>
  <rect x="378" y="258" width="44" height="16" rx="4" fill="#445" opacity="0.4" transform="rotate(-1 400 266)"/>
  <rect x="382" y="240" width="36" height="14" rx="4" fill="#334" opacity="0.25" transform="rotate(2 400 247)"/>
  <rect x="386" y="224" width="28" height="12" rx="4" fill="#223" opacity="0.12"/>
  <rect x="390" y="210" width="20" height="10" rx="4" fill="#112" opacity="0.05"/>

  <!-- Light traces where stones used to be -->
  <line x1="388" y1="205" x2="392" y2="180" stroke="#8866aa" stroke-width="1" opacity="0.3" filter="url(#glow)"/>
  <line x1="395" y1="195" x2="400" y2="165" stroke="#7755aa" stroke-width="0.8" opacity="0.2" filter="url(#glow)"/>
  <line x1="402" y1="200" x2="408" y2="170" stroke="#8866aa" stroke-width="0.6" opacity="0.15" filter="url(#glow)"/>

  <!-- Scattered particles rising — memories becoming atmosphere -->
  <circle cx="385" cy="150" r="1.5" fill="#aa88cc" opacity="0.3"/>
  <circle cx="410" cy="130" r="1" fill="#9977bb" opacity="0.25"/>
  <circle cx="395" cy="110" r="2" fill="#bb99dd" opacity="0.2"/>
  <circle cx="420" cy="95" r="1.2" fill="#aa88cc" opacity="0.15"/>
  <circle cx="380" cy="85" r="1.8" fill="#9977bb" opacity="0.12"/>
  <circle cx="405" cy="70" r="1" fill="#bb99dd" opacity="0.08"/>
  <circle cx="390" cy="55" r="1.5" fill="#aa88cc" opacity="0.05"/>

  <!-- The shadow is sharper than the object -->
  <text x="400" y="430" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#665577" opacity="0.6">the shadow remembers what the stone forgot</text>
</svg>