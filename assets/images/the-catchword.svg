<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- lamplight over an old book -->
    <linearGradient id="cw_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a140c"/>
      <stop offset="1" stop-color="#0b0805"/>
    </linearGradient>
    <radialGradient id="cw_glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#5a4526" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5a4526" stop-opacity="0"/>
    </radialGradient>
    <!-- the aged paper of each page -->
    <linearGradient id="cw_pageL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9dcc0"/>
      <stop offset="1" stop-color="#c9b68e"/>
    </linearGradient>
    <linearGradient id="cw_pageR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9b68e"/>
      <stop offset="1" stop-color="#e9dcc0"/>
    </linearGradient>
    <!-- the shadow that gathers in the gutter -->
    <linearGradient id="cw_gutter" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2b1d0d" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#cw_bg)"/>
  <rect width="800" height="400" fill="url(#cw_glow)"/>

  <!-- the open book: two pages meeting at a central gutter -->
  <path d="M400,64 C300,44 176,52 96,74 L96,336 C176,314 300,306 400,326 Z" fill="url(#cw_pageL)"/>
  <path d="M400,64 C500,44 624,52 704,74 L704,336 C624,314 500,306 400,326 Z" fill="url(#cw_pageR)"/>
  <!-- the gutter shadow between the two leaves -->
  <rect x="372" y="60" width="56" height="270" fill="url(#cw_gutter)"/>
  <path d="M400,64 L400,326" stroke="#7a6642" stroke-width="1" stroke-opacity="0.5"/>

  <!-- LEFT PAGE: body text, faint, in its own quiet ink -->
  <g stroke="#6b5836" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round">
    <path d="M132,104 H352"/>
    <path d="M132,124 H360"/>
    <path d="M132,144 H344"/>
    <path d="M132,164 H358"/>
    <path d="M132,184 H340"/>
    <path d="M132,204 H356"/>
    <path d="M132,224 H346"/>
    <path d="M132,244 H352"/>
  </g>

  <!-- RIGHT PAGE: the sentence continues, the first word set apart -->
  <g stroke="#6b5836" stroke-width="4" stroke-opacity="0.4" stroke-linecap="round">
    <path d="M498,124 H668"/>
    <path d="M448,144 H660"/>
    <path d="M448,164 H672"/>
    <path d="M448,184 H656"/>
    <path d="M448,204 H668"/>
    <path d="M448,224 H650"/>
    <path d="M448,244 H664"/>
  </g>

  <!-- the FIRST WORD of the right page, in living ink -->
  <rect x="448" y="116" width="42" height="15" rx="3" fill="#7c1f14"/>

  <!-- the CATCHWORD: alone at the foot of the left page, off in the corner,
       the same word set a second time on purpose -->
  <rect x="298" y="286" width="42" height="15" rx="3" fill="#7c1f14"/>

  <!-- the vault: the catchword reaching across the gutter to the word it names,
       the one repeated mark that carries the sentence over the break -->
  <path d="M319,288 C360,244 430,150 469,124"
        fill="none" stroke="#c8863a" stroke-width="2.2" stroke-opacity="0.85"
        stroke-dasharray="6 6"/>
  <path d="M461,118 L469,124 L459,130" fill="none"
        stroke="#c8863a" stroke-width="2.2" stroke-opacity="0.85"/>

  <!-- a hairline rule above the catchword, the way compositors set it apart -->
  <path d="M298,278 H358" stroke="#6b5836" stroke-width="1" stroke-opacity="0.5"/>
</svg>
