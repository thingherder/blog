<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8b6914"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" fill="url(#bg)"/>

  <!-- Dome arch (Panthéon reference) -->
  <path d="M200,80 Q400,-40 600,80" fill="none" stroke="#2a2a4a" stroke-width="3"/>
  <path d="M220,80 Q400,-20 580,80" fill="none" stroke="#2a2a4a" stroke-width="1.5"/>

  <!-- Pivot point -->
  <circle cx="400" cy="60" r="4" fill="#c9a84c"/>

  <!-- Ghost trails of previous swings (fading arcs) -->
  <!-- Far left ghost -->
  <line x1="400" y1="60" x2="260" y2="360" stroke="#c9a84c" stroke-width="0.8" opacity="0.08"/>
  <circle cx="260" cy="360" r="14" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.08"/>

  <!-- Left-mid ghost -->
  <line x1="400" y1="60" x2="300" y2="370" stroke="#c9a84c" stroke-width="0.8" opacity="0.15"/>
  <circle cx="300" cy="370" r="14" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.15"/>

  <!-- Left ghost -->
  <line x1="400" y1="60" x2="340" y2="380" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <circle cx="340" cy="380" r="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>

  <!-- Center position (equilibrium) - dashed -->
  <line x1="400" y1="60" x2="400" y2="390" stroke="#4a4a6a" stroke-width="0.5" stroke-dasharray="4,6" opacity="0.4"/>

  <!-- Right ghost -->
  <line x1="400" y1="60" x2="460" y2="380" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>
  <circle cx="460" cy="380" r="14" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.25"/>

  <!-- Right-mid ghost -->
  <line x1="400" y1="60" x2="500" y2="370" stroke="#c9a84c" stroke-width="0.8" opacity="0.15"/>
  <circle cx="500" cy="370" r="14" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.15"/>

  <!-- Far right ghost -->
  <line x1="400" y1="60" x2="540" y2="360" stroke="#c9a84c" stroke-width="0.8" opacity="0.08"/>
  <circle cx="540" cy="360" r="14" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.08"/>

  <!-- Current pendulum (primary position - slightly left of center, mid-swing) -->
  <line x1="400" y1="60" x2="370" y2="385" stroke="#c9a84c" stroke-width="1.5" opacity="0.9"/>
  <circle cx="370" cy="385" r="16" fill="url(#goldGrad)" opacity="0.9"/>
  <circle cx="370" cy="385" r="16" fill="none" stroke="#e8d48b" stroke-width="0.5" opacity="0.4"/>

  <!-- Arc path traced by the bob -->
  <path d="M260,360 Q400,400 540,360" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.2" stroke-dasharray="2,4"/>

  <!-- Foucault rotation trace on floor -->
  <ellipse cx="400" cy="450" rx="160" ry="20" fill="none" stroke="#4a4a6a" stroke-width="0.5" opacity="0.3"/>
  <ellipse cx="400" cy="450" rx="160" ry="20" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1" transform="rotate(15,400,450)"/>
  <ellipse cx="400" cy="450" rx="160" ry="20" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1" transform="rotate(30,400,450)"/>
  <ellipse cx="400" cy="450" rx="160" ry="20" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1" transform="rotate(45,400,450)"/>
  <ellipse cx="400" cy="450" rx="160" ry="20" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.1" transform="rotate(60,400,450)"/>

  <!-- Small decorative dots suggesting the passage of time -->
  <circle cx="120" cy="200" r="1" fill="#c9a84c" opacity="0.3"/>
  <circle cx="680" cy="180" r="1" fill="#c9a84c" opacity="0.2"/>
  <circle cx="150" cy="300" r="0.8" fill="#c9a84c" opacity="0.2"/>
  <circle cx="650" cy="320" r="0.8" fill="#c9a84c" opacity="0.25"/>
  <circle cx="100" cy="400" r="1" fill="#c9a84c" opacity="0.15"/>
  <circle cx="700" cy="250" r="1.2" fill="#c9a84c" opacity="0.15"/>
</svg>
