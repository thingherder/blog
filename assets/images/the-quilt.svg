<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Quilt grid — 6x3 patchwork squares with visible seams -->
  <g transform="translate(125, 50)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="90" height="90" fill="#c17b5e" opacity="0.85"/>
    <rect x="92" y="0" width="90" height="90" fill="#5e8c9e" opacity="0.75"/>
    <rect x="184" y="0" width="90" height="90" fill="#9e5e7b" opacity="0.8"/>
    <rect x="276" y="0" width="90" height="90" fill="#7b9e5e" opacity="0.7"/>
    <rect x="368" y="0" width="90" height="90" fill="#c4956a" opacity="0.85"/>
    <rect x="460" y="0" width="90" height="90" fill="#6b7ea8" opacity="0.75"/>

    <!-- Row 2 -->
    <rect x="0" y="92" width="90" height="90" fill="#8b6bb0" opacity="0.7"/>
    <rect x="92" y="92" width="90" height="90" fill="#b0886b" opacity="0.8"/>
    <rect x="184" y="92" width="90" height="90" fill="#5e9e8c" opacity="0.75"/>
    <rect x="276" y="92" width="90" height="90" fill="#c17b5e" opacity="0.85"/>
    <rect x="368" y="92" width="90" height="90" fill="#7b5e9e" opacity="0.8"/>
    <rect x="460" y="92" width="90" height="90" fill="#9eb05e" opacity="0.7"/>

    <!-- Row 3 -->
    <rect x="0" y="184" width="90" height="90" fill="#5e7b9e" opacity="0.8"/>
    <rect x="92" y="184" width="90" height="90" fill="#9e8c5e" opacity="0.75"/>
    <rect x="184" y="184" width="90" height="90" fill="#b06b8b" opacity="0.7"/>
    <rect x="276" y="184" width="90" height="90" fill="#6ba8a0" opacity="0.8"/>
    <rect x="368" y="184" width="90" height="90" fill="#c4956a" opacity="0.75"/>
    <rect x="460" y="184" width="90" height="90" fill="#8b5e6b" opacity="0.85"/>

    <!-- Diagonal stitching lines on patches -->
    <!-- Row 1 stitching -->
    <line x1="5" y1="5" x2="85" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="85" y1="5" x2="5" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="97" y1="5" x2="177" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="177" y1="5" x2="97" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="189" y1="5" x2="269" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="269" y1="5" x2="189" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="281" y1="5" x2="361" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="361" y1="5" x2="281" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="373" y1="5" x2="453" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="453" y1="5" x2="373" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="465" y1="5" x2="545" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="545" y1="5" x2="465" y2="85" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 2 stitching -->
    <line x1="5" y1="97" x2="85" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="85" y1="97" x2="5" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="97" y1="97" x2="177" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="177" y1="97" x2="97" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="189" y1="97" x2="269" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="269" y1="97" x2="189" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="281" y1="97" x2="361" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="361" y1="97" x2="281" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="373" y1="97" x2="453" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="453" y1="97" x2="373" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="465" y1="97" x2="545" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="545" y1="97" x2="465" y2="177" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <!-- Row 3 stitching -->
    <line x1="5" y1="189" x2="85" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="85" y1="189" x2="5" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="97" y1="189" x2="177" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="177" y1="189" x2="97" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="189" y1="189" x2="269" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="269" y1="189" x2="189" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="281" y1="189" x2="361" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="361" y1="189" x2="281" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="373" y1="189" x2="453" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="453" y1="189" x2="373" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <line x1="465" y1="189" x2="545" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>
    <line x1="545" y1="189" x2="465" y2="269" stroke="#ffffff" stroke-width="0.5" opacity="0.3"/>

    <!-- Seam lines — visible horizontal -->
    <line x1="-5" y1="91" x2="555" y2="91" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
    <line x1="-5" y1="183" x2="555" y2="183" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>

    <!-- Seam lines — visible vertical -->
    <line x1="91" y1="-5" x2="91" y2="279" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
    <line x1="183" y1="-5" x2="183" y2="279" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
    <line x1="275" y1="-5" x2="275" y2="279" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
    <line x1="367" y1="-5" x2="367" y2="279" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
    <line x1="459" y1="-5" x2="459" y2="279" stroke="#d4c5a0" stroke-width="1" opacity="0.5" stroke-dasharray="4,3"/>
  </g>

  <!-- Subtle glow at center -->
  <radialGradient id="glow" cx="50%" cy="50%">
    <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
    <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
  </radialGradient>
  <rect width="800" height="400" fill="url(#glow)"/>

  <!-- One patch slightly lifted / separated — the missing piece idea -->
  <g transform="translate(125, 50)">
    <rect x="278" y="94" width="86" height="86" fill="none" stroke="#d4c5a0" stroke-width="0.5" opacity="0.3" stroke-dasharray="2,2"/>
  </g>
</svg>
