<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a0f"/>

  <!-- Cross-section of a trunk, centered. Concentric rings:
       dark dense heartwood at the core, paler sapwood toward the edge,
       a thin glowing living cambium band, then bark. -->

  <!-- Bark - outer rind -->
  <circle cx="400" cy="200" r="158" fill="#1a1611" stroke="#2e271d" stroke-width="2"/>

  <!-- Living edge glow - the thin band where all the growth happens -->
  <circle cx="400" cy="200" r="150" fill="none" stroke="#cdbf94" stroke-width="6" opacity="0.10"/>
  <circle cx="400" cy="200" r="150" fill="none" stroke="#e8dcc8" stroke-width="2.5" opacity="0.28"/>
  <!-- Cambium - one cell thick, the seam of all growth -->
  <circle cx="400" cy="200" r="147" fill="none" stroke="#f2ead6" stroke-width="0.9" opacity="0.55"/>

  <!-- Sapwood - pale, living, conducting; the outer rings -->
  <circle cx="400" cy="200" r="144" fill="#4a4234"/>
  <circle cx="400" cy="200" r="138" fill="#433c2f"/>
  <circle cx="400" cy="200" r="130" fill="#3d362a"/>
  <circle cx="400" cy="200" r="121" fill="#383125"/>

  <!-- Heartwood - the dark, dense, dead core that bears the load -->
  <circle cx="400" cy="200" r="111" fill="#2c2620"/>
  <circle cx="400" cy="200" r="96" fill="#272118"/>
  <circle cx="400" cy="200" r="80" fill="#231d15"/>
  <circle cx="400" cy="200" r="62" fill="#1f1912"/>
  <circle cx="400" cy="200" r="44" fill="#1b160f"/>
  <circle cx="400" cy="200" r="26" fill="#17120c"/>

  <!-- Faint growth-ring lines, slightly off-center as real rings are -->
  <circle cx="397" cy="202" r="134" fill="none" stroke="#5a4f3d" stroke-width="0.5" opacity="0.30"/>
  <circle cx="403" cy="198" r="116" fill="none" stroke="#4a4030" stroke-width="0.5" opacity="0.28"/>
  <circle cx="398" cy="201" r="103" fill="none" stroke="#43392b" stroke-width="0.5" opacity="0.26"/>
  <circle cx="402" cy="199" r="88"  fill="none" stroke="#3d3427" stroke-width="0.5" opacity="0.24"/>
  <circle cx="399" cy="201" r="71"  fill="none" stroke="#382f23" stroke-width="0.5" opacity="0.22"/>
  <circle cx="401" cy="200" r="53"  fill="none" stroke="#332b20" stroke-width="0.5" opacity="0.20"/>
  <circle cx="400" cy="200" r="35"  fill="none" stroke="#2e271d" stroke-width="0.5" opacity="0.18"/>

  <!-- A faint radial check, the way old heartwood splits as it dries -->
  <line x1="400" y1="200" x2="400" y2="98"  stroke="#0f0c08" stroke-width="1" opacity="0.4"/>
  <line x1="400" y1="200" x2="332" y2="262" stroke="#0f0c08" stroke-width="0.7" opacity="0.3"/>

  <!-- Pith - the original first year, dead at the very center -->
  <circle cx="400" cy="200" r="3" fill="#0f0c08"/>

  <!-- Label: the living edge -->
  <line x1="556" y1="148" x2="540" y2="160" stroke="#e8dcc8" stroke-width="0.5" opacity="0.35"/>
  <text x="560" y="146" font-family="Georgia, serif" font-size="13" fill="#cdbf94" opacity="0.6">the living edge</text>

  <!-- Label: the dead core -->
  <line x1="244" y1="252" x2="372" y2="214" stroke="#7a6f5d" stroke-width="0.5" opacity="0.3"/>
  <text x="120" y="256" font-family="Georgia, serif" font-size="13" fill="#7a6f5d" opacity="0.55">the dead that holds</text>
</svg>
