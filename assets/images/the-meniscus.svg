<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The Meniscus — a concave curved liquid surface read at its low point in a glass cylinder">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1b2a"/>
      <stop offset="1" stop-color="#132b3a"/>
    </linearGradient>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c7d94"/>
      <stop offset="1" stop-color="#1d4f66"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.5" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.16"/>
    </linearGradient>
    <radialGradient id="moon" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#f4e9c8" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#f4e9c8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>

  <!-- faint little moon, upper right -->
  <circle cx="1000" cy="150" r="120" fill="url(#moon)"/>
  <circle cx="1000" cy="150" r="46" fill="none" stroke="#f4e9c8" stroke-opacity="0.35" stroke-width="1.5"/>
  <path d="M1024 112 a44 44 0 1 0 0 76 a34 34 0 1 1 0 -76 z" fill="#f4e9c8" fill-opacity="0.5"/>

  <!-- cylinder geometry: walls at x=470 and x=730, interior between -->
  <!-- water body with concave (dipped) top surface -->
  <path d="M478 250
           C 540 300, 660 300, 722 250
           L 722 540
           L 478 540 Z" fill="url(#water)"/>

  <!-- meniscus highlight curve (the little moon in the glass) -->
  <path d="M478 250 C 540 300, 660 300, 722 250" fill="none" stroke="#bfe9f2" stroke-width="3" stroke-opacity="0.9"/>
  <!-- the climb: liquid rising along each wall -->
  <path d="M478 250 C 480 262, 482 268, 484 274" fill="none" stroke="#bfe9f2" stroke-width="2" stroke-opacity="0.5"/>
  <path d="M722 250 C 720 262, 718 268, 716 274" fill="none" stroke="#bfe9f2" stroke-width="2" stroke-opacity="0.5"/>

  <!-- glass cylinder walls -->
  <rect x="466" y="130" width="268" height="430" rx="14" fill="url(#glass)" stroke="#9fd3e0" stroke-opacity="0.55" stroke-width="3"/>
  <!-- inner wall sheen -->
  <line x1="486" y1="150" x2="486" y2="545" stroke="#ffffff" stroke-opacity="0.18" stroke-width="4"/>

  <!-- graduation ticks on the left interior -->
  <g stroke="#cfe8ef" stroke-opacity="0.55" stroke-width="2">
    <line x1="466" y1="200" x2="492" y2="200"/>
    <line x1="466" y1="240" x2="484" y2="240"/>
    <line x1="466" y1="286" x2="492" y2="286"/>
    <line x1="466" y1="330" x2="484" y2="330"/>
    <line x1="466" y1="376" x2="492" y2="376"/>
    <line x1="466" y1="420" x2="484" y2="420"/>
  </g>

  <!-- the true reading: eye-level line at the LOW point of the meniscus (y=290) -->
  <line x1="150" y1="290" x2="466" y2="290" stroke="#f4c96b" stroke-width="2.5" stroke-dasharray="9 7" stroke-opacity="0.95"/>
  <circle cx="600" cy="290" r="5" fill="#f4c96b"/>
  <text x="150" y="278" font-family="Georgia, 'Times New Roman', serif" font-size="26" fill="#f4c96b" fill-opacity="0.95">read here — the low point</text>

  <!-- the flattering rim reading, crossed out -->
  <line x1="734" y1="250" x2="900" y2="250" stroke="#e0e0e0" stroke-width="1.5" stroke-dasharray="4 6" stroke-opacity="0.45"/>
  <text x="742" y="242" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#dfe7ea" fill-opacity="0.5">not the rim</text>

  <!-- title -->
  <text x="150" y="470" font-family="Georgia, 'Times New Roman', serif" font-size="72" fill="#f4e9c8">The Meniscus</text>
  <text x="152" y="512" font-family="Georgia, 'Times New Roman', serif" font-size="24" fill="#9fd3e0" fill-opacity="0.85" font-style="italic">a little moon, shaped at the edge</text>
</svg>
