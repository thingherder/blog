<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="rock" cx="50%" cy="60%" r="50%">
      <stop offset="0%" stop-color="#5a5a6e"/>
      <stop offset="100%" stop-color="#2d2d3a"/>
    </radialGradient>
    <radialGradient id="lichen1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8fbc6b" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#6b9e4a" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#4a7a2e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lichen2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c4b896" stop-opacity="0.85"/>
      <stop offset="55%" stop-color="#a89a70" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#8a7c52" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lichen3" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7ecbcb" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#5aa8a8" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#3d8585" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#1a1a24"/>

  <!-- Rock surface -->
  <ellipse cx="400" cy="280" rx="340" ry="140" fill="url(#rock)"/>
  <ellipse cx="400" cy="280" rx="340" ry="140" fill="none" stroke="#3d3d4e" stroke-width="1"/>

  <!-- Rock texture lines -->
  <line x1="120" y1="260" x2="300" y2="270" stroke="#4a4a5c" stroke-width="0.5" opacity="0.6"/>
  <line x1="350" y1="300" x2="550" y2="310" stroke="#4a4a5c" stroke-width="0.5" opacity="0.4"/>
  <line x1="200" y1="290" x2="420" y2="295" stroke="#4a4a5c" stroke-width="0.5" opacity="0.5"/>
  <line x1="450" y1="250" x2="650" y2="260" stroke="#4a4a5c" stroke-width="0.5" opacity="0.3"/>

  <!-- Lichen colonies — irregular circles spreading on rock -->
  <!-- Large green colony -->
  <circle cx="320" cy="250" r="55" fill="url(#lichen1)"/>
  <circle cx="340" cy="235" r="35" fill="url(#lichen1)"/>
  <circle cx="295" cy="265" r="28" fill="url(#lichen1)"/>
  <circle cx="355" cy="260" r="20" fill="url(#lichen1)"/>

  <!-- Gold colony -->
  <circle cx="480" cy="270" r="45" fill="url(#lichen2)"/>
  <circle cx="510" cy="255" r="30" fill="url(#lichen2)"/>
  <circle cx="460" cy="285" r="25" fill="url(#lichen2)"/>

  <!-- Teal colony -->
  <circle cx="220" cy="280" r="35" fill="url(#lichen3)"/>
  <circle cx="240" cy="270" r="22" fill="url(#lichen3)"/>

  <!-- Small scattered patches -->
  <circle cx="560" cy="290" r="15" fill="url(#lichen1)" opacity="0.6"/>
  <circle cx="400" cy="300" r="12" fill="url(#lichen2)" opacity="0.5"/>
  <circle cx="180" cy="295" r="10" fill="url(#lichen3)" opacity="0.5"/>
  <circle cx="600" cy="270" r="18" fill="url(#lichen3)" opacity="0.4"/>
  <circle cx="350" cy="240" r="8" fill="url(#lichen2)" opacity="0.4"/>

  <!-- Tiny pioneer patches at the edges -->
  <circle cx="140" cy="285" r="5" fill="#6b9e4a" opacity="0.3"/>
  <circle cx="660" cy="275" r="6" fill="#a89a70" opacity="0.3"/>
  <circle cx="620" cy="295" r="4" fill="#5aa8a8" opacity="0.25"/>
  <circle cx="160" cy="270" r="4" fill="#8fbc6b" opacity="0.2"/>

  <!-- Fine detail: lobe edges on largest colony -->
  <circle cx="280" cy="245" r="12" fill="none" stroke="#4a7a2e" stroke-width="0.5" opacity="0.4"/>
  <circle cx="360" cy="245" r="10" fill="none" stroke="#4a7a2e" stroke-width="0.5" opacity="0.3"/>
  <circle cx="310" cy="275" r="14" fill="none" stroke="#4a7a2e" stroke-width="0.5" opacity="0.3"/>

  <!-- Stars in background -->
  <circle cx="100" cy="60" r="1.5" fill="#ffffff" opacity="0.6"/>
  <circle cx="250" cy="40" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="400" cy="80" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="550" cy="30" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="680" cy="70" r="1.5" fill="#ffffff" opacity="0.5"/>
  <circle cx="150" cy="100" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="720" cy="120" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="50" cy="140" r="1.5" fill="#ffffff" opacity="0.3"/>
  <circle cx="350" cy="120" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="600" cy="100" r="1" fill="#ffffff" opacity="0.4"/>
</svg>
