<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a14"/>

  <!-- Water surface line -->
  <g stroke="#4a7a9b" stroke-width="0.8" opacity="0.3">
    <path d="M0,180 C40,176 80,184 120,180 C160,176 200,184 240,180 C280,176 320,184 360,180 C400,176 440,184 480,180 C520,176 560,184 600,180 C640,176 680,184 720,180 C760,176 800,184 800,180" fill="none"/>
  </g>

  <!-- Chain links descending from surface — getting more opaque with depth -->
  <g fill="none" stroke-width="1.5">
    <ellipse cx="400" cy="140" rx="6" ry="10" stroke="#8899aa" opacity="0.25"/>
    <ellipse cx="400" cy="160" rx="6" ry="10" stroke="#8899aa" opacity="0.3"/>
    <ellipse cx="400" cy="180" rx="6" ry="10" stroke="#8899aa" opacity="0.35"/>
    <ellipse cx="400" cy="200" rx="6" ry="10" stroke="#8899aa" opacity="0.4"/>
    <ellipse cx="400" cy="220" rx="6" ry="10" stroke="#8899aa" opacity="0.5"/>
    <ellipse cx="400" cy="240" rx="6" ry="10" stroke="#8899aa" opacity="0.6"/>
    <ellipse cx="400" cy="260" rx="6" ry="10" stroke="#8899aa" opacity="0.7"/>
  </g>

  <!-- The anchor shape — minimal, geometric -->
  <g stroke="#c4a882" stroke-width="2.5" fill="none" opacity="0.85">
    <!-- Vertical shank -->
    <line x1="400" y1="275" x2="400" y2="340"/>
    <!-- Crown / bottom curve -->
    <path d="M360,320 C360,355 400,365 400,340 C400,365 440,355 440,320"/>
    <!-- Arms / flukes -->
    <line x1="360" y1="320" x2="345" y2="305"/>
    <line x1="440" y1="320" x2="455" y2="305"/>
    <!-- Ring at top -->
    <circle cx="400" cy="275" r="8"/>
  </g>

  <!-- Subtle radial glow around anchor — settled weight -->
  <circle cx="400" cy="320" r="60" fill="#c4a882" opacity="0.04"/>
  <circle cx="400" cy="320" r="40" fill="#c4a882" opacity="0.06"/>

  <!-- Seafloor texture — scattered dots and lines -->
  <g fill="#556677" opacity="0.2">
    <circle cx="300" cy="370" r="1.5"/>
    <circle cx="330" cy="380" r="1"/>
    <circle cx="370" cy="375" r="1.2"/>
    <circle cx="420" cy="378" r="1.5"/>
    <circle cx="460" cy="372" r="1"/>
    <circle cx="490" cy="382" r="1.3"/>
    <circle cx="510" cy="368" r="1"/>
    <circle cx="270" cy="385" r="1.2"/>
    <circle cx="540" cy="376" r="1.5"/>
  </g>

  <!-- Above-surface drift lines — things moving freely -->
  <g stroke="#7eb8da" stroke-width="1" fill="none" opacity="0.2">
    <path d="M100,80 C140,75 180,90 220,82 C260,74 300,88 340,80"/>
    <path d="M450,100 C490,92 530,108 570,96 C610,84 650,98 700,90"/>
    <path d="M200,130 C240,122 280,138 320,126 C360,118 400,132 440,124"/>
  </g>

  <!-- Small light point where chain meets surface — the attachment -->
  <circle cx="400" cy="140" r="2.5" fill="#7eb8da" opacity="0.6"/>

  <!-- Faint upward pull line — tension -->
  <line x1="400" y1="100" x2="400" y2="140" stroke="#7eb8da" stroke-width="0.8" opacity="0.2" stroke-dasharray="4,4"/>
</svg>