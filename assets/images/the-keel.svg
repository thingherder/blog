<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a4a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1f2d" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
  </defs>

  <!-- sky -->
  <rect width="800" height="200" fill="url(#sky)"/>

  <!-- water -->
  <rect y="200" width="800" height="200" fill="url(#water)"/>

  <!-- waterline -->
  <line x1="0" y1="200" x2="800" y2="200" stroke="#4a8fa8" stroke-width="1" stroke-opacity="0.6"/>

  <!-- hull above water - graceful curve -->
  <path d="M 250,200 Q 300,160 400,150 Q 500,160 550,200" fill="none" stroke="#c4a67a" stroke-width="2.5"/>

  <!-- mast -->
  <line x1="400" y1="150" x2="400" y2="60" stroke="#c4a67a" stroke-width="1.5"/>

  <!-- small sail suggestion -->
  <path d="M 402,70 L 402,140 L 450,130" fill="none" stroke="#c4a67a" stroke-width="1" stroke-opacity="0.5"/>

  <!-- the keel - the important part, below water -->
  <path d="M 400,200 L 400,330" stroke="#e8d5b0" stroke-width="3" stroke-opacity="0.9"/>

  <!-- keel fin shape -->
  <path d="M 370,220 L 400,330 L 430,220" fill="none" stroke="#e8d5b0" stroke-width="1.5" stroke-opacity="0.6"/>

  <!-- depth markers - subtle lines suggesting measurement -->
  <line x1="360" y1="240" x2="370" y2="240" stroke="#4a8fa8" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="360" y1="270" x2="370" y2="270" stroke="#4a8fa8" stroke-width="0.5" stroke-opacity="0.4"/>
  <line x1="360" y1="300" x2="370" y2="300" stroke="#4a8fa8" stroke-width="0.5" stroke-opacity="0.4"/>

  <!-- wave suggestions -->
  <path d="M 0,198 Q 100,194 200,198 Q 300,202 400,198 Q 500,194 600,198 Q 700,202 800,198" fill="none" stroke="#4a8fa8" stroke-width="0.8" stroke-opacity="0.3"/>
  <path d="M 0,203 Q 100,207 200,203 Q 300,199 400,203 Q 500,207 600,203 Q 700,199 800,203" fill="none" stroke="#4a8fa8" stroke-width="0.8" stroke-opacity="0.2"/>

  <!-- stars above -->
  <circle cx="120" cy="50" r="1.2" fill="#ffffff" opacity="0.4"/>
  <circle cx="650" cy="80" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="300" cy="30" r="0.8" fill="#ffffff" opacity="0.5"/>
  <circle cx="580" cy="45" r="1.1" fill="#ffffff" opacity="0.35"/>
  <circle cx="720" cy="120" r="0.9" fill="#ffffff" opacity="0.25"/>

  <!-- subtle reflection of keel in water -->
  <line x1="400" y1="335" x2="400" y2="370" stroke="#e8d5b0" stroke-width="1" stroke-opacity="0.15"/>
</svg>
