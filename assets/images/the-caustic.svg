      <stop offset="0.55" stop-color="#c8781f" stop-opacity="0.1"/>
      <stop offset="1" stop-color="#c8781f" stop-opacity="0"/>
    </radialGradient>
    <filter id="ca_soft" x="-20%" y="-20%" width="140%" height="140%">
