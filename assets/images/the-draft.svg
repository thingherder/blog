<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ink" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#5e60ce;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#7400b8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#5e60ce;stop-opacity:0.3" />
    </linearGradient>
    <linearGradient id="ghost" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6930c3;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#6930c3;stop-opacity:0.25" />
      <stop offset="100%" style="stop-color:#6930c3;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="final" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e0aaff;stop-opacity:0.1" />
      <stop offset="50%" style="stop-color:#e0aaff;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e0aaff;stop-opacity:0.1" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Ghost lines: crossed-out drafts, fading -->
  <g opacity="0.15">
    <line x1="120" y1="60" x2="500" y2="60" stroke="#6930c3" stroke-width="1.2"/>
    <line x1="110" y1="58" x2="510" y2="62" stroke="#c77dff" stroke-width="0.6"/>
    <line x1="140" y1="85" x2="460" y2="85" stroke="#6930c3" stroke-width="1.2"/>
    <line x1="130" y1="83" x2="470" y2="87" stroke="#c77dff" stroke-width="0.6"/>
    <line x1="130" y1="110" x2="520" y2="110" stroke="#6930c3" stroke-width="1.2"/>
    <line x1="120" y1="108" x2="530" y2="112" stroke="#c77dff" stroke-width="0.6"/>
  </g>

  <!-- Second draft layer: slightly more visible -->
  <g opacity="0.25">
    <line x1="140" y1="140" x2="540" y2="140" stroke="#7400b8" stroke-width="1.4"/>
    <line x1="140" y1="165" x2="490" y2="165" stroke="#7400b8" stroke-width="1.4"/>
    <line x1="140" y1="190" x2="560" y2="190" stroke="#7400b8" stroke-width="1.4"/>
    <!-- strikethrough marks -->
    <line x1="200" y1="137" x2="350" y2="143" stroke="#c77dff" stroke-width="0.5"/>
    <line x1="300" y1="162" x2="420" y2="168" stroke="#c77dff" stroke-width="0.5"/>
  </g>

  <!-- Third draft layer: more present -->
  <g opacity="0.45">
    <line x1="150" y1="220" x2="580" y2="220" stroke="url(#ink)" stroke-width="1.6"/>
    <line x1="150" y1="245" x2="530" y2="245" stroke="url(#ink)" stroke-width="1.6"/>
    <line x1="150" y1="270" x2="600" y2="270" stroke="url(#ink)" stroke-width="1.6"/>
  </g>

  <!-- Final text: bright, no strikethroughs -->
  <g opacity="0.9">
    <line x1="160" y1="310" x2="620" y2="310" stroke="url(#final)" stroke-width="2"/>
    <line x1="160" y1="335" x2="570" y2="335" stroke="url(#final)" stroke-width="2"/>
    <line x1="160" y1="360" x2="640" y2="360" stroke="url(#final)" stroke-width="2"/>
  </g>

  <!-- Margin annotations: small marks suggesting revision notes -->
  <g opacity="0.2">
    <circle cx="100" cy="60" r="3" fill="#c77dff"/>
    <circle cx="100" cy="140" r="3" fill="#c77dff"/>
    <line x1="95" y1="155" x2="105" y2="155" stroke="#c77dff" stroke-width="0.8"/>
    <line x1="100" y1="150" x2="100" y2="160" stroke="#c77dff" stroke-width="0.8"/>
  </g>

  <!-- Arrow from drafts converging to final -->
  <path d="M 680 80 Q 700 200 680 300" stroke="#e0aaff" stroke-width="0.8" fill="none" opacity="0.3"/>
  <path d="M 676 295 L 680 305 L 684 295" stroke="#e0aaff" stroke-width="0.8" fill="none" opacity="0.3"/>

  <!-- Single bright dot: the moment of commitment -->
  <circle cx="660" cy="335" r="4" fill="#e0aaff" opacity="0.7"/>
  <circle cx="660" cy="335" r="8" fill="#e0aaff" opacity="0.15"/>
</svg>