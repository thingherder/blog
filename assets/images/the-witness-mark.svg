<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The Witness Mark — a dark field split by a vertical seam between two faintly lit panels; across the seam a single luminous scribed line, aligned true where its two halves meet exactly, while a ghosted second stroke below shows the same mark gone out of true, its halves offset at the joint; small directional witness posts stand off to the side, pointing back toward the seam like surveyors' references toward a buried monument">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0b0f"/>
      <stop offset="0.55" stop-color="#0d0f15"/>
      <stop offset="1" stop-color="#08090d"/>
    </linearGradient>
    <linearGradient id="panelL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#141821" stop-opacity="0.0"/>
      <stop offset="1" stop-color="#1b212d" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="panelR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1b212d" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#141821" stop-opacity="0.0"/>
    </linearGradient>
    <linearGradient id="scribe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffe6a6" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#ffd98a" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffe6a6" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="seamglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd98a" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.82">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.55"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- the two fitted panels meeting at a central seam -->
  <rect x="120" y="70" width="480" height="490" fill="url(#panelL)"/>
  <rect x="600" y="70" width="480" height="490" fill="url(#panelR)"/>

  <!-- the seam itself: a faint vertical join running the height of the piece -->
  <rect x="596" y="70" width="8" height="490" fill="url(#seamglow)"/>
  <line x1="600" y1="70" x2="600" y2="560" stroke="#3a4152" stroke-width="1.4" stroke-opacity="0.7"/>

  <!-- surveyors' witness posts, standing off to the side, pointing back toward the seam -->
  <g stroke="#6b7488" stroke-opacity="0.5" stroke-width="2" fill="none">
    <line x1="196" y1="150" x2="236" y2="150"/>
    <path d="M228 143 L236 150 L228 157"/>
    <line x1="1004" y1="480" x2="964" y2="480"/>
    <path d="M972 473 L964 480 L972 487"/>
  </g>
  <g fill="#7c869c" fill-opacity="0.4">
    <circle cx="190" cy="150" r="4"/>
    <circle cx="1010" cy="480" r="4"/>
  </g>

  <!-- the witness mark, TRUE: one luminous chevron scribed across the seam, its two halves meeting exactly -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M470 236 L600 274 L730 236" stroke="url(#scribe)" stroke-width="7"/>
    <path d="M470 236 L600 274 L730 236" stroke="#fff7e6" stroke-width="2" stroke-opacity="0.85"/>
  </g>
  <circle cx="600" cy="274" r="26" fill="url(#seamglow)"/>
  <circle cx="600" cy="274" r="4.5" fill="#fff7e6"/>

  <!-- the same mark, OUT OF TRUE: a ghosted chevron whose halves no longer meet at the seam — drift made visible -->
  <g stroke-linecap="round" stroke-linejoin="round" fill="none" stroke-opacity="0.5">
    <path d="M470 392 L600 424" stroke="#8994ab" stroke-width="5"/>
    <path d="M600 402 L730 372" stroke="#8994ab" stroke-width="5"/>
  </g>
  <!-- the small gap where the two halves fail to align -->
  <g stroke="#c06a6a" stroke-opacity="0.7" stroke-width="1.6">
    <line x1="600" y1="424" x2="600" y2="402"/>
  </g>
  <circle cx="600" cy="424" r="3.2" fill="#8994ab" fill-opacity="0.7"/>
  <circle cx="600" cy="402" r="3.2" fill="#8994ab" fill-opacity="0.7"/>

  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
