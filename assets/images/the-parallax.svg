<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="px_sky" cx="0.32" cy="0.40" r="0.95">
      <stop offset="0" stop-color="#1a2750"/>
      <stop offset="0.5" stop-color="#101a3a"/>
      <stop offset="1" stop-color="#070b1c"/>
    </radialGradient>
    <radialGradient id="px_near" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff7e0"/>
      <stop offset="0.4" stop-color="#ffd98a"/>
      <stop offset="1" stop-color="#ffb347" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="px_eye" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#bfe3ff"/>
      <stop offset="1" stop-color="#3a6ea5"/>
    </radialGradient>
    <linearGradient id="px_sight" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0" stop-color="#9fd0ff" stop-opacity="0.15"/>
      <stop offset="1" stop-color="#9fd0ff" stop-opacity="0.85"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#px_sky)"/>

  <!-- distant star field (the unmoving background) -->
  <g fill="#dfe9ff">
    <circle cx="70" cy="48" r="1.1" opacity="0.5"/>
    <circle cx="150" cy="90" r="0.8" opacity="0.4"/>
    <circle cx="240" cy="40" r="1.3" opacity="0.6"/>
    <circle cx="330" cy="78" r="0.7" opacity="0.35"/>
    <circle cx="470" cy="44" r="1.0" opacity="0.5"/>
    <circle cx="560" cy="92" r="0.9" opacity="0.45"/>
    <circle cx="660" cy="50" r="1.2" opacity="0.55"/>
    <circle cx="740" cy="96" r="0.8" opacity="0.4"/>
    <circle cx="110" cy="150" r="0.7" opacity="0.3"/>
    <circle cx="700" cy="160" r="0.9" opacity="0.4"/>
    <circle cx="40" cy="240" r="0.8" opacity="0.3"/>
    <circle cx="770" cy="250" r="1.0" opacity="0.4"/>
  </g>

  <!-- the near star: the thing being measured -->
  <circle cx="400" cy="120" r="46" fill="url(#px_near)"/>
  <circle cx="400" cy="120" r="9" fill="#fff7e0"/>

  <!-- the two apparent positions against the far sky (the jump) -->
  <g>
    <circle cx="352" cy="62" r="3.2" fill="#ffd98a" opacity="0.85"/>
    <circle cx="448" cy="62" r="3.2" fill="#ffd98a" opacity="0.85"/>
    <path d="M 358 62 L 442 62" stroke="#ffd98a" stroke-width="1" stroke-dasharray="3 4" opacity="0.6"/>
  </g>

  <!-- sightlines from each eye to the near star, continuing to the sky -->
  <g stroke="url(#px_sight)" stroke-width="1.6" fill="none">
    <path d="M 210 330 L 400 120 L 448 62"/>
    <path d="M 590 330 L 400 120 L 352 62"/>
  </g>

  <!-- the baseline between the two viewpoints -->
  <path d="M 210 330 L 590 330" stroke="#9fd0ff" stroke-width="1.4" stroke-dasharray="2 5" opacity="0.55"/>

  <!-- the two observers / eyes -->
  <g>
    <circle cx="210" cy="330" r="17" fill="url(#px_eye)" stroke="#cfe7ff" stroke-width="1.2"/>
    <circle cx="210" cy="330" r="6" fill="#0b1430"/>
    <circle cx="590" cy="330" r="17" fill="url(#px_eye)" stroke="#cfe7ff" stroke-width="1.2"/>
    <circle cx="590" cy="330" r="6" fill="#0b1430"/>
  </g>

  <!-- the parallax angle arc at the star -->
  <path d="M 388 156 A 38 38 0 0 0 412 156" fill="none" stroke="#ffd98a" stroke-width="1.3" opacity="0.7"/>

  <!-- ground line -->
  <path d="M 0 364 L 800 364" stroke="#1c2a52" stroke-width="2" opacity="0.7"/>
</svg>
