<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="kf_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2620"/>
      <stop offset="1" stop-color="#141210"/>
    </linearGradient>
    <linearGradient id="kf_wood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c79a5e"/>
      <stop offset="0.5" stop-color="#b0824a"/>
      <stop offset="1" stop-color="#8a6236"/>
    </linearGradient>
    <linearGradient id="kf_end" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7c5a34"/>
      <stop offset="1" stop-color="#5c4224"/>
    </linearGradient>
    <linearGradient id="kf_blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8f9aa4"/>
      <stop offset="0.5" stop-color="#dfe6ec"/>
      <stop offset="1" stop-color="#9aa4ad"/>
    </linearGradient>
    <radialGradient id="kf_dust" cx="0.5" cy="0.2" r="0.9">
      <stop offset="0" stop-color="#e6c489" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#e6c489" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ground / background -->
  <rect width="800" height="400" fill="url(#kf_bg)"/>

  <!-- the board, split into two pieces with a gap between them: the kerf -->
  <!-- left piece: keeps the full drawn line -->
  <g>
    <rect x="70" y="170" width="316" height="90" fill="url(#kf_wood)"/>
    <rect x="70" y="170" width="10" height="90" fill="url(#kf_end)"/>
    <!-- grain -->
    <g stroke="#8a6236" stroke-width="1.1" fill="none" opacity="0.5">
      <path d="M80,188 q150,-6 300,0"/>
      <path d="M80,206 q150,7 300,0"/>
      <path d="M80,226 q150,-7 300,0"/>
      <path d="M80,244 q150,6 300,0"/>
    </g>
  </g>

  <!-- right piece: the offcut side, the waste keeps the line -->
  <g>
    <rect x="414" y="170" width="316" height="90" fill="url(#kf_wood)"/>
    <rect x="720" y="170" width="10" height="90" fill="url(#kf_end)"/>
    <g stroke="#8a6236" stroke-width="1.1" fill="none" opacity="0.5">
      <path d="M420,188 q150,-6 300,0"/>
      <path d="M420,206 q150,7 300,0"/>
      <path d="M420,226 q150,-7 300,0"/>
      <path d="M420,244 q150,6 300,0"/>
    </g>
  </g>

  <!-- the kerf: the blade's-width of wood turned to dust, never to be reassembled -->
  <rect x="386" y="170" width="28" height="90" fill="#0d0b09"/>
  <!-- shadowed inner walls of the slot -->
  <rect x="386" y="170" width="6" height="90" fill="#000000" opacity="0.35"/>
  <rect x="408" y="170" width="6" height="90" fill="#000000" opacity="0.35"/>

  <!-- the drawn line — it belongs to the waste; the kept piece holds it whole -->
  <line x1="414" y1="158" x2="414" y2="272" stroke="#e8543f" stroke-width="1.6" opacity="0.85" stroke-dasharray="4 4"/>

  <!-- the saw blade descending through the cut -->
  <g>
    <rect x="392" y="20" width="16" height="168" fill="url(#kf_blade)"/>
    <!-- teeth with alternating set, wider than the blade body -->
    <g fill="#c9d2da">
      <path d="M392,188 l-6,10 l6,0 Z"/>
      <path d="M400,188 l0,12 l8,-8 Z"/>
      <path d="M392,176 l-6,10 l6,0 Z"/>
      <path d="M400,176 l0,12 l8,-8 Z"/>
    </g>
    <!-- blade shine -->
    <rect x="398" y="24" width="3" height="160" fill="#ffffff" opacity="0.5"/>
  </g>

  <!-- sawdust: the substance spent on nothing but the cutting -->
  <ellipse cx="400" cy="290" rx="120" ry="26" fill="url(#kf_dust)"/>
  <g fill="#d8b073">
    <circle cx="360" cy="288" r="2.2" opacity="0.8"/>
    <circle cx="378" cy="296" r="1.6" opacity="0.7"/>
    <circle cx="392" cy="285" r="2" opacity="0.85"/>
    <circle cx="408" cy="298" r="1.8" opacity="0.7"/>
    <circle cx="424" cy="290" r="2.3" opacity="0.8"/>
    <circle cx="440" cy="300" r="1.5" opacity="0.6"/>
    <circle cx="404" cy="278" r="1.4" opacity="0.7"/>
    <circle cx="386" cy="272" r="1.3" opacity="0.6"/>
    <circle cx="418" cy="268" r="1.2" opacity="0.55"/>
    <circle cx="398" cy="320" r="1.7" opacity="0.5"/>
    <circle cx="370" cy="316" r="1.4" opacity="0.45"/>
    <circle cx="430" cy="318" r="1.5" opacity="0.5"/>
  </g>
</svg>
