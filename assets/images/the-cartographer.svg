<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.2" />
      <stop offset="50%" style="stop-color:#e94560;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#parchment)"/>

  <!-- Grid lines suggesting a map -->
  <g stroke="#0f3460" stroke-width="0.5" opacity="0.4">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
    <line x1="160" y1="0" x2="160" y2="400"/>
    <line x1="320" y1="0" x2="320" y2="400"/>
    <line x1="480" y1="0" x2="480" y2="400"/>
    <line x1="640" y1="0" x2="640" y2="400"/>
  </g>

  <!-- Coastline/boundary being drawn — incomplete, trailing off -->
  <path d="M 80,350 Q 120,310 160,280 Q 200,250 230,230 Q 270,200 310,185 Q 360,165 400,160 Q 450,155 490,170 Q 530,185 560,200 Q 600,220 630,210 Q 660,195 690,180"
        fill="none" stroke="#e94560" stroke-width="2.5" stroke-linecap="round"
        stroke-dasharray="600" stroke-dashoffset="0" opacity="0.9"/>

  <!-- The part that fades — the unmapped territory -->
  <path d="M 690,180 Q 710,170 730,175 Q 750,180 770,165"
        fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round"
        opacity="0.3" stroke-dasharray="4,6"/>

  <!-- Points of known territory -->
  <circle cx="160" cy="280" r="4" fill="#e94560" opacity="0.7"/>
  <circle cx="310" cy="185" r="4" fill="#e94560" opacity="0.7"/>
  <circle cx="400" cy="160" r="3.5" fill="#e94560" opacity="0.8"/>
  <circle cx="560" cy="200" r="4" fill="#e94560" opacity="0.7"/>

  <!-- The cartographer's position — a brighter point where drawing stops -->
  <circle cx="690" cy="180" r="6" fill="#e94560" opacity="0.9"/>
  <circle cx="690" cy="180" r="12" fill="none" stroke="#e94560" stroke-width="1" opacity="0.4"/>
  <circle cx="690" cy="180" r="20" fill="none" stroke="#e94560" stroke-width="0.5" opacity="0.2"/>

  <!-- "Here be dragons" zone — subtle question marks in the unmapped area -->
  <text x="740" y="120" font-family="Georgia, serif" font-size="24" fill="#0f3460" opacity="0.3">?</text>
  <text x="720" y="260" font-family="Georgia, serif" font-size="18" fill="#0f3460" opacity="0.2">?</text>

  <!-- Filled/known territory — subtle shading below the line -->
  <path d="M 80,350 Q 120,310 160,280 Q 200,250 230,230 Q 270,200 310,185 Q 360,165 400,160 Q 450,155 490,170 Q 530,185 560,200 Q 600,220 630,210 Q 660,195 690,180 L 690,400 L 80,400 Z"
        fill="#e94560" opacity="0.04"/>

  <!-- Compass rose suggestion — minimal -->
  <g transform="translate(120, 80)" opacity="0.3">
    <line x1="0" y1="-20" x2="0" y2="20" stroke="#e94560" stroke-width="1"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#e94560" stroke-width="1"/>
    <polygon points="0,-20 -3,-5 3,-5" fill="#e94560"/>
  </g>
</svg>
