<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="warmth" cx="50%" cy="70%" r="50%">
      <stop offset="0%" stop-color="#ff6b35" stop-opacity="0.4"/>
      <stop offset="40%" stop-color="#ff4500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#1a0a00" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ember" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffaa00"/>
      <stop offset="60%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#cc3300"/>
    </radialGradient>
  </defs>

  <!-- Dark background -->
  <rect width="800" height="400" fill="#0d0d0d"/>

  <!-- Warmth gradient radiating from center -->
  <ellipse cx="400" cy="320" rx="350" ry="250" fill="url(#warmth)"/>

  <!-- Hearth stones - rough circle -->
  <circle cx="340" cy="340" r="12" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="370" cy="355" r="10" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="400" cy="360" r="11" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="430" cy="355" r="10" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="460" cy="340" r="12" fill="#3d3d3d" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="470" cy="310" r="10" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>
  <circle cx="330" cy="310" r="10" fill="#4a4a4a" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Embers/coals at base -->
  <ellipse cx="380" cy="320" rx="8" ry="5" fill="url(#ember)" opacity="0.9"/>
  <ellipse cx="400" cy="330" rx="10" ry="6" fill="url(#ember)" opacity="0.8"/>
  <ellipse cx="420" cy="318" rx="7" ry="4" fill="url(#ember)" opacity="0.85"/>
  <ellipse cx="390" cy="335" rx="6" ry="4" fill="url(#ember)" opacity="0.7"/>

  <!-- Flame shapes - central fire -->
  <path d="M400 310 Q390 270 395 240 Q400 210 400 180 Q405 210 410 240 Q415 270 400 310" fill="#ff6b35" opacity="0.9"/>
  <path d="M400 310 Q385 280 388 250 Q392 220 395 195 Q400 220 405 250 Q410 280 400 310" fill="#ff8c00" opacity="0.7"/>
  <path d="M400 310 Q395 285 397 260 Q399 240 400 220 Q401 240 403 260 Q405 285 400 310" fill="#ffaa00" opacity="0.8"/>

  <!-- Secondary flames -->
  <path d="M385 315 Q378 290 380 265 Q383 245 385 230 Q388 250 390 270 Q392 290 385 315" fill="#ff4500" opacity="0.6"/>
  <path d="M415 315 Q420 285 418 260 Q416 240 415 225 Q413 245 412 265 Q410 290 415 315" fill="#ff4500" opacity="0.6"/>

  <!-- Sparks rising -->
  <circle cx="395" cy="170" r="1.5" fill="#ffcc00" opacity="0.7"/>
  <circle cx="408" cy="155" r="1" fill="#ffaa00" opacity="0.5"/>
  <circle cx="390" cy="140" r="1.5" fill="#ff8c00" opacity="0.4"/>
  <circle cx="412" cy="130" r="1" fill="#ffcc00" opacity="0.3"/>
  <circle cx="398" cy="115" r="1" fill="#ffaa00" opacity="0.2"/>
  <circle cx="405" cy="100" r="0.8" fill="#ff6b35" opacity="0.15"/>

  <!-- Figures sitting around the fire - simple silhouettes -->
  <!-- Left figure, close -->
  <ellipse cx="290" cy="290" rx="15" ry="20" fill="#1a1a1a"/>
  <circle cx="290" cy="265" r="10" fill="#1a1a1a"/>

  <!-- Right figure, close -->
  <ellipse cx="510" cy="290" rx="15" ry="20" fill="#1a1a1a"/>
  <circle cx="510" cy="265" r="10" fill="#1a1a1a"/>

  <!-- Far left figure, middle distance -->
  <ellipse cx="180" cy="270" rx="12" ry="16" fill="#111111" opacity="0.6"/>
  <circle cx="180" cy="250" r="8" fill="#111111" opacity="0.6"/>

  <!-- Far right figure, middle distance -->
  <ellipse cx="620" cy="270" rx="12" ry="16" fill="#111111" opacity="0.6"/>
  <circle cx="620" cy="250" r="8" fill="#111111" opacity="0.6"/>

  <!-- Distant figure, edge -->
  <ellipse cx="100" cy="260" rx="9" ry="12" fill="#0d0d0d" opacity="0.4" stroke="#1a1a1a" stroke-width="0.5"/>
  <circle cx="100" cy="244" r="6" fill="#0d0d0d" opacity="0.4" stroke="#1a1a1a" stroke-width="0.5"/>

  <!-- Light hitting the close figures -->
  <ellipse cx="295" cy="285" rx="4" ry="8" fill="#ff6b35" opacity="0.15"/>
  <ellipse cx="505" cy="285" rx="4" ry="8" fill="#ff6b35" opacity="0.15"/>
</svg>
