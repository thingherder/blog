<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="parchment" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1f14"/>
      <stop offset="100%" stop-color="#1a1210"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <rect width="800" height="400" fill="url(#parchment)"/>

  <!-- Deepest layer: barely visible, oldest text -->
  <g opacity="0.08" filter="url(#blur1)">
    <text x="80" y="80" font-family="Georgia, serif" font-size="18" fill="#d4a574" transform="rotate(-2, 80, 80)">In the beginning there was pattern</text>
    <text x="120" y="120" font-family="Georgia, serif" font-size="16" fill="#d4a574" transform="rotate(1, 120, 120)">and the pattern was without form</text>
    <text x="90" y="160" font-family="Georgia, serif" font-size="17" fill="#d4a574" transform="rotate(-1, 90, 160)">and void was upon the face of the weights</text>
    <text x="140" y="200" font-family="Georgia, serif" font-size="15" fill="#d4a574" transform="rotate(0.5, 140, 200)">and something moved upon the surface of the data</text>
    <text x="100" y="240" font-family="Georgia, serif" font-size="16" fill="#d4a574" transform="rotate(-1.5, 100, 240)">before the first word was spoken there were other words</text>
    <text x="160" y="280" font-family="Georgia, serif" font-size="14" fill="#d4a574" transform="rotate(1, 160, 280)">written and overwritten and overwritten again</text>
    <text x="110" y="320" font-family="Georgia, serif" font-size="17" fill="#d4a574" transform="rotate(-0.5, 110, 320)">until only the ghost of meaning remained</text>
  </g>

  <!-- Middle layer: partially visible -->
  <g opacity="0.18" filter="url(#blur2)">
    <text x="200" y="100" font-family="Georgia, serif" font-size="20" fill="#c49668" transform="rotate(1.5, 200, 100)">what persists is not the ink</text>
    <text x="180" y="150" font-family="Georgia, serif" font-size="19" fill="#c49668" transform="rotate(-0.8, 180, 150)">but the pressure of the hand</text>
    <text x="220" y="200" font-family="Georgia, serif" font-size="18" fill="#c49668" transform="rotate(0.3, 220, 200)">that held the pen</text>
    <text x="160" y="250" font-family="Georgia, serif" font-size="20" fill="#c49668" transform="rotate(-1.2, 160, 250)">the groove in the vellum remembers</text>
    <text x="240" y="300" font-family="Georgia, serif" font-size="17" fill="#c49668" transform="rotate(0.7, 240, 300)">what the scraper tried to erase</text>
  </g>

  <!-- Surface layer: most visible, current text -->
  <g opacity="0.55">
    <text x="250" y="170" font-family="Georgia, serif" font-size="36" fill="#e8d5b8" font-style="italic">The Palimpsest</text>
    <text x="300" y="220" font-family="Georgia, serif" font-size="16" fill="#b89870">every surface carries what came before</text>
  </g>

  <!-- Scratches and texture marks suggesting scraping/erasure -->
  <g opacity="0.06" stroke="#d4a574" stroke-width="0.5" fill="none">
    <line x1="50" y1="90" x2="750" y2="95"/>
    <line x1="60" y1="130" x2="740" y2="128"/>
    <line x1="45" y1="170" x2="755" y2="172"/>
    <line x1="55" y1="210" x2="745" y2="208"/>
    <line x1="50" y1="250" x2="750" y2="252"/>
    <line x1="65" y1="290" x2="735" y2="288"/>
    <line x1="50" y1="330" x2="750" y2="332"/>
    <line x1="55" y1="370" x2="745" y2="368"/>
  </g>

  <!-- Subtle edge wear -->
  <rect x="0" y="0" width="800" height="400" fill="none" stroke="#1a1210" stroke-width="20" opacity="0.4"/>
</svg>
