<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a0a2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rope1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4956a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8866a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="rope2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8a6040;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9a7050;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5535;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Subtle grid of crossing lines suggesting topology -->
  <g opacity="0.06" stroke="#c4956a" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80" />
    <line x1="0" y1="160" x2="800" y2="160" />
    <line x1="0" y1="240" x2="800" y2="240" />
    <line x1="0" y1="320" x2="800" y2="320" />
    <line x1="160" y1="0" x2="160" y2="400" />
    <line x1="320" y1="0" x2="320" y2="400" />
    <line x1="480" y1="0" x2="480" y2="400" />
    <line x1="640" y1="0" x2="640" y2="400" />
  </g>

  <!-- Central trefoil knot - the simplest nontrivial knot -->
  <!-- Drawn as three overlapping loops with proper over-under crossings -->
  <g transform="translate(400, 200)" filter="url(#softglow)">
    <!-- Outer glow -->
    <ellipse cx="0" cy="0" rx="90" ry="90" fill="none" stroke="#d4a574" stroke-width="1" opacity="0.08" />
    <ellipse cx="0" cy="0" rx="120" ry="120" fill="none" stroke="#d4a574" stroke-width="0.5" opacity="0.04" />
  </g>

  <g transform="translate(400, 200)">
    <!-- The trefoil knot path - background/shadow layer -->
    <path d="M 0,-70 C 60,-70 80,-20 60,10 C 40,40 70,70 40,80 C 10,90 -20,70 -40,80 C -60,90 -70,60 -60,30 C -50,0 -80,-20 -60,-50 C -40,-80 -20,-70 0,-70"
          fill="none" stroke="#2a1a0a" stroke-width="14" stroke-linecap="round" opacity="0.4" />

    <!-- Bottom rope segment (under) -->
    <path d="M 40,80 C 10,90 -20,70 -40,80"
          fill="none" stroke="url(#rope2)" stroke-width="10" stroke-linecap="round" />

    <!-- Right rope segment -->
    <path d="M 0,-70 C 60,-70 80,-20 60,10 C 40,40 70,70 40,80"
          fill="none" stroke="url(#rope1)" stroke-width="10" stroke-linecap="round" />

    <!-- Left rope segment -->
    <path d="M -40,80 C -60,90 -70,60 -60,30 C -50,0 -80,-20 -60,-50 C -40,-80 -20,-70 0,-70"
          fill="none" stroke="url(#rope1)" stroke-width="10" stroke-linecap="round" />

    <!-- Crossing highlights -->
    <circle cx="55" cy="10" r="3" fill="#e8c9a0" opacity="0.3" />
    <circle cx="-55" cy="30" r="3" fill="#e8c9a0" opacity="0.3" />
    <circle cx="0" cy="-65" r="3" fill="#e8c9a0" opacity="0.2" />
  </g>

  <!-- Extending rope ends fading into edges -->
  <!-- Left rope trailing off -->
  <g opacity="0.6">
    <path d="M 0,200 C 40,190 80,180 120,175 C 180,165 240,170 280,180 C 310,188 330,195 340,200"
          fill="none" stroke="url(#rope2)" stroke-width="6" stroke-linecap="round" />
  </g>
  <!-- Right rope trailing off -->
  <g opacity="0.6">
    <path d="M 460,200 C 470,205 490,212 520,218 C 560,228 620,230 680,220 C 730,212 770,200 800,195"
          fill="none" stroke="url(#rope2)" stroke-width="6" stroke-linecap="round" />
  </g>

  <!-- Small mathematical notation suggesting knot invariants -->
  <g opacity="0.12" fill="#c4956a" font-family="Georgia, serif" font-size="12">
    <text x="80" y="60">3₁</text>
    <text x="700" y="350">K(t) = t⁻¹ + t⁻² - 1</text>
  </g>

  <!-- Scattered dots like stars or nodes -->
  <g fill="#d4a574" opacity="0.15">
    <circle cx="120" cy="100" r="1.5" />
    <circle cx="680" cy="80" r="1" />
    <circle cx="200" cy="320" r="1.2" />
    <circle cx="600" cy="310" r="1" />
    <circle cx="90" cy="250" r="0.8" />
    <circle cx="710" cy="180" r="1.3" />
    <circle cx="150" cy="180" r="0.7" />
    <circle cx="650" cy="140" r="0.9" />
  </g>
</svg>
