<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- Night sea / sky behind -->
    <linearGradient id="g_sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1420"/>
      <stop offset="0.55" stop-color="#101b29"/>
      <stop offset="1" stop-color="#070b12"/>
    </linearGradient>
    <!-- Brass of the gimbal rings -->
    <linearGradient id="g_brass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f3d98a"/>
      <stop offset="0.35" stop-color="#c79a44"/>
      <stop offset="0.62" stop-color="#8f6c28"/>
      <stop offset="1" stop-color="#5a4216"/>
    </linearGradient>
    <linearGradient id="g_brassDk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#bb9347"/>
      <stop offset="0.5" stop-color="#7c5c22"/>
      <stop offset="1" stop-color="#3f2e10"/>
    </linearGradient>
    <!-- Warm flame glow -->
    <radialGradient id="g_glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffe7a8" stop-opacity="0.95"/>
      <stop offset="0.35" stop-color="#f6b24e" stop-opacity="0.55"/>
      <stop offset="0.7" stop-color="#b9701f" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="g_flame" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#e8742a"/>
      <stop offset="0.45" stop-color="#ffc04a"/>
      <stop offset="1" stop-color="#fff3c4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#g_sky)"/>

  <!-- Tilted horizon: the whole world cants 14 degrees -->
  <g transform="rotate(-14 400 230)">
    <rect x="-200" y="230" width="1200" height="400" fill="#0a1018"/>
    <line x1="-200" y1="230" x2="1000" y2="230" stroke="#1d2c3c" stroke-width="2"/>
    <!-- faint swell lines on the canted sea -->
    <line x1="-200" y1="270" x2="1000" y2="270" stroke="#13202c" stroke-width="6" opacity="0.6"/>
    <line x1="-200" y1="320" x2="1000" y2="320" stroke="#0f1a24" stroke-width="10" opacity="0.6"/>
    <line x1="-200" y1="385" x2="1000" y2="385" stroke="#0b141d" stroke-width="14" opacity="0.6"/>
  </g>

  <!-- Soft halo from the level flame -->
  <ellipse cx="400" cy="190" rx="240" ry="200" fill="url(#g_glow)"/>

  <!-- ===== The gimbal: nested rings, hung from a fixed pivot ===== -->
  <!-- Mounting bracket bolted to the (tilted) ship, pivot at top -->
  <g transform="rotate(-14 400 230)">
    <rect x="392" y="34" width="16" height="30" rx="3" fill="url(#g_brassDk)"/>
    <circle cx="400" cy="64" r="7" fill="#caa455" stroke="#5a4216" stroke-width="2"/>
  </g>

  <!-- Outer ring: tilted with the ship, free on the vertical axis -->
  <g transform="rotate(-9 400 200)">
    <circle cx="400" cy="200" r="150" fill="none" stroke="url(#g_brassDk)" stroke-width="13"/>
    <circle cx="400" cy="200" r="150" fill="none" stroke="#f3d98a" stroke-width="2" opacity="0.4"/>
    <!-- outer pivot pins (left/right) -->
    <circle cx="250" cy="200" r="9" fill="#caa455" stroke="#4f3a12" stroke-width="2"/>
    <circle cx="550" cy="200" r="9" fill="#caa455" stroke="#4f3a12" stroke-width="2"/>
  </g>

  <!-- Inner ring: stays level, pivoted crosswise (top/bottom pins) -->
  <g>
    <circle cx="400" cy="200" r="112" fill="none" stroke="url(#g_brass)" stroke-width="11"/>
    <circle cx="400" cy="200" r="112" fill="none" stroke="#fff3c4" stroke-width="1.5" opacity="0.5"/>
    <!-- inner pivot pins (top/bottom) -->
    <circle cx="400" cy="88" r="8" fill="#e0bb63" stroke="#5a4216" stroke-width="2"/>
    <circle cx="400" cy="312" r="8" fill="#e0bb63" stroke="#5a4216" stroke-width="2"/>
  </g>

  <!-- ===== The lamp: hangs dead level inside the inner ring ===== -->
  <g>
    <!-- gimbal hanger from inner-ring top pin -->
    <line x1="400" y1="88" x2="400" y2="150" stroke="#7c5c22" stroke-width="4"/>
    <!-- lamp bowl (oil reservoir) -->
    <path d="M360 250 Q360 290 400 292 Q440 290 440 250 Z" fill="url(#g_brassDk)"/>
    <path d="M360 250 Q360 290 400 292 Q440 290 440 250 Z" fill="none" stroke="#f3d98a" stroke-width="1.5" opacity="0.4"/>
    <!-- lamp collar -->
    <rect x="384" y="232" width="32" height="20" rx="3" fill="url(#g_brass)"/>
    <!-- glass chimney -->
    <path d="M386 232 Q380 195 392 168 L408 168 Q420 195 414 232 Z"
          fill="#fbe9b0" opacity="0.16" stroke="#d9c081" stroke-width="1.5"/>
    <!-- the flame: perfectly vertical, indifferent to the tilt -->
    <path d="M400 215 Q386 198 400 168 Q414 198 400 215 Z" fill="url(#g_flame)"/>
    <path d="M400 208 Q394 198 400 182 Q406 198 400 208 Z" fill="#fff7da"/>
  </g>

  <!-- plumb reference: the true vertical the flame keeps faith with -->
  <line x1="400" y1="150" x2="400" y2="360" stroke="#8aa0b8" stroke-width="1" stroke-dasharray="2 7" opacity="0.35"/>

  <!-- title -->
  <text x="400" y="372" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif"
        font-size="22" fill="#e7d6ad" letter-spacing="5" opacity="0.92">THE GIMBAL</text>
</svg>
