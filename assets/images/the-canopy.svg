<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="canopy-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a5a3a"/>
      <stop offset="100%" stop-color="#1a3a28"/>
    </linearGradient>
    <linearGradient id="understory-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a3a28"/>
      <stop offset="100%" stop-color="#0f2a1a"/>
    </linearGradient>
    <linearGradient id="floor-g" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f2a1a"/>
      <stop offset="100%" stop-color="#0a1a10"/>
    </linearGradient>
    <radialGradient id="lightbeam" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#ffffcc" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffcc" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="800" height="400" fill="url(#sky)"/>

  <!-- Canopy layer — dense crowns -->
  <g fill="url(#canopy-g)" opacity="0.9">
    <ellipse cx="100" cy="80" rx="110" ry="55"/>
    <ellipse cx="260" cy="65" rx="120" ry="60"/>
    <ellipse cx="420" cy="75" rx="100" ry="50"/>
    <ellipse cx="560" cy="60" rx="130" ry="58"/>
    <ellipse cx="720" cy="72" rx="115" ry="52"/>
  </g>

  <!-- Canopy leaf texture -->
  <g fill="#3a7a4a" opacity="0.3">
    <circle cx="80" cy="60" r="18"/>
    <circle cx="140" cy="70" r="15"/>
    <circle cx="230" cy="50" r="20"/>
    <circle cx="300" cy="60" r="16"/>
    <circle cx="390" cy="65" r="14"/>
    <circle cx="450" cy="68" r="17"/>
    <circle cx="530" cy="48" r="19"/>
    <circle cx="600" cy="55" r="15"/>
    <circle cx="680" cy="58" r="18"/>
    <circle cx="760" cy="65" r="14"/>
  </g>

  <!-- Light filtering through canopy gap -->
  <polygon points="370,30 340,400 400,400" fill="#ffffcc" opacity="0.04"/>
  <polygon points="380,40 355,400 395,400" fill="#ffffcc" opacity="0.03"/>

  <!-- Trunks reaching up to canopy -->
  <g fill="#2a1a10" opacity="0.7">
    <rect x="95" y="100" width="8" height="280"/>
    <rect x="255" y="85" width="10" height="295"/>
    <rect x="415" y="95" width="7" height="285"/>
    <rect x="555" y="80" width="9" height="300"/>
    <rect x="715" y="90" width="8" height="290"/>
  </g>

  <!-- Understory — smaller trees -->
  <g fill="url(#understory-g)" opacity="0.75">
    <ellipse cx="170" cy="170" rx="55" ry="35"/>
    <ellipse cx="340" cy="180" rx="50" ry="30"/>
    <ellipse cx="490" cy="165" rx="60" ry="38"/>
    <ellipse cx="640" cy="175" rx="48" ry="32"/>
  </g>

  <!-- Understory leaf detail -->
  <g fill="#2a6a38" opacity="0.25">
    <circle cx="155" cy="165" r="12"/>
    <circle cx="185" cy="170" r="10"/>
    <circle cx="325" cy="175" r="11"/>
    <circle cx="360" cy="178" r="9"/>
    <circle cx="475" cy="160" r="13"/>
    <circle cx="510" cy="163" r="10"/>
    <circle cx="630" cy="170" r="11"/>
    <circle cx="655" cy="173" r="9"/>
  </g>

  <!-- Understory trunks -->
  <g fill="#1a1008" opacity="0.5">
    <rect x="167" y="195" width="5" height="185"/>
    <rect x="337" y="200" width="5" height="180"/>
    <rect x="487" y="193" width="6" height="187"/>
    <rect x="637" y="198" width="5" height="182"/>
  </g>

  <!-- Shrub layer -->
  <g fill="#0f3a1a" opacity="0.6">
    <ellipse cx="60" cy="290" rx="40" ry="20"/>
    <ellipse cx="200" cy="300" rx="35" ry="18"/>
    <ellipse cx="310" cy="295" rx="30" ry="16"/>
    <ellipse cx="450" cy="288" rx="38" ry="22"/>
    <ellipse cx="580" cy="298" rx="32" ry="17"/>
    <ellipse cx="700" cy="292" rx="36" ry="19"/>
  </g>

  <!-- Forest floor -->
  <rect x="0" y="340" width="800" height="60" fill="url(#floor-g)"/>

  <!-- Floor texture — fallen leaves and decomposition -->
  <g fill="#1a2a14" opacity="0.4">
    <ellipse cx="50" cy="355" rx="30" ry="4"/>
    <ellipse cx="150" cy="360" rx="25" ry="3"/>
    <ellipse cx="280" cy="352" rx="35" ry="5"/>
    <ellipse cx="400" cy="358" rx="28" ry="4"/>
    <ellipse cx="520" cy="355" rx="32" ry="3"/>
    <ellipse cx="650" cy="360" rx="26" ry="4"/>
    <ellipse cx="750" cy="353" rx="30" ry="3"/>
  </g>

  <!-- Dappled light spots on understory and floor -->
  <g fill="#ffffaa" opacity="0.06">
    <circle cx="375" cy="230" r="8"/>
    <circle cx="380" cy="280" r="6"/>
    <circle cx="370" cy="330" r="10"/>
    <circle cx="385" cy="355" r="7"/>
  </g>

  <!-- Mycorrhizal network suggestion — faint lines underground -->
  <g stroke="#4a8a5a" stroke-width="0.5" opacity="0.12" fill="none">
    <path d="M100 380 Q180 370 260 380 Q340 390 420 378 Q500 368 560 380 Q640 392 720 380"/>
    <path d="M60 390 Q200 382 340 388 Q480 394 560 386 Q680 378 780 390"/>
  </g>

  <!-- Subtle root shapes -->
  <g stroke="#2a1a10" stroke-width="1" opacity="0.15" fill="none">
    <path d="M95 380 Q80 385 60 382"/>
    <path d="M103 380 Q120 388 140 384"/>
    <path d="M255 380 Q235 386 215 383"/>
    <path d="M265 380 Q285 388 310 384"/>
    <path d="M555 380 Q535 387 510 383"/>
    <path d="M564 380 Q585 386 610 382"/>
  </g>

  <!-- Layer labels — very subtle -->
  <g fill="#ffffff" opacity="0.08" font-family="monospace" font-size="9">
    <text x="20" y="70">canopy</text>
    <text x="20" y="175">understory</text>
    <text x="20" y="295">shrub</text>
    <text x="20" y="360">floor</text>
  </g>
</svg>
