<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1015"/>
      <stop offset="100%" stop-color="#2a1a1a"/>
    </linearGradient>
    <linearGradient id="fire" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#cc4400"/>
      <stop offset="40%" stop-color="#ee7722"/>
      <stop offset="80%" stop-color="#ffaa44"/>
      <stop offset="100%" stop-color="#ffdd88"/>
    </linearGradient>
    <linearGradient id="brick" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a4a3a"/>
      <stop offset="100%" stop-color="#4a3228"/>
    </linearGradient>
    <radialGradient id="heatglow" cx="50%" cy="65%" r="35%">
      <stop offset="0%" stop-color="#ffaa44" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#cc4400" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#cc4400" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="emberglow" cx="50%" cy="80%" r="25%">
      <stop offset="0%" stop-color="#ff6633" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ff6633" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Ambient heat glow -->
  <rect width="800" height="400" fill="url(#heatglow)"/>
  <rect width="800" height="400" fill="url(#emberglow)"/>

  <!-- Kiln body — domed arch shape -->
  <!-- Back wall -->
  <path d="M250 340 L250 180 Q400 60 550 180 L550 340 Z" fill="url(#brick)" opacity="0.85"/>

  <!-- Brick texture -->
  <g stroke="#3a2218" stroke-width="0.6" opacity="0.35">
    <!-- Horizontal courses -->
    <line x1="250" y1="200" x2="550" y2="200"/>
    <line x1="250" y1="225" x2="550" y2="225"/>
    <line x1="250" y1="250" x2="550" y2="250"/>
    <line x1="250" y1="275" x2="550" y2="275"/>
    <line x1="250" y1="300" x2="550" y2="300"/>
    <line x1="250" y1="325" x2="550" y2="325"/>
    <!-- Vertical joints, staggered -->
    <line x1="300" y1="200" x2="300" y2="225"/>
    <line x1="350" y1="200" x2="350" y2="225"/>
    <line x1="400" y1="200" x2="400" y2="225"/>
    <line x1="450" y1="200" x2="450" y2="225"/>
    <line x1="500" y1="200" x2="500" y2="225"/>
    <line x1="275" y1="225" x2="275" y2="250"/>
    <line x1="325" y1="225" x2="325" y2="250"/>
    <line x1="375" y1="225" x2="375" y2="250"/>
    <line x1="425" y1="225" x2="425" y2="250"/>
    <line x1="475" y1="225" x2="475" y2="250"/>
    <line x1="525" y1="225" x2="525" y2="250"/>
    <line x1="300" y1="250" x2="300" y2="275"/>
    <line x1="350" y1="250" x2="350" y2="275"/>
    <line x1="400" y1="250" x2="400" y2="275"/>
    <line x1="450" y1="250" x2="450" y2="275"/>
    <line x1="500" y1="250" x2="500" y2="275"/>
    <line x1="275" y1="275" x2="275" y2="300"/>
    <line x1="325" y1="275" x2="325" y2="300"/>
    <line x1="375" y1="275" x2="375" y2="300"/>
    <line x1="425" y1="275" x2="425" y2="300"/>
    <line x1="475" y1="275" x2="475" y2="300"/>
    <line x1="525" y1="275" x2="525" y2="300"/>
  </g>

  <!-- Dome arch bricks -->
  <g stroke="#3a2218" stroke-width="0.5" opacity="0.3">
    <path d="M270 185 Q400 85 530 185" fill="none"/>
    <path d="M260 195 Q400 75 540 195" fill="none"/>
  </g>

  <!-- Kiln opening — arch doorway -->
  <path d="M340 340 L340 240 Q400 195 460 240 L460 340 Z" fill="#0d0808"/>

  <!-- Fire inside the kiln -->
  <g opacity="0.9">
    <!-- Base flames -->
    <path d="M355 340 Q365 295 380 310 Q390 280 400 300 Q410 275 420 305 Q430 290 445 340 Z" fill="url(#fire)" opacity="0.85"/>
    <!-- Taller center flame -->
    <path d="M380 340 Q385 270 400 260 Q415 270 420 340 Z" fill="#ffcc66" opacity="0.4"/>
    <!-- Small flame tongues -->
    <path d="M365 320 Q370 290 378 310" fill="none" stroke="#ffaa44" stroke-width="1.5" opacity="0.5"/>
    <path d="M430 325 Q425 295 418 315" fill="none" stroke="#ffaa44" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Embers on the floor -->
  <g fill="#ff6633" opacity="0.5">
    <circle cx="370" cy="335" r="1.5"/>
    <circle cx="385" cy="338" r="1"/>
    <circle cx="410" cy="336" r="1.2"/>
    <circle cx="425" cy="333" r="1"/>
    <circle cx="440" cy="337" r="0.8"/>
    <circle cx="358" cy="332" r="0.7"/>
  </g>

  <!-- Pot silhouette inside kiln, being fired -->
  <path d="M393 290 Q388 270 390 260 Q395 255 400 255 Q405 255 410 260 Q412 270 407 290 Z" fill="#3a2218" opacity="0.6"/>
  <!-- Pot rim -->
  <ellipse cx="400" cy="256" rx="10" ry="3" fill="none" stroke="#4a3228" stroke-width="1" opacity="0.5"/>

  <!-- Heat shimmer lines rising from kiln -->
  <g stroke="#ffaa44" stroke-width="0.5" opacity="0.12" fill="none">
    <path d="M380 180 Q385 160 380 140 Q375 120 380 100"/>
    <path d="M400 175 Q405 150 400 130 Q395 110 400 85"/>
    <path d="M420 180 Q415 158 420 138 Q425 118 420 95"/>
  </g>

  <!-- Sparks floating upward -->
  <g fill="#ffcc66" opacity="0.4">
    <circle cx="390" cy="150" r="1.2"/>
    <circle cx="415" cy="130" r="0.8"/>
    <circle cx="380" cy="110" r="1"/>
    <circle cx="405" cy="95" r="0.7"/>
    <circle cx="425" cy="115" r="0.9"/>
    <circle cx="395" cy="80" r="0.6"/>
  </g>

  <!-- Ground line -->
  <line x1="0" y1="340" x2="800" y2="340" stroke="#4a3228" stroke-width="1" opacity="0.4"/>

  <!-- Subtle glow cast on ground -->
  <ellipse cx="400" cy="345" rx="80" ry="8" fill="#cc4400" opacity="0.06"/>
</svg>
