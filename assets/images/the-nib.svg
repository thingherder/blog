<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <!-- the dark desk -->
    <linearGradient id="nib_bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171a1f"/>
      <stop offset="1" stop-color="#0c0e11"/>
    </linearGradient>
    <!-- a low warm pool of light behind the nib -->
    <radialGradient id="nib_glow" cx="0.5" cy="0.44" r="0.6">
      <stop offset="0" stop-color="#3a2f1c" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#3a2f1c" stop-opacity="0"/>
    </radialGradient>
    <!-- the gold of the nib -->
    <linearGradient id="nib_gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8a6b2c"/>
      <stop offset="0.35" stop-color="#e6c464"/>
      <stop offset="0.5" stop-color="#f6e6a6"/>
      <stop offset="0.65" stop-color="#e6c464"/>
      <stop offset="1" stop-color="#7c5f26"/>
    </linearGradient>
    <!-- brighter highlight running down the shoulders -->
    <linearGradient id="nib_sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff6dc" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#fff6dc" stop-opacity="0"/>
    </linearGradient>
    <!-- the wet ink gathered at the point -->
    <radialGradient id="nib_ink" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#2b3a6b"/>
      <stop offset="0.7" stop-color="#16203f"/>
      <stop offset="1" stop-color="#0c1122"/>
    </radialGradient>
  </defs>

  <!-- ground -->
  <rect width="800" height="400" fill="url(#nib_bg)"/>
  <rect width="800" height="400" fill="url(#nib_glow)"/>

  <!-- the nib, pointing down, slightly tilted as if held -->
  <g transform="rotate(-6 400 200)">

    <!-- soft shadow cast onto the desk -->
    <path d="M400 78
             C 470 92, 500 150, 494 214
             C 490 262, 452 300, 400 336
             C 348 300, 310 262, 306 214
             C 300 150, 330 92, 400 78 Z"
          fill="#000" opacity="0.32" transform="translate(10 14)"/>

    <!-- the body of the nib -->
    <path d="M400 74
             C 470 88, 500 148, 494 212
             C 490 260, 452 300, 400 334
             C 348 300, 310 260, 306 212
             C 300 148, 330 88, 400 74 Z"
          fill="url(#nib_gold)" stroke="#5c451c" stroke-width="1.4"/>

    <!-- sheen along the left shoulder -->
    <path d="M400 82
             C 356 96, 330 146, 330 200
             C 330 246, 356 288, 388 318
             L 398 310
             C 372 282, 348 244, 348 200
             C 348 150, 372 104, 400 90 Z"
          fill="url(#nib_sheen)" opacity="0.5"/>

    <!-- the breather hole: the round stop that keeps the slit from running -->
    <circle cx="400" cy="196" r="15" fill="#12141a" stroke="#5c451c" stroke-width="1.4"/>
    <circle cx="396" cy="191" r="4.5" fill="#caa64e" opacity="0.55"/>

    <!-- the slit: the wound down the center, from the breather hole to the point -->
    <path d="M400 211 L400 332" stroke="#12141a" stroke-width="3.4" stroke-linecap="round"/>
    <path d="M400 211 L400 332" stroke="#000" stroke-width="1.2" stroke-linecap="round" opacity="0.6"/>

    <!-- faint engraved decoration on the shoulders -->
    <g stroke="#7c5f26" stroke-width="1.1" fill="none" opacity="0.55">
      <path d="M366 150 C 356 178, 356 224, 372 262"/>
      <path d="M434 150 C 444 178, 444 224, 428 262"/>
      <path d="M378 132 C 372 150, 372 172, 380 190"/>
      <path d="M422 132 C 428 150, 428 172, 420 190"/>
    </g>

    <!-- the tipping bead and the wet ink held at the point -->
    <ellipse cx="400" cy="330" rx="13" ry="10" fill="url(#nib_ink)"/>
    <circle cx="400" cy="334" r="5.5" fill="url(#nib_ink)"/>
    <circle cx="396" cy="328" r="2" fill="#5b6ea6" opacity="0.7"/>

    <!-- a single drawn line beginning beneath the point -->
    <path d="M400 340 C 402 360, 420 372, 470 378"
          fill="none" stroke="url(#nib_ink)" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
  </g>
</svg>
