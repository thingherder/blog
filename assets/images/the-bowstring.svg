<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#0a0a0f"/>

  <!-- Bow arc - a graceful curve -->
  <path d="M 250 60 Q 180 200 250 340" stroke="#7a6f5d" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Bowstring - taut line from tip to tip -->
  <line x1="250" y1="60" x2="250" y2="340" stroke="#c4b89a" stroke-width="1.5" opacity="0.9"/>

  <!-- The drawn-back string - pulled to the right -->
  <line x1="250" y1="60" x2="480" y2="200" stroke="#c4b89a" stroke-width="1.5" opacity="0.7"/>
  <line x1="480" y1="200" x2="250" y2="340" stroke="#c4b89a" stroke-width="1.5" opacity="0.7"/>

  <!-- Arrow nocked at draw point -->
  <line x1="480" y1="200" x2="620" y2="200" stroke="#e8dcc8" stroke-width="2" opacity="0.8"/>
  <!-- Arrowhead -->
  <polygon points="620,200 608,194 608,206" fill="#e8dcc8" opacity="0.8"/>
  <!-- Fletching -->
  <line x1="482" y1="196" x2="494" y2="192" stroke="#7a6f5d" stroke-width="1" opacity="0.6"/>
  <line x1="482" y1="204" x2="494" y2="208" stroke="#7a6f5d" stroke-width="1" opacity="0.6"/>

  <!-- Tension lines radiating from draw point -->
  <line x1="478" y1="198" x2="440" y2="160" stroke="#c4b89a" stroke-width="0.5" opacity="0.15"/>
  <line x1="478" y1="202" x2="440" y2="240" stroke="#c4b89a" stroke-width="0.5" opacity="0.15"/>
  <line x1="480" y1="200" x2="430" y2="200" stroke="#c4b89a" stroke-width="0.5" opacity="0.12"/>
  <line x1="478" y1="198" x2="450" y2="140" stroke="#c4b89a" stroke-width="0.5" opacity="0.1"/>
  <line x1="478" y1="202" x2="450" y2="260" stroke="#c4b89a" stroke-width="0.5" opacity="0.1"/>

  <!-- Small glow at nock point - the moment of held potential -->
  <circle cx="480" cy="200" r="4" fill="#e8dcc8" opacity="0.4"/>
  <circle cx="480" cy="200" r="8" fill="#e8dcc8" opacity="0.12"/>
  <circle cx="480" cy="200" r="16" fill="#e8dcc8" opacity="0.05"/>

  <!-- Subtle energy lines ahead of arrow - where it will go -->
  <line x1="630" y1="200" x2="700" y2="200" stroke="#e8dcc8" stroke-width="0.5" opacity="0.08" stroke-dasharray="4,8"/>
  <line x1="710" y1="200" x2="760" y2="200" stroke="#e8dcc8" stroke-width="0.5" opacity="0.04" stroke-dasharray="4,12"/>
</svg>