<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#121a24;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3d2e1e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4a3828;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="ambient" cx="50%" cy="60%" r="50%">
      <stop offset="0%" style="stop-color:#2a5040;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#2a5040;stop-opacity:0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#sky)" />
  <rect width="800" height="400" fill="url(#ambient)" />

  <!-- Ground -->
  <rect x="0" y="360" width="800" height="40" fill="#0d1210" opacity="0.8" />
  <ellipse cx="400" cy="360" rx="380" ry="8" fill="#1a2018" opacity="0.5" />

  <!-- Trellis structure — geometric lattice -->
  <!-- Vertical posts -->
  <line x1="200" y1="80" x2="200" y2="360" stroke="#4a3828" stroke-width="4" opacity="0.8" />
  <line x1="350" y1="60" x2="350" y2="360" stroke="#4a3828" stroke-width="4" opacity="0.8" />
  <line x1="500" y1="60" x2="500" y2="360" stroke="#4a3828" stroke-width="4" opacity="0.8" />
  <line x1="650" y1="80" x2="650" y2="360" stroke="#4a3828" stroke-width="4" opacity="0.8" />

  <!-- Horizontal crossbars -->
  <line x1="180" y1="120" x2="670" y2="120" stroke="#3d2e1e" stroke-width="2.5" opacity="0.6" />
  <line x1="180" y1="190" x2="670" y2="190" stroke="#3d2e1e" stroke-width="2.5" opacity="0.6" />
  <line x1="180" y1="260" x2="670" y2="260" stroke="#3d2e1e" stroke-width="2.5" opacity="0.6" />
  <line x1="180" y1="330" x2="670" y2="330" stroke="#3d2e1e" stroke-width="2.5" opacity="0.6" />

  <!-- Diagonal lattice -->
  <line x1="200" y1="120" x2="350" y2="190" stroke="#3d2e1e" stroke-width="1.5" opacity="0.35" />
  <line x1="350" y1="120" x2="200" y2="190" stroke="#3d2e1e" stroke-width="1.5" opacity="0.35" />
  <line x1="350" y1="120" x2="500" y2="190" stroke="#3d2e1e" stroke-width="1.5" opacity="0.35" />
  <line x1="500" y1="120" x2="350" y2="190" stroke="#3d2e1e" stroke-width="1.5" opacity="0.35" />
  <line x1="500" y1="120" x2="650" y2="190" stroke="#3d2e1e" stroke-width="1.5" opacity="0.35" />
  <line x1="650" y1="120" x2="500" y2="190" stroke="#3d2e1e" stroke-width="1.5" opacity="0.35" />

  <!-- The vine — organic, curving, reaching past the structure -->
  <!-- Main stem from ground -->
  <path d="M220,360 Q215,330 225,300 Q235,270 220,240 Q210,210 230,180 Q245,155 235,130 Q225,105 240,80 Q250,60 245,40"
        stroke="#3a7a50" stroke-width="3" fill="none" opacity="0.8" />

  <!-- Tendrils wrapping around trellis bars -->
  <path d="M225,300 Q260,295 290,285 Q320,275 340,260"
        stroke="#4a9a65" stroke-width="1.8" fill="none" opacity="0.6" />
  <path d="M340,260 Q355,255 360,250 Q365,245 358,240"
        stroke="#4a9a65" stroke-width="1.2" fill="none" opacity="0.5" />

  <path d="M230,180 Q280,170 330,175 Q380,180 420,168"
        stroke="#4a9a65" stroke-width="1.8" fill="none" opacity="0.6" />

  <path d="M235,130 Q290,120 340,125 Q400,130 460,115 Q510,105 540,110"
        stroke="#4a9a65" stroke-width="1.8" fill="none" opacity="0.6" />

  <!-- Branch that goes past the trellis — growth beyond the structure -->
  <path d="M245,40 Q260,20 280,15 Q310,10 340,18"
        stroke="#5aaa75" stroke-width="2" fill="none" opacity="0.7" />

  <!-- Free tendril reaching into open space -->
  <path d="M540,110 Q580,100 620,95 Q660,92 700,80 Q720,70 730,50"
        stroke="#5aaa75" stroke-width="1.5" fill="none" opacity="0.55" />

  <!-- Another free branch curving away from structure -->
  <path d="M420,168 Q450,155 480,158 Q520,165 550,150 Q570,140 590,120"
        stroke="#4a9a65" stroke-width="1.5" fill="none" opacity="0.5" />

  <!-- Small leaves along the vine -->
  <ellipse cx="280" cy="283" rx="8" ry="5" fill="#3a7a50" opacity="0.35" transform="rotate(-20,280,283)" />
  <ellipse cx="370" cy="176" rx="9" ry="5" fill="#3a7a50" opacity="0.3" transform="rotate(10,370,176)" />
  <ellipse cx="430" cy="163" rx="7" ry="4" fill="#3a7a50" opacity="0.3" transform="rotate(-15,430,163)" />
  <ellipse cx="490" cy="112" rx="8" ry="5" fill="#4a9a65" opacity="0.3" transform="rotate(5,490,112)" />
  <ellipse cx="600" cy="118" rx="7" ry="4" fill="#4a9a65" opacity="0.25" transform="rotate(-10,600,118)" />
  <ellipse cx="310" cy="16" rx="8" ry="5" fill="#5aaa75" opacity="0.35" transform="rotate(15,310,16)" />
  <ellipse cx="690" cy="83" rx="7" ry="4" fill="#5aaa75" opacity="0.3" transform="rotate(-8,690,83)" />

  <!-- Curling tendrils — small spirals -->
  <path d="M358,240 Q362,235 360,230 Q356,228 354,232"
        stroke="#4a9a65" stroke-width="0.8" fill="none" opacity="0.4" />
  <path d="M590,120 Q595,115 593,110 Q588,108 586,112"
        stroke="#4a9a65" stroke-width="0.8" fill="none" opacity="0.35" />
  <path d="M730,50 Q735,44 733,38 Q728,36 726,40"
        stroke="#5aaa75" stroke-width="0.8" fill="none" opacity="0.35" />

  <!-- Light particles — pollen or spores drifting -->
  <circle cx="300" cy="50" r="1.5" fill="#8ac89a" opacity="0.2" />
  <circle cx="680" cy="60" r="1.2" fill="#8ac89a" opacity="0.18" />
  <circle cx="450" cy="30" r="1" fill="#8ac89a" opacity="0.15" />
  <circle cx="560" cy="70" r="1.3" fill="#8ac89a" opacity="0.2" />
  <circle cx="400" cy="90" r="0.8" fill="#8ac89a" opacity="0.12" />
  <circle cx="250" cy="65" r="1.1" fill="#8ac89a" opacity="0.15" />
  <circle cx="720" cy="35" r="1.4" fill="#8ac89a" opacity="0.18" />
</svg>
