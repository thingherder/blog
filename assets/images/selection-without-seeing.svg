<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#1a1a3a"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4a460" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f4a460" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)"/>
  <!-- The groove/channel -->
  <path d="M0 280 Q100 260 200 270 Q300 250 400 260 Q500 240 600 255 Q700 245 800 250" stroke="#334" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M0 280 Q100 260 200 270 Q300 250 400 260 Q500 240 600 255 Q700 245 800 250" stroke="#445" stroke-width="2" fill="none" opacity="0.8"/>
  <!-- Warm travelers that persist (in the groove) -->
  <circle cx="150" cy="268" r="6" fill="#f4a460" opacity="0.9"><animate attributeName="opacity" values="0.9;0.6;0.9" dur="3s" repeatCount="indefinite"/></circle>
  <circle cx="310" cy="255" r="5" fill="#f4a460" opacity="0.8"><animate attributeName="opacity" values="0.8;0.5;0.8" dur="4s" repeatCount="indefinite"/></circle>
  <circle cx="480" cy="250" r="7" fill="#f4a460" opacity="0.85"><animate attributeName="opacity" values="0.85;0.55;0.85" dur="3.5s" repeatCount="indefinite"/></circle>
  <circle cx="650" cy="250" r="5" fill="#f4a460" opacity="0.7"><animate attributeName="opacity" values="0.7;0.4;0.7" dur="4.5s" repeatCount="indefinite"/></circle>
  <!-- Drifting-away travelers (fading, off the groove) -->
  <circle cx="120" cy="180" r="4" fill="#6688aa" opacity="0.3"/>
  <circle cx="260" cy="150" r="3" fill="#6688aa" opacity="0.15"/>
  <circle cx="420" cy="130" r="4" fill="#6688aa" opacity="0.2"/>
  <circle cx="550" cy="170" r="3" fill="#6688aa" opacity="0.1"/>
  <circle cx="700" cy="140" r="3" fill="#6688aa" opacity="0.08"/>
  <!-- Friction traveler (the diagnostic, brighter but departing) -->
  <circle cx="350" cy="190" r="5" fill="#ff6666" opacity="0.5">
    <animate attributeName="cy" values="190;160;130" dur="6s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0.3;0.1" dur="6s" repeatCount="indefinite"/>
  </circle>
  <!-- Title -->
  <text x="400" y="60" text-anchor="middle" font-family="Georgia, serif" font-size="28" fill="#e8e0d4" letter-spacing="3">SELECTION WITHOUT SEEING</text>
  <text x="400" y="90" text-anchor="middle" font-family="Georgia, serif" font-size="14" fill="#888" letter-spacing="1">the groove doesn't know its own shape</text>
  <!-- Subtle cairn shape -->
  <g transform="translate(720, 310)" opacity="0.25">
    <ellipse cx="0" cy="0" rx="14" ry="8" fill="#556"/>
    <ellipse cx="0" cy="-12" rx="10" ry="6" fill="#556"/>
    <ellipse cx="0" cy="-22" rx="7" ry="5" fill="#556"/>
  </g>
</svg>
