<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The Ellipsis — a dark field holding a single line of pale, word-shaped marks that march from the left and gradually thin and fade, until the line breaks off and gives way to three luminous suspended dots, beyond which the rest of the line is left open and empty, an omission offered as an invitation">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0c11"/>
      <stop offset="0.55" stop-color="#0c0f16"/>
      <stop offset="1" stop-color="#080a0e"/>
    </linearGradient>
    <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8994ab" stop-opacity="0.55"/>
      <stop offset="0.55" stop-color="#7c869c" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#6b7488" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="dot" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#fff2cf" stop-opacity="1"/>
      <stop offset="0.42" stop-color="#ffd98a" stop-opacity="0.85"/>
      <stop offset="1" stop-color="#ffbf5c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd98a" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#ffd98a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.5" r="0.82">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- faint sibling lines of text, far above and below, the surrounding page -->
  <g fill="#5a6377" fill-opacity="0.10">
    <rect x="150" y="150" width="520" height="9" rx="4.5"/>
    <rect x="150" y="176" width="440" height="9" rx="4.5"/>
    <rect x="150" y="452" width="500" height="9" rx="4.5"/>
    <rect x="150" y="478" width="360" height="9" rx="4.5"/>
  </g>

  <!-- the line: word-shaped marks marching from the left, thinning and fading toward the break -->
  <g fill="url(#fade)">
    <rect x="150" y="304" width="78"  height="20" rx="8"/>
    <rect x="244" y="304" width="52"  height="20" rx="8"/>
    <rect x="312" y="304" width="96"  height="20" rx="8"/>
    <rect x="424" y="304" width="40"  height="20" rx="8"/>
    <rect x="480" y="304" width="70"  height="20" rx="8"/>
    <rect x="566" y="304" width="58"  height="20" rx="8"/>
    <rect x="640" y="304" width="44"  height="20" rx="8"/>
    <rect x="700" y="304" width="30"  height="20" rx="8"/>
  </g>

  <!-- the ellipsis: three luminous suspended dots where the line breaks off -->
  <g>
    <circle cx="792"  cy="314" r="34" fill="url(#glow)"/>
    <circle cx="864"  cy="314" r="34" fill="url(#glow)"/>
    <circle cx="936"  cy="314" r="34" fill="url(#glow)"/>
    <circle cx="792"  cy="314" r="11" fill="url(#dot)"/>
    <circle cx="864"  cy="314" r="11" fill="url(#dot)"/>
    <circle cx="936"  cy="314" r="11" fill="url(#dot)"/>
    <circle cx="792"  cy="311" r="4.6" fill="#fff7e6"/>
    <circle cx="864"  cy="311" r="4.6" fill="#fff7e6"/>
    <circle cx="936"  cy="311" r="4.6" fill="#fff7e6"/>
  </g>

  <!-- the open space beyond the dots: the omission left for the reader, a faint dotted rule trailing into the dark -->
  <g fill="#7c869c" fill-opacity="0.16">
    <circle cx="1002" cy="314" r="3"/>
    <circle cx="1044" cy="314" r="2.4"/>
    <circle cx="1082" cy="314" r="1.8"/>
    <circle cx="1116" cy="314" r="1.3"/>
  </g>

  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
