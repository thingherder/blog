<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5efe6"/>
      <stop offset="100%" stop-color="#e8dcc8"/>
    </linearGradient>
    <linearGradient id="jar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c5a9" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c4b599" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="starter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d8b4"/>
      <stop offset="40%" stop-color="#d4c49a"/>
      <stop offset="100%" stop-color="#c0a878"/>
    </linearGradient>
    <radialGradient id="bubble" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f5efe6" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#e8d8b4" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="jar-clip">
      <rect x="280" y="100" width="240" height="260" rx="12"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid of time marks -->
  <g opacity="0.08" stroke="#8a7a5a" stroke-width="0.5">
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="0" y1="240" x2="800" y2="240"/>
    <line x1="0" y1="320" x2="800" y2="320"/>
  </g>

  <!-- Jar outline -->
  <rect x="280" y="100" width="240" height="260" rx="12" fill="url(#jar)" stroke="#a89878" stroke-width="1.5"/>

  <!-- Jar rim -->
  <rect x="272" y="92" width="256" height="16" rx="4" fill="none" stroke="#a89878" stroke-width="1.5"/>

  <!-- Starter level (rises past halfway — alive and active) -->
  <g clip-path="url(#jar-clip)">
    <!-- Starter body -->
    <rect x="280" y="200" width="240" height="160" fill="url(#starter)"/>

    <!-- Surface tension curve -->
    <path d="M280 200 Q340 190, 400 195 Q460 200, 520 192" fill="none" stroke="#b8a470" stroke-width="1" opacity="0.5"/>

    <!-- Bubbles — the sign of life -->
    <circle cx="320" cy="260" r="8" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="355" cy="235" r="5" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="390" cy="280" r="10" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="420" cy="245" r="6" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="450" cy="270" r="7" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="480" cy="225" r="4" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="340" cy="310" r="6" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="410" cy="320" r="9" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="470" cy="300" r="5" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="500" cy="255" r="7" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="310" cy="340" r="4" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>
    <circle cx="450" cy="340" r="8" fill="url(#bubble)" stroke="#c4b090" stroke-width="0.5"/>

    <!-- Rise marks on jar wall — ghost lines of past rises -->
    <line x1="282" y1="220" x2="295" y2="220" stroke="#a89070" stroke-width="0.5" opacity="0.3"/>
    <line x1="282" y1="190" x2="292" y2="190" stroke="#a89070" stroke-width="0.5" opacity="0.2"/>
    <line x1="282" y1="170" x2="290" y2="170" stroke="#a89070" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- Feeding cycle arrows (left side) — small, repeating -->
  <g opacity="0.25" stroke="#7a6a4a" fill="none" stroke-width="1">
    <!-- Circular arrow suggesting cycle -->
    <path d="M120 200 A60 60 0 1 1 120 199.9" stroke-dasharray="4,3"/>
    <polygon points="124,200 120,192 116,200" fill="#7a6a4a" stroke="none"/>
  </g>

  <!-- Time arrows (right side) — continuity -->
  <g opacity="0.2" stroke="#7a6a4a" fill="none" stroke-width="1">
    <line x1="640" y1="140" x2="640" y2="340"/>
    <polygon points="640,340 636,330 644,330" fill="#7a6a4a" stroke="none"/>
    <!-- Tick marks for feedings -->
    <line x1="636" y1="160" x2="644" y2="160"/>
    <line x1="636" y1="200" x2="644" y2="200"/>
    <line x1="636" y1="240" x2="644" y2="240"/>
    <line x1="636" y1="280" x2="644" y2="280"/>
    <line x1="636" y1="320" x2="644" y2="320"/>
  </g>

  <!-- Small dots flowing from old into new (top of jar) -->
  <g opacity="0.15">
    <circle cx="350" cy="205" r="1.5" fill="#8a7a5a"/>
    <circle cx="370" cy="202" r="1" fill="#8a7a5a"/>
    <circle cx="400" cy="207" r="1.5" fill="#8a7a5a"/>
    <circle cx="430" cy="203" r="1" fill="#8a7a5a"/>
    <circle cx="460" cy="206" r="1.5" fill="#8a7a5a"/>
  </g>
</svg>
