<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d8d8d"/>
      <stop offset="100%" stop-color="#6b6b6b"/>
    </linearGradient>
    <linearGradient id="light" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0e6d3" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#e8d5b7" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#d4a574" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#sky)"/>

  <!-- Stars -->
  <circle cx="120" cy="45" r="1.2" fill="#ffffff" opacity="0.6"/>
  <circle cx="340" cy="30" r="1" fill="#ffffff" opacity="0.4"/>
  <circle cx="560" cy="55" r="1.3" fill="#ffffff" opacity="0.5"/>
  <circle cx="680" cy="25" r="0.8" fill="#ffffff" opacity="0.7"/>
  <circle cx="200" cy="70" r="1" fill="#ffffff" opacity="0.3"/>
  <circle cx="450" cy="40" r="1.1" fill="#ffffff" opacity="0.5"/>
  <circle cx="720" cy="65" r="0.9" fill="#ffffff" opacity="0.4"/>

  <!-- Left wall - stacked stones -->
  <rect x="80" y="120" width="200" height="280" fill="#5a5a5a" rx="2"/>
  <!-- Stone lines left wall -->
  <line x1="80" y1="160" x2="280" y2="160" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="80" y1="200" x2="280" y2="200" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="80" y1="240" x2="280" y2="240" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="280" y2="280" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="80" y1="320" x2="280" y2="320" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="80" y1="360" x2="280" y2="360" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Vertical joints left -->
  <line x1="180" y1="120" x2="180" y2="160" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="150" y1="160" x2="150" y2="200" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="200" y1="200" x2="200" y2="240" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="160" y1="240" x2="160" y2="280" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="190" y1="280" x2="190" y2="320" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="170" y1="320" x2="170" y2="360" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="210" y1="360" x2="210" y2="400" stroke="#4a4a4a" stroke-width="1"/>

  <!-- Right wall - stacked stones -->
  <rect x="520" y="120" width="200" height="280" fill="#5a5a5a" rx="2"/>
  <!-- Stone lines right wall -->
  <line x1="520" y1="160" x2="720" y2="160" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="520" y1="200" x2="720" y2="200" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="520" y1="240" x2="720" y2="240" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="520" y1="280" x2="720" y2="280" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="520" y1="320" x2="720" y2="320" stroke="#4a4a4a" stroke-width="1.5"/>
  <line x1="520" y1="360" x2="720" y2="360" stroke="#4a4a4a" stroke-width="1.5"/>
  <!-- Vertical joints right -->
  <line x1="620" y1="120" x2="620" y2="160" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="580" y1="160" x2="580" y2="200" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="650" y1="200" x2="650" y2="240" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="600" y1="240" x2="600" y2="280" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="640" y1="280" x2="640" y2="320" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="570" y1="320" x2="570" y2="360" stroke="#4a4a4a" stroke-width="1"/>
  <line x1="660" y1="360" x2="660" y2="400" stroke="#4a4a4a" stroke-width="1"/>

  <!-- The LINTEL - the horizontal beam spanning the gap -->
  <rect x="260" y="120" width="280" height="40" fill="url(#stone)" rx="3"/>
  <!-- Lintel texture -->
  <line x1="280" y1="130" x2="520" y2="130" stroke="#7a7a7a" stroke-width="0.5" opacity="0.5"/>
  <line x1="270" y1="145" x2="530" y2="145" stroke="#7a7a7a" stroke-width="0.5" opacity="0.4"/>

  <!-- Light spilling through the doorway -->
  <rect x="280" y="160" width="240" height="240" fill="url(#light)" opacity="0.3"/>

  <!-- Light rays from doorway -->
  <polygon points="280,160 240,400 280,400" fill="#f0e6d3" opacity="0.05"/>
  <polygon points="520,160 560,400 520,400" fill="#f0e6d3" opacity="0.05"/>

  <!-- Ground line -->
  <line x1="0" y1="400" x2="800" y2="400" stroke="#4a4a4a" stroke-width="2"/>

  <!-- Weight arrows pressing down on lintel -->
  <g opacity="0.25">
    <line x1="340" y1="80" x2="340" y2="115" stroke="#e8d5b7" stroke-width="1.5"/>
    <polygon points="340,118 336,110 344,110" fill="#e8d5b7"/>
    <line x1="400" y1="70" x2="400" y2="115" stroke="#e8d5b7" stroke-width="1.5"/>
    <polygon points="400,118 396,110 404,110" fill="#e8d5b7"/>
    <line x1="460" y1="80" x2="460" y2="115" stroke="#e8d5b7" stroke-width="1.5"/>
    <polygon points="460,118 456,110 464,110" fill="#e8d5b7"/>
  </g>

  <!-- Subtle compression lines inside lintel -->
  <g opacity="0.15">
    <path d="M280,140 Q320,135 360,140 Q400,145 440,140 Q480,135 520,140" stroke="#ffffff" stroke-width="0.8" fill="none"/>
    <path d="M280,150 Q320,147 360,150 Q400,153 440,150 Q480,147 520,150" stroke="#ffffff" stroke-width="0.8" fill="none"/>
  </g>
</svg>
