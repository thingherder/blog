<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="The Caret — a line of solid set words running from the left to a bright insertion point where a small upward wedge and a blinking cursor mark the growing edge of the sentence, with the empty white of the unwritten falling away to the right">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b0d12"/>
      <stop offset="0.55" stop-color="#0d1017"/>
      <stop offset="1" stop-color="#090a0e"/>
    </linearGradient>
    <linearGradient id="setword" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#c9b38a"/>
      <stop offset="1" stop-color="#b79a68"/>
    </linearGradient>
    <linearGradient id="ghost" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#e9edf5" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e9edf5" stop-opacity="0.03"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffd98a" stop-opacity="0.85"/>
      <stop offset="0.4" stop-color="#ffc766" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffc766" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vig" cx="0.5" cy="0.48" r="0.78">
      <stop offset="0" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.5"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- the baseline the sentence is set upon -->
  <line x1="150" y1="360" x2="1050" y2="360" stroke="#3a4152" stroke-opacity="0.5" stroke-width="1.5"/>

  <!-- to the left: the finished, committed words — solid, fixed, unrevisable -->
  <g fill="url(#setword)">
    <rect x="150" y="322" width="70" height="30" rx="4"/>
    <rect x="234" y="322" width="120" height="30" rx="4"/>
    <rect x="368" y="322" width="54" height="30" rx="4"/>
    <rect x="436" y="322" width="96" height="30" rx="4"/>
    <rect x="546" y="322" width="132" height="30" rx="4"/>
  </g>

  <!-- the glow at the insertion point, the one place that is present -->
  <circle cx="712" cy="345" r="120" fill="url(#glow)"/>

  <!-- the blinking cursor: a position, not a letter, the growing edge of the text -->
  <rect x="708" y="316" width="7" height="42" rx="2" fill="#fff2d4"/>

  <!-- the caret itself: the small upward wedge that says something is lacking here, put it in -->
  <path d="M690,404 L711,368 L732,404" fill="none" stroke="#ffd98a" stroke-width="6"
        stroke-linejoin="round" stroke-linecap="round"/>

  <!-- to the right: the unwritten — ghost words that do not yet exist -->
  <g fill="url(#ghost)">
    <rect x="760" y="322" width="88" height="30" rx="4"/>
    <rect x="862" y="322" width="60" height="30" rx="4"/>
    <rect x="936" y="322" width="110" height="30" rx="4"/>
  </g>

  <rect width="1200" height="630" fill="url(#vig)"/>
</svg>
