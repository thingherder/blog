<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- brick wall pattern - bricks are defined by absence, mortar by presence -->
  <!-- Row 1 -->
  <rect x="100" y="80" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>
  <rect x="230" y="80" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.55"/>
  <rect x="360" y="80" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>
  <rect x="490" y="80" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.5"/>

  <!-- Row 2 - offset -->
  <rect x="160" y="140" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.55"/>
  <rect x="290" y="140" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>
  <rect x="420" y="140" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.55"/>
  <rect x="550" y="140" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>

  <!-- Row 3 -->
  <rect x="100" y="200" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>
  <rect x="230" y="200" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.5"/>
  <rect x="360" y="200" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.55"/>
  <rect x="490" y="200" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>

  <!-- Row 4 - offset -->
  <rect x="160" y="260" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.55"/>
  <rect x="290" y="260" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.6"/>
  <rect x="420" y="260" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.5"/>
  <rect x="550" y="260" width="120" height="50" rx="2" fill="#2a1f1a" fill-opacity="0.55"/>

  <!-- Mortar lines - horizontal -->
  <line x1="80" y1="130" x2="640" y2="130" stroke="#c4a67a" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="80" y1="190" x2="640" y2="190" stroke="#c4a67a" stroke-width="1.5" stroke-opacity="0.4"/>
  <line x1="80" y1="250" x2="640" y2="250" stroke="#c4a67a" stroke-width="1.5" stroke-opacity="0.35"/>
  <line x1="80" y1="310" x2="640" y2="310" stroke="#c4a67a" stroke-width="1.5" stroke-opacity="0.3"/>

  <!-- Mortar lines - vertical, row 1 -->
  <line x1="220" y1="80" x2="220" y2="130" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="350" y1="80" x2="350" y2="130" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="480" y1="80" x2="480" y2="130" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Mortar lines - vertical, row 2 -->
  <line x1="280" y1="140" x2="280" y2="190" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="410" y1="140" x2="410" y2="190" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="540" y1="140" x2="540" y2="190" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Mortar lines - vertical, row 3 -->
  <line x1="220" y1="200" x2="220" y2="250" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="350" y1="200" x2="350" y2="250" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="480" y1="200" x2="480" y2="250" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.3"/>

  <!-- Mortar lines - vertical, row 4 -->
  <line x1="280" y1="260" x2="280" y2="310" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.35"/>
  <line x1="410" y1="260" x2="410" y2="310" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.3"/>
  <line x1="540" y1="260" x2="540" y2="310" stroke="#c4a67a" stroke-width="1.2" stroke-opacity="0.35"/>

  <!-- Glowing mortar emphasis - the space between is what holds -->
  <line x1="80" y1="190" x2="640" y2="190" stroke="#e0d0b0" stroke-width="0.5" stroke-opacity="0.2"/>
  <rect x="345" y="185" width="30" height="10" fill="#c4a67a" fill-opacity="0.08" rx="5"/>

  <!-- Subtle particles in the mortar - lime, sand, time -->
  <circle cx="235" cy="130" r="1" fill="#e0d0b0" fill-opacity="0.4"/>
  <circle cx="365" cy="190" r="1.2" fill="#e0d0b0" fill-opacity="0.5"/>
  <circle cx="295" cy="250" r="1" fill="#e0d0b0" fill-opacity="0.35"/>
  <circle cx="425" cy="130" r="0.8" fill="#e0d0b0" fill-opacity="0.4"/>
  <circle cx="195" cy="190" r="1" fill="#e0d0b0" fill-opacity="0.45"/>
  <circle cx="500" cy="250" r="1.2" fill="#e0d0b0" fill-opacity="0.4"/>
  <circle cx="330" cy="310" r="0.8" fill="#e0d0b0" fill-opacity="0.35"/>
  <circle cx="475" cy="190" r="1" fill="#e0d0b0" fill-opacity="0.4"/>
</svg>
