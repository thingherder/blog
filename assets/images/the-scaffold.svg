<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="stone" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b8fa3;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#5a5d6e;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c674;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#de935f;stop-opacity:0.2" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)" />

  <!-- Subtle grid/scaffold pattern - fading, ghostly -->
  <!-- Vertical scaffold poles - translucent, disappearing -->
  <line x1="180" y1="80" x2="180" y2="350" stroke="#f0c674" stroke-width="2" opacity="0.12" />
  <line x1="240" y1="60" x2="240" y2="350" stroke="#f0c674" stroke-width="2" opacity="0.09" />
  <line x1="300" y1="50" x2="300" y2="350" stroke="#f0c674" stroke-width="2" opacity="0.06" />
  <line x1="360" y1="45" x2="360" y2="350" stroke="#f0c674" stroke-width="1.5" opacity="0.04" />

  <!-- Horizontal scaffold bars - even more ghostly -->
  <line x1="160" y1="120" x2="380" y2="120" stroke="#f0c674" stroke-width="1.5" opacity="0.10" />
  <line x1="160" y1="180" x2="380" y2="180" stroke="#f0c674" stroke-width="1.5" opacity="0.07" />
  <line x1="160" y1="240" x2="380" y2="240" stroke="#f0c674" stroke-width="1.5" opacity="0.05" />
  <line x1="160" y1="300" x2="380" y2="300" stroke="#f0c674" stroke-width="1.5" opacity="0.03" />

  <!-- Diagonal braces -->
  <line x1="180" y1="120" x2="240" y2="180" stroke="#f0c674" stroke-width="1" opacity="0.06" />
  <line x1="240" y1="180" x2="300" y2="240" stroke="#f0c674" stroke-width="1" opacity="0.04" />

  <!-- The stone wall - solid, permanent -->
  <rect x="440" y="60" width="260" height="290" fill="url(#stone)" rx="3" opacity="0.85" />

  <!-- Stone texture lines -->
  <line x1="440" y1="110" x2="700" y2="110" stroke="#0d1117" stroke-width="1" opacity="0.3" />
  <line x1="440" y1="160" x2="700" y2="160" stroke="#0d1117" stroke-width="1" opacity="0.3" />
  <line x1="440" y1="210" x2="700" y2="210" stroke="#0d1117" stroke-width="1" opacity="0.3" />
  <line x1="440" y1="260" x2="700" y2="260" stroke="#0d1117" stroke-width="1" opacity="0.3" />
  <line x1="440" y1="310" x2="700" y2="310" stroke="#0d1117" stroke-width="1" opacity="0.3" />

  <!-- Vertical mortar lines, offset per row -->
  <line x1="520" y1="60" x2="520" y2="110" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="610" y1="60" x2="610" y2="110" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="480" y1="110" x2="480" y2="160" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="570" y1="110" x2="570" y2="160" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="660" y1="110" x2="660" y2="160" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="520" y1="160" x2="520" y2="210" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="610" y1="160" x2="610" y2="210" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="480" y1="210" x2="480" y2="260" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="570" y1="210" x2="570" y2="260" stroke="#0d1117" stroke-width="1" opacity="0.25" />
  <line x1="660" y1="210" x2="660" y2="260" stroke="#0d1117" stroke-width="1" opacity="0.25" />

  <!-- Putlog holes - small dark rectangles in the wall -->
  <rect x="448" y="125" width="12" height="8" fill="#0d1117" rx="1" opacity="0.7" />
  <rect x="448" y="175" width="12" height="8" fill="#0d1117" rx="1" opacity="0.7" />
  <rect x="448" y="225" width="12" height="8" fill="#0d1117" rx="1" opacity="0.7" />
  <rect x="448" y="275" width="12" height="8" fill="#0d1117" rx="1" opacity="0.7" />

  <!-- Subtle warm glow around putlog holes - where scaffold met stone -->
  <rect x="446" y="123" width="16" height="12" fill="url(#glow)" rx="2" opacity="0.3" />
  <rect x="446" y="173" width="16" height="12" fill="url(#glow)" rx="2" opacity="0.25" />
  <rect x="446" y="223" width="16" height="12" fill="url(#glow)" rx="2" opacity="0.2" />
  <rect x="446" y="273" width="16" height="12" fill="url(#glow)" rx="2" opacity="0.15" />

  <!-- Particles drifting from scaffold to wall - the transition -->
  <circle cx="400" cy="100" r="1.5" fill="#f0c674" opacity="0.2" />
  <circle cx="410" cy="150" r="1" fill="#f0c674" opacity="0.15" />
  <circle cx="420" cy="130" r="2" fill="#f0c674" opacity="0.12" />
  <circle cx="405" cy="200" r="1" fill="#f0c674" opacity="0.18" />
  <circle cx="415" cy="250" r="1.5" fill="#f0c674" opacity="0.10" />
  <circle cx="425" cy="180" r="1" fill="#f0c674" opacity="0.14" />
  <circle cx="395" cy="280" r="2" fill="#de935f" opacity="0.08" />
  <circle cx="430" cy="90" r="1" fill="#f0c674" opacity="0.10" />

  <!-- Ground line -->
  <line x1="100" y1="350" x2="750" y2="350" stroke="#5a5d6e" stroke-width="1" opacity="0.4" />
</svg>
