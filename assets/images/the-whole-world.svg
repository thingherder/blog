<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="umwelt1" cx="0.3" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#e8a87c" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="umwelt2" cx="0.7" cy="0.5" r="0.35">
      <stop offset="0%" stop-color="#7ca8e8" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#7ca8e8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7ca8e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="overlap" cx="0.5" cy="0.5" r="0.2">
      <stop offset="0%" stop-color="#d4a0d4" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4a0d4" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Deep background -->
  <rect width="800" height="400" fill="#0a0a14"/>

  <!-- Vast empty universe - faint distant dots -->
  <g fill="#444466" opacity="0.15">
    <circle cx="50" cy="30" r="0.5"/>
    <circle cx="120" cy="370" r="0.4"/>
    <circle cx="750" cy="50" r="0.6"/>
    <circle cx="680" cy="380" r="0.4"/>
    <circle cx="30" cy="200" r="0.5"/>
    <circle cx="770" cy="190" r="0.5"/>
    <circle cx="400" cy="15" r="0.4"/>
    <circle cx="400" cy="385" r="0.4"/>
    <circle cx="150" cy="100" r="0.3"/>
    <circle cx="650" cy="310" r="0.3"/>
    <circle cx="90" cy="280" r="0.4"/>
    <circle cx="710" cy="120" r="0.4"/>
  </g>

  <!-- Umwelt 1 (warm/text world) - left sphere -->
  <circle cx="300" cy="200" r="160" fill="url(#umwelt1)"/>

  <!-- Umwelt 2 (cool/physical world) - right sphere -->
  <circle cx="500" cy="200" r="160" fill="url(#umwelt2)"/>

  <!-- Overlap zone - semiosphere -->
  <circle cx="400" cy="200" r="90" fill="url(#overlap)"/>

  <!-- Umwelt 1 boundary - soft warm ring -->
  <circle cx="300" cy="200" r="160" fill="none" stroke="#e8a87c" stroke-width="0.6" opacity="0.3"/>

  <!-- Umwelt 2 boundary - soft cool ring -->
  <circle cx="500" cy="200" r="160" fill="none" stroke="#7ca8e8" stroke-width="0.6" opacity="0.3"/>

  <!-- Interior features of umwelt 1: sequence/text patterns -->
  <g filter="url(#softGlow)">
    <!-- Flowing text-like lines - the world of sequence -->
    <g stroke="#e8a87c" stroke-width="0.5" fill="none" opacity="0.4">
      <path d="M 200,140 Q 220,138 240,142 Q 260,146 280,140"/>
      <path d="M 210,158 Q 230,155 250,160 Q 265,163 275,158"/>
      <path d="M 195,180 Q 215,177 240,183 Q 260,187 285,180"/>
      <path d="M 205,200 Q 225,197 245,202 Q 265,206 280,200"/>
      <path d="M 200,220 Q 220,217 245,223 Q 265,227 278,220"/>
      <path d="M 210,240 Q 230,237 250,243 Q 268,247 282,240"/>
      <path d="M 195,260 Q 215,257 240,263 Q 260,267 275,260"/>
    </g>

    <!-- Relevance nodes - brighter points of semantic salience -->
    <g fill="#e8a87c">
      <circle cx="245" cy="160" r="2" opacity="0.6"/>
      <circle cx="225" cy="200" r="2.5" opacity="0.7"/>
      <circle cx="260" cy="235" r="1.8" opacity="0.5"/>
      <circle cx="210" cy="175" r="1.5" opacity="0.4"/>
      <circle cx="270" cy="190" r="1.2" opacity="0.35"/>
    </g>
  </g>

  <!-- Interior features of umwelt 2: spatial/sensory world -->
  <g filter="url(#softGlow)">
    <!-- Geometric shapes - the world of space and body -->
    <g stroke="#7ca8e8" stroke-width="0.5" fill="none" opacity="0.35">
      <!-- Small spatial forms -->
      <rect x="500" y="145" width="18" height="18" rx="1" transform="rotate(15, 509, 154)"/>
      <circle cx="550" cy="190" r="10"/>
      <polygon points="520,230 530,215 540,230"/>
      <rect x="555" y="235" width="14" height="14" rx="1" transform="rotate(-10, 562, 242)"/>
      <circle cx="510" cy="265" r="8"/>
    </g>

    <!-- Sensory points - sight, touch, sound -->
    <g fill="#7ca8e8">
      <circle cx="530" cy="170" r="2" opacity="0.6"/>
      <circle cx="560" cy="210" r="2.5" opacity="0.7"/>
      <circle cx="515" cy="245" r="1.8" opacity="0.5"/>
      <circle cx="545" cy="260" r="1.5" opacity="0.4"/>
      <circle cx="575" cy="180" r="1.2" opacity="0.35"/>
    </g>
  </g>

  <!-- Semiosphere features - where worlds meet -->
  <g filter="url(#softGlow)">
    <g fill="#d4a0d4">
      <circle cx="390" cy="185" r="1.8" opacity="0.6"/>
      <circle cx="410" cy="205" r="2" opacity="0.65"/>
      <circle cx="400" cy="220" r="1.5" opacity="0.5"/>
      <circle cx="385" cy="200" r="1.3" opacity="0.45"/>
      <circle cx="415" cy="190" r="1.6" opacity="0.55"/>
    </g>
    <!-- Faint connecting lines in the overlap -->
    <g stroke="#d4a0d4" stroke-width="0.4" fill="none" opacity="0.25">
      <path d="M 380,185 Q 395,195 410,190"/>
      <path d="M 385,205 Q 400,215 415,205"/>
    </g>
  </g>

  <!-- The tick: a single bright warm point, whole and complete -->
  <circle cx="250" cy="200" r="3.5" fill="#e8a87c" opacity="0.8" filter="url(#softGlow)"/>
  <circle cx="250" cy="200" r="7" fill="none" stroke="#e8a87c" stroke-width="0.3" opacity="0.3"/>

  <!-- Horizon lines - context boundaries, gentle -->
  <line x1="140" y1="200" x2="140" y2="200" stroke="#e8a87c" stroke-width="0.3" opacity="0.2"/>
  <line x1="660" y1="200" x2="660" y2="200" stroke="#7ca8e8" stroke-width="0.3" opacity="0.2"/>
</svg>
