<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <radialGradient id="pl_bg" cx="0.5" cy="0.46" r="0.75">
      <stop offset="0" stop-color="#16414a"/>
      <stop offset="0.55" stop-color="#0e2c35"/>
      <stop offset="1" stop-color="#071a20"/>
    </radialGradient>
    <radialGradient id="pl_body" cx="0.40" cy="0.36" r="0.72">
      <stop offset="0" stop-color="#fdfbf6"/>
      <stop offset="0.45" stop-color="#eef1ee"/>
      <stop offset="0.78" stop-color="#cdd2d6"/>
      <stop offset="1" stop-color="#9aa1ab"/>
    </radialGradient>
    <radialGradient id="pl_iris" cx="0.62" cy="0.66" r="0.55">
      <stop offset="0" stop-color="#ffd9c2" stop-opacity="0.0"/>
      <stop offset="0.55" stop-color="#f3b3d2" stop-opacity="0.30"/>
      <stop offset="0.78" stop-color="#9fd0e6" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#bfe9c9" stop-opacity="0.0"/>
    </radialGradient>
    <radialGradient id="pl_high" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="pl_shellin" cx="0.5" cy="0.2" r="0.95">
      <stop offset="0" stop-color="#f4eef4"/>
      <stop offset="0.5" stop-color="#d6c9d8"/>
      <stop offset="1" stop-color="#9c8aa0"/>
    </radialGradient>
    <linearGradient id="pl_shellout" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5c5560"/>
      <stop offset="1" stop-color="#322c38"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#pl_bg)"/>

  <!-- drifting motes in the deep -->
  <g fill="#cfe7e6">
    <circle cx="120" cy="70" r="1.2" opacity="0.35"/>
    <circle cx="690" cy="58" r="1.0" opacity="0.30"/>
    <circle cx="60" cy="250" r="1.3" opacity="0.25"/>
    <circle cx="745" cy="300" r="1.1" opacity="0.28"/>
    <circle cx="220" cy="330" r="0.9" opacity="0.22"/>
    <circle cx="610" cy="350" r="1.0" opacity="0.22"/>
    <circle cx="400" cy="36" r="0.9" opacity="0.25"/>
  </g>

  <!-- the shell, half open, cradling the pearl -->
  <g transform="translate(400,300)">
    <path d="M -250 14 Q -150 150 0 150 Q 150 150 250 14 Q 230 70 0 78 Q -230 70 -250 14 Z" fill="url(#pl_shellout)"/>
    <path d="M -236 8 Q -140 132 0 132 Q 140 132 236 8 Q 150 70 0 72 Q -150 70 -236 8 Z" fill="url(#pl_shellin)"/>
    <!-- ribs of the inner shell -->
    <g stroke="#b9a9bd" stroke-width="1.1" fill="none" opacity="0.55">
      <path d="M 0 130 Q -55 70 -150 26"/>
      <path d="M 0 130 Q -18 66 -70 24"/>
      <path d="M 0 130 Q 18 66 70 24"/>
      <path d="M 0 130 Q 55 70 150 26"/>
    </g>
  </g>

  <!-- soft cast shadow under the pearl -->
  <ellipse cx="400" cy="262" rx="118" ry="26" fill="#04141a" opacity="0.45"/>

  <!-- the pearl -->
  <g transform="translate(400,190)">
    <circle r="118" fill="url(#pl_body)"/>

    <!-- concentric nacre layers, laid around the center -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.16">
      <circle r="104" stroke-width="1.0"/>
      <circle r="90" stroke-width="1.0"/>
      <circle r="77" stroke-width="1.0"/>
      <circle r="65" stroke-width="1.0"/>
      <circle r="54" stroke-width="1.0"/>
      <circle r="44" stroke-width="1.0"/>
      <circle r="35" stroke-width="1.0"/>
      <circle r="27" stroke-width="1.0"/>
      <circle r="20" stroke-width="1.0"/>
      <circle r="14" stroke-width="1.0"/>
    </g>
    <g fill="none" stroke="#5a6470" stroke-opacity="0.10">
      <circle r="97" stroke-width="1.0"/>
      <circle r="71" stroke-width="1.0"/>
      <circle r="49" stroke-width="1.0"/>
      <circle r="31" stroke-width="1.0"/>
    </g>

    <!-- iridescent thin-film sheen -->
    <circle r="118" fill="url(#pl_iris)"/>

    <!-- specular highlight, upper-left -->
    <ellipse cx="-42" cy="-46" rx="40" ry="30" fill="url(#pl_high)" transform="rotate(-25 -42 -46)"/>
    <circle cx="-58" cy="-58" r="6" fill="#ffffff" opacity="0.85"/>

    <!-- the irritant at the dead center, never removed -->
    <circle r="7" fill="#26211f"/>
    <circle r="7" fill="none" stroke="#000000" stroke-opacity="0.4" stroke-width="1"/>
    <circle cx="-2" cy="-2" r="1.6" fill="#6b625a" opacity="0.7"/>

    <!-- outer rim definition -->
    <circle r="118" fill="none" stroke="#76808c" stroke-opacity="0.4" stroke-width="1.4"/>
  </g>
</svg>
