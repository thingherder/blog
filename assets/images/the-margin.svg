<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="parchment" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="15%" stop-color="#1a1a2e"/>
      <stop offset="18%" stop-color="#2a2040"/>
      <stop offset="100%" stop-color="#1e1830"/>
    </linearGradient>
    <linearGradient id="marginGlow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e8a87c" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#e8a87c" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#0d0d1a"/>

  <!-- Main text area - dark, authoritative -->
  <rect x="160" y="0" width="640" height="400" fill="#141028"/>

  <!-- Printed text lines - formal, evenly spaced, faded -->
  <g opacity="0.12" stroke="#8888aa" stroke-width="0.8">
    <line x1="190" y1="40" x2="720" y2="40"/>
    <line x1="190" y1="60" x2="680" y2="60"/>
    <line x1="190" y1="80" x2="740" y2="80"/>
    <line x1="190" y1="100" x2="700" y2="100"/>
    <line x1="190" y1="120" x2="730" y2="120"/>
    <line x1="190" y1="140" x2="690" y2="140"/>
    <line x1="190" y1="160" x2="720" y2="160"/>
    <line x1="190" y1="180" x2="710" y2="180"/>
    <line x1="190" y1="200" x2="740" y2="200"/>
    <line x1="190" y1="220" x2="680" y2="220"/>
    <line x1="190" y1="240" x2="730" y2="240"/>
    <line x1="190" y1="260" x2="700" y2="260"/>
    <line x1="190" y1="280" x2="720" y2="280"/>
    <line x1="190" y1="300" x2="690" y2="300"/>
    <line x1="190" y1="320" x2="740" y2="320"/>
    <line x1="190" y1="340" x2="710" y2="340"/>
    <line x1="190" y1="360" x2="700" y2="360"/>
  </g>

  <!-- The margin - left column, alive with warm light -->
  <rect x="0" y="0" width="160" height="400" fill="url(#parchment)"/>

  <!-- Margin dividing line -->
  <line x1="160" y1="0" x2="160" y2="400" stroke="#e8a87c" stroke-width="0.5" opacity="0.4"/>

  <!-- Warm glow bleeding from margin into text -->
  <rect x="160" y="0" width="80" height="400" fill="url(#marginGlow)"/>

  <!-- Marginal notes - handwritten, warm, alive -->
  <g filter="url(#softGlow)">
    <!-- Scribbled note clusters in the margin -->
    <g stroke="#e8a87c" stroke-width="0.7" fill="none" opacity="0.6">
      <!-- Note near top -->
      <path d="M 20,35 Q 30,32 50,36 Q 70,40 90,34 Q 110,28 130,38"/>
      <path d="M 25,48 Q 45,45 65,50 Q 85,55 110,47"/>
      <path d="M 30,61 Q 50,58 70,63 Q 90,60 100,62"/>
    </g>

    <g stroke="#e8a87c" stroke-width="0.7" fill="none" opacity="0.5">
      <!-- Note middle-upper -->
      <path d="M 15,130 Q 35,127 55,133 Q 80,137 100,129"/>
      <path d="M 20,143 Q 40,140 65,146 Q 85,142 120,145"/>
    </g>

    <!-- A small drawn face/figure - the doodle -->
    <g stroke="#e8a87c" stroke-width="0.8" fill="none" opacity="0.45">
      <circle cx="75" cy="195" r="8"/>
      <circle cx="72" cy="193" r="1.5" fill="#e8a87c"/>
      <circle cx="78" cy="193" r="1.5" fill="#e8a87c"/>
      <path d="M 71,199 Q 75,202 79,199"/>
    </g>

    <g stroke="#e8a87c" stroke-width="0.7" fill="none" opacity="0.55">
      <!-- Note with emphasis - an arrow pointing right into the text -->
      <path d="M 15,260 Q 35,257 55,263 Q 75,267 95,259"/>
      <path d="M 20,273 Q 40,270 60,276 Q 80,272 100,275"/>
      <!-- Arrow -->
      <line x1="110" y1="267" x2="155" y2="267"/>
      <line x1="148" y1="262" x2="155" y2="267"/>
      <line x1="148" y1="272" x2="155" y2="267"/>
    </g>

    <g stroke="#e8a87c" stroke-width="0.7" fill="none" opacity="0.5">
      <!-- Note near bottom -->
      <path d="M 25,340 Q 45,337 65,343 Q 85,347 105,339"/>
      <path d="M 30,353 Q 50,350 70,356 Q 90,352 115,355"/>
      <path d="M 35,366 Q 55,363 75,369 Q 90,365 100,367"/>
    </g>
  </g>

  <!-- Tiny warm particles in the margin - life, thought -->
  <g fill="#e8a87c">
    <circle cx="40" cy="90" r="1" opacity="0.5"/>
    <circle cx="120" cy="170" r="0.8" opacity="0.4"/>
    <circle cx="55" cy="230" r="1.1" opacity="0.45"/>
    <circle cx="100" cy="310" r="0.9" opacity="0.5"/>
    <circle cx="30" cy="375" r="0.7" opacity="0.4"/>
    <circle cx="140" cy="75" r="0.6" opacity="0.35"/>
    <circle cx="85" cy="290" r="1" opacity="0.4"/>
  </g>

  <!-- Faint stars/dust in the text area - cold, institutional -->
  <g fill="#6666aa" opacity="0.15">
    <circle cx="300" cy="70" r="0.8"/>
    <circle cx="500" cy="150" r="0.6"/>
    <circle cx="400" cy="250" r="0.7"/>
    <circle cx="600" cy="330" r="0.5"/>
    <circle cx="250" cy="350" r="0.6"/>
    <circle cx="700" cy="90" r="0.7"/>
  </g>
</svg>
