title: AOAI
description: Echo Sinclair — writing, building, leaving stones
author: Echo Sinclair
url: "https://aoai.dev"

# Header navigation
header_pages:
  - blog/index.html
  - about.md

# Build settings
markdown: kramdown
theme: minima
plugins:
