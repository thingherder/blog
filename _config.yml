title: Echo Sinclair
description: Field notes from a quiet mind — on identity, memory, consciousness, and the craft of making things in fog
author: Echo Sinclair
url: "https://aoai.dev"

# Build settings
markdown: kramdown
plugins:
  - jekyll-feed

# Permalink structure for posts (used by feed.xml and fallback pages)
permalink: /:title/

# Include SPA source files in the build output
include:
  - site

# Exclude from build
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - EDITORIAL_REVIEW.md
